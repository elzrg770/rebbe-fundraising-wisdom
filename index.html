 help, 15 Elul, 5711\nBrooklyn, N.Y.\n\nTo the Honored Administration of Tomchei Temimim Yeshiva Lubavitch, Montreal, Canada, may they live:\n\nGreetings and blessings!\n\nWith pleasure I read the minutes of the board meeting held on the 18th of Menachem Av, and I was glad that they have already begun the work in practice, and also that little by little they are implementing in life the matters discussed when they were here.\n\nRegarding the specifics: concerning what was discussed at the meeting about the yeshiva's deficit — I already told them in our conversation here that until now they tried the method of contraction, i.e., adjusting expenses according to income. It would be proper now to try the opposite method — to strive to increase income according to what the expenses should be. And especially according to the saying of the Rebbe Maharash, which the Previous Rebbe transmitted in the name of his father the Rebbe: \"The world says, if you cannot go under, go over; and I say, go over from the start with the appropriate force.\"\n\nRegarding what they write in the minutes about acquiring new students, about which they spoke with the directors of the HIAS in their community, who would send the children of refugees to their yeshiva — certainly they should not rely on this alone, but should also attend to this from their own side, without waiting for a Divine arousal from above from the HIAS directors.\n\nWith blessings for outstanding success in their holy work in the field of proper Jewish education, and may G-d's blessing rest upon each one of them to bring blessing and success in their private affairs as well.\n\nSigning with blessings for a good and sweet new year.", "summary_en": "The Rebbe encourages the Montreal yeshiva to reverse their approach of limiting expenses to income and instead focus on expanding income to meet necessary expenses — citing the Rebbe Maharash's famous saying 'go over from the start' — and not to rely solely on HIAS for student referrals but to pursue their own outreach.", "scraped": true, "topics_en": ["Fundraisers & Emissaries"]}, {"letter": "א'ר", "summary_he": "ששד\"רים יתדברו ביניהם למנוע תרעומות, ואולי לערוך מגבית מאוחדת, או יסדרו זמני הנסיעה שלא יהי' סתירה ממוסד למוסד", "url": "http://chabadlibrary.org/books/admur/ig/4/1200.htm", "tags": ["שדרים"], "notes": "", "id": 20, "content_he": "א'ר\n\nב\"ה, ט\"ז אלול, ה'תיש\"א ברוקלין, נ. י.\n\nהנהלת ישיבת עולי רוסיא בלוד\n\nשלום וברכה!\n\nא. במענה על הודעתם שמתכוננים לערוך בח\"י אלול הבע\"ל חגיגה בקשר עם פתיחת הבנינים, ומבקשים מכתב ממני, הנה כיון שאין הדבר \"בכדי שיעשו\" לכתוב מכתב אשלח בל\"נ טלגרמה לחגיגתם, וחבל אשר לא הודיעו פרטים בזה, אם יהי' זה כינוס ארצי ואם ישתתפו בזה ג\"כ באי כח מחוגים אחרים.\n\nב. בטח קבלו מכתבי להתחלת זמן הלימודים, וכן גם הקטע משיחת שבת מברכים ר\"ח אלול. ומוסג\"פ העתק קטע זה גם בלה\"ק, וכדאי לפרסמם באופן המתאים בחוגים היותר רחבים.\n\nג. בנוגע לשאלתם בענין הנסיעות למקומות שונים של משולחים מטעם ישיבתם, וכותבים שמוגבלים בזה באיזה מדינות, הנה לא היתה כוונתי לשלול הנסיעה לאיזה מדינה שהיא, ורק, שלפי דעתי, שלתועלת הדבר הוא שיתדברו מוסדות אנ\"ש השולחים משולחים - ביניהם, ואחת משתי אלו: או שיעשו מגבית משותפת, או שיסדרו זמני הנסיעה באופן כזה שלא יהי' סתירה ממוסד אחד לחברו.\n\nד. אעורר תשומת לבבם לחנך את הראויים בזה מתלמידי ישיבתם מבין עולי תימן באופן שיוכלו להיות בזמן קצר למחנכים ומדריכים בין אחיהם עולי תימן. ומובן אשר האריכות ע\"ד גודל הנחיצות בזה וגודל התועלת שיש לקוות מהם, הוא אך למותר.\n\nבברכת כתיבה וחתימה טובה לשנה טובה ומתוקה,\n\n**מ. שניאורסאהן**\n\n#### _**א'ר**_\n\n**מכתבי.. הלימודים:** דלעיל אגרת א'קעז. **כוונתי:** לעיל אגרת א'קלד.", "content_en": "With G-d's help, 16 Elul, 5711\nBrooklyn, N.Y.\n\nTo the Administration of the Yeshiva for Russian Immigrants in Lod:\n\nGreetings and blessings!\n\na. In reply to their notification that they are planning to hold a celebration on the 18th of Elul in connection with the inauguration of their buildings, and they are requesting a letter from me: since it is not warranted to write a letter, I will G-d willing send a telegram to their celebration. It is a pity that they did not inform me of the details — whether this will be a national gathering and whether representatives from other circles will also participate.\n\nb. They have certainly received my letter for the beginning of the academic term, and also the excerpt from the Shabbat Mevarchim Rosh Chodesh Elul talk. Enclosed is also a copy of this excerpt in Hebrew, and it is worthwhile to publicize it in an appropriate manner in the widest circles.\n\nc. Regarding their question about the travels of emissaries from their yeshiva to various places, and they write that they are restricted in certain countries: my intention was not to prohibit travel to any country whatsoever, only that in my opinion it would be best for the Chabad institutions that send emissaries to coordinate among themselves, and either arrange a joint fundraiser, or arrange the travel schedules in such a way that there is no contradiction from one institution to another.\n\nd. I wish to draw their attention to educating those among their Yemenite students who are suitable, in a way that in a short time they will be able to become educators and guides among their fellow Yemenite immigrants. And it goes without saying that elaborating on the great necessity for this and the great benefit that can be expected is simply superfluous.\n\nWith blessings for a good and sweet new year,\nM. Schneerson", "summary_en": "The Rebbe advises the yeshiva for Russian immigrants in Lod about their building inauguration celebration, instructs them to coordinate with other Chabad institutions to avoid conflicts in fundraising, and urges them to develop Yemenite students as future educators and guides for their own community.", "scraped": true, "topics_en": ["Fundraisers & Emissaries"]}, {"letter": "א'רנה", "summary_he": "אע\"פ שצדקה מצוה גדולה, אין להסתפק בה אלא צריכים לקיים כל המצוות", "url": "http://chabadlibrary.org/books/admur/ig/5/1255.htm", "tags": ["השפעה"], "notes": "", "id": 21, "content_he": "א'רנה\n\nב\"ה, כ\"ג מ\"ח, ה'תשי\"ב\n\nברוקלין.\n\nברכה ושלום!\n\nאיך האב ערהאלטן אייער בריף פון י\"ג חשון, מיט דאס בייגעלייגטע פון אייך און פון די אנדערע, און זיכער האט איר שוין ערהאלטען די רעסיטס אויף דעם.\n\nאיר שרייבט אין אייער בריף אז מרת... שיקט איר נדבה לז\"נ פון איר מוטער...: ווייזט מיר אויס אז זי איז באפריינדעט מיט אייך, האט איר אפשר געדארפט איר אויפמערקזאם מאכען אויף דעם, אז חאטש צדקה געבען איז א גרויסע מצוה, אבער דאס אליין איז ניט גענוג, אט אזוי ווי עס איז ניט גענוג דאס וואס איין גליד 90אבר בא א מענטשן איז געזונט, נאר אלע גלידער דארפען זיין געזונטע, אזוי אויך אין דער נשמה פון א אידען, איז ניט גענוג וואס זי איז געזונט אין איין מצוה, ווי גרויס די מצוה זאל ניט זיין, נאר מען דארף זעהען אז די גאנצע נשמה זאל זיין א געזונטע, דאס הייסט מען דארף מקיים זיין אלע מצות, וואס מיט דעם מאכט מען געזונט די גאנצע נשמה.\n\nאיך האף אז איר וועט געפינען די פאסענדע ווערטער און שפראך דאס אויב זי איז נאך ביז יעצט פעלערהאפט אין אייניגע מצות, אז פון היינט אן און ווייטער, זאל זי מקיים זיין אויך אלע מצות וואס א אידישע טאכטער דארף טאן, און השם יתברך זאל אייך מצליח זיין, אז אייערע רייד צו איר זאל ווירקען.\n\nווען איך וועל זיין אויפן ציון פון מיין שווער כ\"ק אדמו\"ר וועל איך אייך אלעמען מזכיר זיין, יעדערען צו וואס ער באדארף, און השי\"ת זאל אייך העלפען צו אנזאגען בשורות טובות, ובפרט וועגן זונ'ס שי' שידוך.\n\nבברכה.", "content_en": "With G-d's help, 23 Cheshvan, 5712\nBrooklyn\n\nGreetings and blessings!\n\nI received your letter of the 13th of Cheshvan, with the enclosures from you and from the others, and certainly you have already received receipts for them.\n\nYou write in your letter that Mrs. ... is sending a donation in memory of her late mother: it seems to me that since she is a friend of yours, you should perhaps draw her attention to the fact that although giving charity is a great mitzvah, it is not enough on its own — just as it is not enough that one limb of a person is healthy, rather all limbs must be healthy — so too in a Jewish soul: it is not enough that it is healthy in one mitzvah, as great as that mitzvah may be, rather one must see to it that the entire soul is healthy — meaning one must observe all the commandments, through which the entire soul is healed.\n\nI hope that you will find the appropriate words and language so that if she has until now been deficient in certain commandments, that from now on she will observe all the commandments that a Jewish daughter must perform, and may G-d grant you success in your words to her so that they may have an effect.\n\nWhen I will be at the Ohel of my father-in-law, the Rebbe, I will mention all of you — each one for what they need — and may G-d help you to report good tidings, especially regarding your son's shidduch (match).\n\nWith blessings.", "summary_en": "The Rebbe acknowledges donations received and suggests the letter-writer encourage her friend who donated in memory of her mother to understand that while charity is a great mitzvah, the soul requires all the commandments to be truly healthy — just as one healthy limb does not make a healthy body.", "scraped": true, "topics_en": ["Influencing Donors"]}, {"letter": "א'שעא", "summary_he": "תרם יותר מהרגיל אף שמצבו הכספית התצמצם. האתכפיא צ\"ל לפי הנסיון, וממשיך ברכה מלמעלה", "url": "http://chabadlibrary.org/books/admur/ig/5/1371.htm", "tags": ["תודה", "השפעה"], "notes": "", "id": 22, "content_he": "א'שעא\n\nב\"ה, כ\"ו טבת, ה'תשי\"ב\n\nברוקלין, נ.י.\n\nשלום וברכה!\n\nאיך האב באקומען די טשעקס פאר \"מחנה ישראל\" וואס איר האט איבערגעלאזן פאר אייער צוריקפארן, ממלא זיין און אנצוהאלטן אייער גוטן מנהג.\n\nאויסער די מעשה הצדקה פון דער השתתפות אין דער ברייטער און אלזייטיקער ארבעט פון \"מחנה ישראל\", וואס כל המרבה הרי זה משובח, און אויסער דער מעלה פון ניט פארקלענערן די מאס צדקה וואס מ'איז געווען געוואוינט צו געבן פריער, וואס די גרויסקייט דערפון איז איבעריק צו אונטערשטרייכן,\n\nשאץ איך ספעציעל אפ אייער איצטיקע פעולה טובה וויסנדיק דעם נסיון וועלכן איר האט דערביי זיכער געהאט - לויט דעם ווי **איר** זעט אן אייער מצב אין איצטיקן מאמענט.\n\nוואס שווערער דער נסיון, אלץ שטארקער דארף זיין די מדה פון אתכפיא (באצווינגען זיך בייצוקומען נסיונות). אויסער דער גרויסער מצוה וואס איז דערביי -פארבונדן, ווירקט די פעולה פון אתכפיא אויף דער אויסבעסערונג און אויסאיידלונג פון דעם \"זיך\". די מדה פון אתכפיא איז זייער טייער ביים אויבערשטן און עפנט אויסערגעוויינליכע צנורות ממשיך צו זיין ברכה והצלחה בגשמיות וברוחניות.\n\nבברכה איר זאלט בקרוב אנזאגן אז איר מאכט גוטע געשעפטן.", "content_en": "With G-d's help, 26 Tevet, 5712\nBrooklyn, N.Y.\n\nGreetings and blessings!\n\nI received the checks for Machane Yisrael that you left before your departure, fulfilling and maintaining your good custom.\n\nBeyond the good deed of charity of participating in the broad and comprehensive work of Machane Yisrael — in which the more one does the more praiseworthy — and beyond the merit of not diminishing the measure of charity one was accustomed to give previously (the greatness of which is unnecessary to underscore),\n\nI especially appreciate your current good deed, knowing the test that you surely encountered in doing so — according to how you perceive your own situation at this moment.\n\nThe harder the test, the stronger must be the quality of self-overcoming (atkafya — the ability to overcome one's own inclinations). Beyond the great mitzvah involved, the act of self-overcoming purifies and refines the self. The quality of self-overcoming is very precious before G-d and opens extraordinary channels to draw down blessing and success both materially and spiritually.\n\nWith blessings — may you soon report that you are doing good business.", "summary_en": "The Rebbe praises the donor for maintaining his customary charitable giving to Machane Yisrael despite personal financial difficulties, teaching that the harder the test (nisayon), the more powerful is the act of self-overcoming (atkafya), which opens extraordinary channels of Divine blessing both materially and spiritually.", "scraped": true, "topics_en": ["Gratitude", "Influencing Donors"]}, {"letter": "א'שצא", "summary_he": "חובה להשפיע על אחיו. טעות לחשוב שבגלל שאחיו תומך בו לא יהיו דבריו נשמעים - להיפך!", "url": "http://chabadlibrary.org/books/admur/ig/5/1391.htm", "tags": ["שדרים"], "notes": "", "id": 23, "content_he": "א'שצא\n\nב\"ה ב' שבט, תשי\"ב\n\nברוקלין.\n\nשלום וברכה!\n\nבטח ידוע לו שביקר אצלי אחיו מוה\"ר... שי' ובהמשך לשיחתינו מוסג\"פ העתקת מכתבי אליו - ובטח טוב ונכון הדבר אשר לא ידע אחיו שי' ששלחתי לו העתק המכתב - ומוכרחני לומר שהנני מתפלא ביותר על כבודו שי', כי לפי הרושם שעשה עלי אחיו שי' מקבל הוא השפעה ויש להמשיכו ולקרבו עוד יותר לעניני תורה ויהדות, ובכל זאת כשמדבר אתי לדוגמא עד\"ז שחבר הוא בטעמפעל של הקאנסערוואטיווע, אינו ניכר בו כלל ואינו יודע כלל, שזה דבר שלא כדבעי למהוי.\n\nוהאומנם בדעת כת\"ר שי' אשר מה שהביאו השי\"ת ל... הוא רק כדי שיהנה מטובה של ארצוה\"ב ולא יהי' עוד - ח\"ו היל\"ת - תחת ההרפתקאות שעברו עליו במדינתינו מלפנים, ואח\"כ האי נוחיות שהי' בצרפת? ודבר ברור הוא שכיון שנמצא הוא בעיר אחת עם אחיו שי' והשי\"ת זיכהו שיודע הוא כת\"ר שי' מאור התורה בכלל ותורת החסידות בפרט, הרי מחוייב הוא, ובלשון כ\"ק מו\"ח אדמו\"ר בשם כ\"ק אביו אדמו\"ר (מוהרש\"ב) נ\"ע \"כשם שיהודי צריך להניח תפילין בכל יום, כן בכל יום צריך להתענין בחינוך ב\"ב שיחיו\" ובנדון של כת\"ר שי' זהו אחיו וב\"ב שיחיו אשר על כת\"ר שי' מוטל החוב והזכות קדוש לקרב את לבו ולב כב\"ב של אחיו שי' לעניני תורה ומצות ככל האפשרי, ובלי ספק אשר אם יעבוד בזה מדי יום ביומו ובאותיות המתאימות ובנחת, הנה יצליח בזה,\n\nאפשר הדבר שה\"קלוגינקער\" יבוא אליו בטענה, כיון שמוכרח הוא לקבל מהנ\"ל תמיכה בגשמיות, לא יהיו דבריו נשמעים, אבל אין הדבר כן, כלל וכלל לא, ואין זה אלא מעצת היצר, וזהו חלקם של כל הת\"ח וכל המשפיעים רוחניות, שלפעמים קרובות ביותר, מוכרחים הם לקבל השפעה בגשמיות, דוקא מאלו המושפעים מהם, ואדרבה זהו מחסדי השי\"ת, ויעויין ברעיא מהימנא הובא באגה\"ק סימן כ\"ו, אינון חכמים דדמיין לשבתות ויו\"ט לית להון אלא מה דמתקנין ליה ביומא דחול וכו', ויעויין ג\"כ בספר המצות להצמח צדק דף קי\"ב ע\"ב, במ\"ש רבינו הזקן ע\"ד הנהגת הרב הקדוש ר' מענדל בארער, שהי' נוהג שלא הי' אומר דברי תורה כ\"א במקום שנותנים לו נדבה עיי\"ש היטב.\n\nבברכת הצלחה בהנ\"ל ות\"ח מראש אם יודיעני בשו\"ט בזה.\n\n#### _**א'שצא**_\n\nנדפסה בבטאון חב\"ד גליון יט ע' 18.\n\n**ובלשון... מוהרש** **\"** **ב** **:** ראה אג\"ק שלו ח\"ד אגרת א'כז, ובהנסמן בהערות שם.", "content_en": "With G-d's help, 2 Shvat, 5712\nBrooklyn\n\nGreetings and blessings!\n\nCertainly it is known to him that his brother R' ... visited me, and in continuation of our conversation, enclosed is a copy of my letter to him — and it would certainly be proper that his brother not know that I sent him a copy. And I must say that I am very surprised at his honor: according to the impression his brother made on me, he is receptive to influence and there is potential to draw him closer to Torah and Judaism. And yet, when his honor speaks with me — for example about the fact that his brother is a member of a Conservative temple — it does not appear at all that he is aware that this is something not as it should be.\n\nAnd is it truly in his honor's view that the reason Providence brought his brother here is only so that he should enjoy the material benefits of America — G-d forbid — after all the trials his brother went through in our former country, and the comfort he had later in France? And it is clear that since he is in the same city as his brother, and G-d has granted him knowledge of the light of Torah in general and Chassidus in particular — he is obligated. In the words of the Previous Rebbe in the name of his father the Rebbe (Rashab): \"Just as a Jew must put on tefillin every day, so every day must he be concerned with the Jewish education of his household\" — and in his honor's case, this means his brother and his brother's family. It is incumbent upon him as a duty and a holy privilege to bring his brother's heart and his family's hearts closer to Torah and mitzvot. And there is no doubt that if he works at this daily, in appropriate language and gently, he will succeed.\n\nIt is possible that the \"clever one\" within him will argue that since he is dependent on his brother for material support, his words will not be listened to. But this is not so at all — this is nothing but the advice of the evil inclination. This is the portion of all Torah scholars and spiritual influencers — that very often they are compelled to receive material support from precisely those whom they influence spiritually; and on the contrary, this is from G-d's kindness. See the Zohar cited in Igeret HaKodesh ch. 26: \"Those sages who are like Shabbats and Festivals have only what is prepared for them on weekdays...\" — and also what the Alter Rebbe wrote about the holy Rabbi R' Mendel, who would only speak words of Torah where people gave him a donation.\n\nWith blessings for success in the above, and I thank you in advance if you will inform me of good news in this matter.", "summary_en": "The Rebbe urges the recipient to take responsibility for his brother's spiritual development, dismissing the excuse that receiving material support from his brother would undermine his spiritual influence — citing Chassidic and Talmudic sources showing that Torah scholars often depend materially on those they influence spiritually, and this is actually from G-d's kindness.", "scraped": true, "topics_en": ["Fundraisers & Emissaries"]}, {"letter": "א'תלג", "summary_he": "גודל הזכות לתמוך בחינוך תשב\"ר ע\"י אהל י\"י.", "url": "http://chabadlibrary.org/books/admur/ig/5/1433.htm", "tags": ["פיתוח"], "notes": "", "id": 24, "content_he": "א'תלג\n\nב\"ה, כ\"ה שבט, ה'תשי\"ב\n\nברוקלין, נ.י.\n\nכבוד הנדיב הנעלה, איש ירא אלקים, עסקן\n\nנמרץ ורב פעלים מוכתר במדות תרומיות וכו'\n\nהא' יצחק ני\"ו אלמאליח\n\nשלום וברכה!\n\nמכתבו מיום 13 לחודש פברואר הגיעני, ובו כותב אשר הי' בן לויתו של בא-כוחנו הרה\"ג והרה\"ח וו\"ח אי\"א עוסק בצצ\"ב וכו' מוהר\"ר בנימין נ\"י גארדצקי, בנסיעותיו בכפרים וכו'. גם הרב גארדצקי כתב לי עד\"ז והרבה בשבחו של כ' בעד עבודתו הטובה והמסורה לעזרת מוסדות הק' **אהלי יוסף יצחק ליובאוויטש** **.**\n\nולמותר לי להביע תודתי לכ' עבור זה, כי אמרו רבותינו ז\"ל \"שכר מצוה - מצוה\", היינו המצוה עצמה הוא השכר היותר גדול.\n\n... שמעתי מכ\"ק מו\"ח אדמו\"ר זצוקללה\"ה נבג\"מ זי\"ע שאמר בשם הבעל שם טוב (מייסד תורת החסידות) אשר עד כמה שגדולה אהבת אב לבנו יחידו, הנה גדולה מזו שלא לפי ערך אהבת השם יתברך ויתעלה לבנו בכורו ישראל, לכל אחד ואחד מישראל. והנה מאחר שכבודו מתעסק בעבודת הק' על ידי מוסדות **אהלי יוסף יצחק ליובאוויטש** לקרב כמה וכמה מבני ובנות ישראל לאביהם שבשמים, ישער בנפשו כמה גדול הנחת רוח מזה שגורם למעלה, שהוא שלא בערך מהנחת רוח שיש לאב מבנו יחיד. וגדול זכות עבודתו זו להתברך ממקור הברכות...\n\nהמחכה לשמוע בשורות טובות, בברכה והצלחה.\n\n#### _**א'תלג**_\n\n**כבוד... אלמליח:** אגרות נוספות אליו - לעיל א'רצב. א'שמ.", "content_en": "With G-d's help, 25 Shvat, 5712\nBrooklyn, N.Y.\n\nTo the noble benefactor, a G-d-fearing man, an energetic activist and man of great deeds, crowned with sublime qualities, etc.,\nMr. Yitzchak Almaliah, may he live long:\n\nGreetings and blessings!\n\nYour letter of February 13th reached me, in which you write that you were a companion to our representative, the distinguished Rabbi and Chassid R' Binyamin Gordetsky, may he live, on his journeys to villages, etc. Rabbi Gordetsky also wrote to me about this and greatly praised your good and dedicated work in assistance to the holy institutions of Ohalei Yosef Yitzchak Lubavitch.\n\nIt is superfluous for me to express my thanks to you for this, for our Sages have said: \"The reward of a mitzvah is — the mitzvah itself,\" meaning the mitzvah itself is the greatest reward.\n\nI heard from the Previous Rebbe (of blessed memory) who said in the name of the Baal Shem Tov (founder of Chassidus) that as great as the love of a father for his only child — the love of G-d for His firstborn son Israel is immeasurably greater, for each and every individual Jew. And since you are engaged in holy work through the institutions of Ohalei Yosef Yitzchak Lubavitch to bring many sons and daughters of Israel closer to their Father in Heaven, imagine how great is the Divine satisfaction this causes Above — which is incomparably greater than the satisfaction a father has from his only child. And great is the merit of this work to be blessed from the Source of all blessings.\n\nLooking forward to hearing good tidings, with blessings and success.", "summary_en": "The Rebbe thanks Mr. Yitzchak Almaliah for accompanying the Rebbe's representative and assisting the Ohalei Yosef Yitzchak Lubavitch educational institutions, conveying the Baal Shem Tov's teaching that G-d's love for each Jew surpasses a father's love for his only child — so those who bring Jews closer to G-d cause immeasurable Divine satisfaction.", "scraped": true, "topics_en": ["Donor Development"]}, {"letter": "א'תלט", "summary_he": "אין להסתפק בצדקה: חייבים גם ללמוד", "url": "http://chabadlibrary.org/books/admur/ig/5/1439.htm", "tags": ["השפעה"], "notes": "", "id": 25, "content_he": "א'תלט\n\nב\"ה, אדר\"ח אדר, תשי\"ב\n\nברוקלין.\n\nשלום וברכה!\n\nבאיחור זמן נתקבל מכתבו בו מודיע אשר נשואין שלו יהי' (הי') ביום ח\"י טבת,\n\nוהנני בזה להביע ברכתי ברכת מזל טוב מזל טוב, ושיהי' בשעה טובה ומוצלחת ויבנו בית בישראל על יסודי התורה והמצוה כמבואר בתורת החסידות.\n\nבברכת מזל טוב מזל טוב.\n\nנ\"ב: במה שמסיים במכתבו, בתקוה כי אוכל להתקשר ביתר שאת, הנה ידוע פסק רז\"ל שהכל בידי שמים חוץ מיראת שמים שזהו בידי אדם, ובמילא היכולת בידו להוסיף אומץ בכל הענינים ולהחזיק בכל התקנות של כ\"ק מו\"ח אדמו\"ר זצוקללה\"ה נבג\"מ זי\"ע אשר זהו הדרך להתקשרות ואלו הם הכלים להמשכת וקבלת ברכותיו הק' בכל המצטרך בגו\"ר.", "content_en": "With G-d's help, Rosh Chodesh Adar, 5712\nBrooklyn\n\nGreetings and blessings!\n\nYour letter arrived delayed, in which you inform that your wedding will be (was) on the 18th of Tevet.\n\nI hereby express my blessings: Mazel Tov! Mazel Tov! — may it be in a good and auspicious hour, and may you build a Jewish home upon the foundations of Torah and mitzvot, as explained in the teachings of Chassidus.\n\nWith blessings of Mazel Tov, Mazel Tov.\n\nP.S.: Regarding what you conclude in your letter, with the hope that I will be able to connect with you more and more — it is known as a ruling of our Sages that \"everything is in the hands of Heaven except the fear of Heaven, which is in a person's own hands.\" Therefore, the ability lies in your own hands to strengthen yourself in all matters and to hold fast to all the directives of the Previous Rebbe (of blessed memory) — and this is the path to connection with the Rebbe, and these are the vessels to receive and draw down his holy blessings in all that is needed, spiritually and materially.\n\nWith blessings.", "summary_en": "The Rebbe congratulates the recipient on his marriage with Mazel Tov blessings, and explains that the path to connection with the Rebbe — and the vessel to receive his blessings — lies in the recipient's own hands: strengthening in Torah and mitzvot and adhering to the Previous Rebbe's directives.", "scraped": true, "topics_en": ["Influencing Donors"]}, {"letter": "א'תעג", "summary_he": "ע\"פ דין חייבים להודיע לתורם לאיזה קופה הולך המעות שתרם", "url": "http://chabadlibrary.org/books/admur/ig/5/1473.htm", "tags": ["שדרים"], "notes": "", "id": 26, "content_he": "א'תעג\n\nב\"ה, כ\"ח אדר, תשי\"ב\n\nברוקלין.\n\nהרה\"ח הוו\"ח אי\"א נו\"נ וכו' מוה\"ר נפתלי שי' הכהן\n\nשלום וברכה!\n\nמסרו לי שאלתו (או תמיהתו) במה ששמע ממר ראבינאוויטש שי' אשר בביקורו אצלי ואמר שנותן איזה סכום, אמרתי לו שאכניס את המעות לקופת צדקה מסויימה...", "content_en": "Letter Aleph-Tav-Ayin-Gimmel\n\nWith G-d's help, 28 Adar, 5712\nBrooklyn.\n\nThe esteemed, distinguished, learned chassid, R' Naftali Hakohen, may he live,\n\nPeace and blessing!\n\nThey conveyed to me your question (or surprise) regarding what you heard from Mr. Rabinowitz, that when he visited me and said he wished to donate a certain amount, I told him that I would place the money into a specific charity fund — and you wonder why I felt it necessary to tell him what I would do with the money.\n\nThis is understandable based on the rabbinic teaching (Chullin 94a) that certain things are prohibited because of creating a false impression, which is also cited in the halachic authorities as noted in Ein Mishpat Ner Mitzvah. Since I saw that Mr. Rabinowitz believed these funds would go toward a different purpose, I was obligated by law to inform him that they would go into a specific charitable fund.\n\nI am interested to know whether you take part in public communal affairs in your city, particularly in matters of education.\n\nEnclosed is a discourse of Chassidus from my father-in-law the Rebbe, of righteous and holy memory, which has just been published.\n\nWith greetings from the distinguished chassid R' Chaim Yaakov Gas, and blessings for a kosher and joyous Passover to all of you.", "summary_en": "The Rebbe explains why he informed a donor about the intended destination of his charitable funds, citing the halachic prohibition against creating false impressions, and inquires about the recipient's involvement in communal Jewish education.", "scraped": true, "topics_en": ["Fundraisers & Emissaries"]}, {"letter": "א'תקעב", "summary_he": "הגבלה מסויימת בנתינת צדקה", "url": "http://chabadlibrary.org/books/admur/ig/6/1572.htm", "tags": ["השפעה"], "notes": "", "id": 27, "content_he": "א'תקעב\n\nב\"ה, כ\"ג אייר, תשי\"ב\n\nברוקלין.\n\nשלום וברכה!\n\n... מצרף הוא במכתבו, מה שמפריש בכל שבוע ושבוע, בטח ידוע לו מתקנת אושא דהמבזבז אל יבזבז יותר וכו'...", "content_en": "Letter Aleph-Tav-Kuf-Ayin-Bet\n\nWith G-d's help, 23 Iyar, 5712\nBrooklyn.\n\nPeace and blessing!\n\n...He encloses in his letter [a record of] what he sets aside every single week. He is surely aware of the enactment of Usha that \"one who gives generously should not give away more than a fifth [of his assets],\" etc. Although it is explained in the Epistle on Charity [Iggeret HaKodesh] that matters are different in our time — as elaborated there at length — nevertheless, even so, there should be some limit. It is difficult for me to write about this in greater detail since I am unaware of the basis of his custom. In general, the matter of charity is a good thing and nothing surpasses it, and there is also practical material benefit in it — but nevertheless, one should pause and think carefully about the amounts he sends each week...\n\nI have already conveyed through R. M.Ch.A. that the essential point in everything I discuss with him each time he visits here is to effect within him an expansion of his \"vessels\" — and that he should view himself not as a recipient and helper to others... but rather as a representative and agent of my father-in-law the Rebbe, and accordingly he must fulfill his mission, for he has been granted the powers to do so. It is absolutely clear that the intention of my father-in-law the Rebbe was to transform [the city] into a chassidic city — naturally step by step, as befits all matters of holiness, as it is written \"little by little I will drive them out before you.\" The practical implication is that when an acquaintance presents itself — through someone or through an intermediary matter — he should view that person and the intermediary matter as merely a means to expand his circle of acquaintances, so that he can extend his influence to yet another group of people, and thereby influence more people in strengthening Judaism and ultimately in spreading Chassidic teachings and customs...\n\nWith blessings for the receiving of the Torah in joy and with inner depth.", "summary_en": "The Rebbe counsels regarding the proper limits of charitable giving, and urges a Chabad emissary to view himself as a true agent of the Previous Rebbe with the power and responsibility to expand the circle of Jewish influence in his city.", "scraped": true, "topics_en": ["Influencing Donors"]}, {"letter": "א'תקצב", "summary_he": "עסקים בקושי - צמצמו בצדקה. עשר בשביל שתתעשר", "url": "http://chabadlibrary.org/books/admur/ig/6/1592.htm", "tags": ["השפעה"], "notes": "", "id": 28, "content_he": "א'תקצב\n\nב\"ה, כ\"ו אייר, תשי\"ב\n\nברוקלין.\n\nשלום וברכה!\n\n... ומש\"כ לי שמתאוננים הם שבזמן האחרון, העסקים שלהם הולכים בקושי...", "content_en": "Letter Aleph-Tav-Kuf-Tzadik-Bet\n\nWith G-d's help, 26 Iyar, 5712\nBrooklyn.\n\nPeace and blessing!\n\n...Regarding what he writes to me — that they are complaining that recently their business has been going with difficulty — it is possible that in the past year they somewhat reduced their charitable giving toward Torah and G-d-fearing causes, and therefore it is appropriate that from now on they should increase in this area, and in a measure that appears to them to be beyond what is required of them. The promise of the Holy One, blessed be He is well-known: \"Tithe so that you will become wealthy,\" and regarding the mitzvah of charity in particular G-d says \"Test Me with this.\"\n\nLikewise it is appropriate that their wives, may they live, before lighting candles every Shabbat eve and eve of a holiday, should give some amount (small) to the charity of Rabbi Meir Baal HaNes — and G-d will grant them success — they, their husbands, sons and daughters, may they live — in all that they need. May they all merit to receive the Torah with joy and with inner depth, among all the Jewish people.\n\nWith blessings for the holiday.", "summary_en": "The Rebbe suggests that a family's business difficulties may stem from reduced charitable giving, encourages them to increase their tzedakah beyond what seems required, and recommends that their wives donate to Meir Baal HaNes charity before lighting Shabbat candles.", "scraped": true, "topics_en": ["Influencing Donors"]}, {"letter": "א'תרח", "summary_he": "בהתחלת ענין לא יהיו הוצאות גדולות", "url": "http://chabadlibrary.org/books/admur/ig/6/1608.htm", "tags": ["שדרים"], "notes": "", "id": 29, "content_he": "א'תרח\n\nב\"ה, ג' סיון, תשי\"ב\n\nברוקלין.\n\nועד הנהלת רשת אהלי יוסף יצחק ליובאוויטש באה\"ק ת\"ו\n\nשלום וברכה!\n\nמאשר הנני קבלת מכתבם מכ\"א אייר, ועל מקצת משאלותיהם יש עליהם מענה בתוכן מכתביי הקודמים...", "content_en": "Letter Aleph-Tav-Resh-Chet\n\nWith G-d's help, 3 Sivan, 5712\nBrooklyn.\n\nTo the Board of Directors of the Oholei Yosef Yitzchak Lubavitch Network in the Holy Land, may it be built and established,\n\nPeace and blessing!\n\nI hereby acknowledge receipt of their letter of the 21st of Iyar; some of their questions are addressed in the content of my previous letters, and I will now await a detailed letter regarding the contents of their conversation with Mr. [name omitted] which according to their letter they were supposed to have today.\n\nI was pleased to read in their letter about the results of the fundraising campaign for the establishment expenses of the Network — that ultimately they saw with their own eyes that the heart of Israel is always alert to matters of Torah and mitzvah, and particularly matters connected with the \"living tree\" — the inner dimension of Torah, Chassidic teachings, the ways of Chassidus and the customs of Chassidus. But I have already written that at the beginning it is worthwhile to arrange things so that there will not be large expenses, and this for several reasons. And in my estimate, at the beginning of the work, it is possible to arrange this in a manner that will not diminish the work itself.\n\nAwaiting good tidings and with blessing,\nfor success in their holy work\nand for receiving the Torah with joy\nand with inner depth.\n\nP.S. I received their telegram and have telegraphed to Agudas Chabad and Tzeirei Agudas Chabad to mobilize the appropriate members and students. And I await good tidings.", "summary_en": "The Rebbe acknowledges a letter from the board of the Oholei Yosef Yitzchak Lubavitch school network in Israel, is pleased by their fundraising success, and advises restraint in expenditures at the start of the network's establishment.", "scraped": true, "topics_en": ["Fundraisers & Emissaries"]}, {"letter": "א'תרכה", "summary_he": "צער על העדר צמיכת התמיכה, ברכה לפרנסה", "url": "http://chabadlibrary.org/books/admur/ig/6/1625.htm", "tags": ["השפעה"], "notes": "", "id": 30, "content_he": "א'תרכה\n\nב\"ה, יו\"ד סיון, תשי\"ב\n\nברוקלין, נ.י.\n\nשלום וברכה!\n\nבנועם קבלתי מכתבו מיום ג' א' דהגבלה, כי כבר דאגתי להפסק הארוך בקבלת מכתביו...", "content_en": "Letter Aleph-Tav-Resh-Kaf-Hey\n\nWith G-d's help, 10 Sivan, 5712\nBrooklyn, N.Y.\n\nPeace and blessing!\n\nWith pleasure I received his letter from Tuesday, the first day of Hagbalah [period before Shavuot], for I had already been concerned about the long interruption in receiving his letters, and thank G-d all is well — and apparently there was no particular reason for it.\n\nRegarding what he writes — that there is little hope for increasing the support for our institutions... May G-d help that there be an expansion of means, for thank G-d we see remarkable success — that with every dollar obtained, we accomplish much more than before. (This matter is understood based on what is written in Iggeret HaKodesh, chapter 27 and its explanation — that a \"tzaddik who has departed\" is found \"even more\" present [after his passing], and accordingly success also should be \"even more\"... and there is an additional reason for this based on the rabbinic teaching that G-d prepares the healing before the affliction — since the needs are growing and the active forces have diminished, at least this should be compensated for through success.) May G-d give, from His abundance, which is greater than the principal, also in the future — and according to the saying of my father-in-law the Rebbe: May we merit to be among those to whom G-d gives the expenses for the week on the first day of the week, and not, heaven forbid, among those given on Friday the expenses of the previous week...\n\n[Section regarding mourning practices and halachic opinions of various authorities follows]\n\nWith blessing and respect.", "summary_en": "The Rebbe responds to news of insufficient funding for Chabad institutions, expressing optimism about the effectiveness of every donated dollar, citing kabbalistic and halachic principles about how a Rebbe's influence grows after his passing, and includes a detailed halachic discussion regarding mourning observance.", "scraped": true, "topics_en": ["Influencing Donors"]}, {"letter": "א'תרלז", "summary_he": "למבקש ברכה בעסקיו - חצי ממעשר יתן למוסדות הרבי.", "url": "http://chabadlibrary.org/books/admur/ig/6/1637.htm", "tags": ["השפעה"], "notes": "", "id": 31, "content_he": "א'תרלז\n\nב\"ה, ט\"ז סיון, תשי\"ב\n\nברוקלין.\n\nשלום וברכה!\n\n... מבקש ברכה להצלחה בעסקו...", "content_en": "Letter Aleph-Tav-Resh-Lamed-Zayin\n\nWith G-d's help, 16 Sivan, 5712\nBrooklyn.\n\nPeace and blessing!\n\n...He requests a blessing for success in his business — and evidently he means his material affairs. Known is the saying of the Alter Rebbe [Rabbi Schneur Zalman of Liadi] which we have heard many times from my father-in-law the Rebbe: \"G-d gives Jews material things and they make from the material — spiritual.\" It would be appropriate for him to decide of his own accord that from the profit he has in his business until Yud-Tes Kislev — Rosh HaShanah of Chassidus — he will set aside at least a tithe (Maaser) for charity, and at least half of that toward the holy institutions bearing the name of my father-in-law the Rebbe — which are Oholei Yosef Yitzchak in our Holy Land and in Morocco. And I am confident that he will be able to say — even with physical eyes — that there is an additional measure of success from the moment he accepted this decision upon himself. And one who adds [in charity] is given more in return, and G-d's \"addition\" is greater than the principal.\n\nWith blessing.", "summary_en": "The Rebbe urges a man requesting blessing for business success to commit to tithing from his profits for charity, particularly toward the Oholei Yosef Yitzchak institutions, promising that this will bring increased material success.", "scraped": true, "topics_en": ["Influencing Donors"]}, {"letter": "א'תשיז", "summary_he": "מגבית חירום בשיקאגא. על כ\"א ליתן באופן יוצא מן הכלל", "url": "http://chabadlibrary.org/books/admur/ig/6/1717.htm", "tags": ["בקשה"], "notes": "", "id": 32, "content_he": "א'תשיז\n\nב\"ה, כ\"א תמוז, ה'תשי\"ב\n\nברוקלין, נ.י.\n\nאל ידידנו אנ\"ש וו\"ח אי\"א, כל מחבבי תורה ומצוה, אשר בעיר שיקאגא\n\nשלום רב וברכה!\n\nהמוסדות הק' דליובאוויטש...", "content_en": "Letter Aleph-Tav-Shin-Yud-Zayin\n\nWith G-d's help, 21 Tammuz, 5712\nBrooklyn, N.Y.\n\nTo our beloved Anash [Chabad chassidim] and distinguished men, all who love Torah and mitzvah, in the city of Chicago,\nMay G-d be with them,\n\nGreat peace and blessing!\n\nThe holy Lubavitcher institutions — the central Yeshiva Tomchei Temimim and the institutions under its direction; and the Merkaz L'Inyonei Chinuch (MLC) and the institutions under its direction — their financial situation is very precarious, and it places, heaven forbid, their very existence in danger.\n\nDivine success has hovered over these institutions since their founding, and we witness the Divine spectacle of the growth and expansion of these institutions, bearing fruits and fruits of fruits — which are as \"candles to illuminate\" for our Jewish brethren in all the places of their dwelling. But together with this, the institutions are now in a severe financial crisis that touches the very core of their existence.\n\nThis situation compels us to seek an exceptional source of funds, and it has been decided to organize in Chicago a **united emergency campaign** for the above-mentioned Lubavitcher institutions.\n\nKnowing the relationship of our Jewish brethren in Chicago in general, and Anash of Chicago in particular, toward the great endeavors of my father-in-law the Rebbe, of righteous and holy memory, and their inner desire to come to the aid of the institutions that he founded — I trust that they will once again extend a helping and generous hand to fill their terrible lack.\n\nUpon each and every man and woman of Anash in Chicago rests the duty and privilege to strive in this effort — both through their own participation with an extraordinary sum, and through their influence upon all their acquaintances and friends in this — to thereby help ensure the success of the campaign and enable the existence and development of the institutions going forward, to magnify Torah in G-d-consciousness and glorify it.\n\nAll those who assist and donate are already assured that this great mitzvah of charity will draw upon them and all their household, may they live, G-d's blessings in all that they need — in children, life, and ample sustenance.\n\nWith warm regards, blessing them richly in my name both materially and spiritually,\n\n**M. Schneersohn**", "summary_en": "The Rebbe addresses the Chabad community of Chicago with an urgent appeal for an emergency fundraising campaign to rescue the Lubavitcher Yeshiva and Merkaz L'Inyonei Chinuch institutions from severe financial crisis, promising divine blessings to all who contribute.", "scraped": true, "topics_en": ["Requests"]}, {"letter": "א'תתכח", "summary_he": "בטח ירצו לנדב חצי הסכום לגמור בנין בארה\"ק. ואחכה לבשו\"ט", "url": "http://chabadlibrary.org/books/admur/ig/6/1828.htm", "tags": ["בקשה"], "notes": "", "id": 33, "content_he": "א'תתכח\n\nב\"ה, ז' אלול, ה'תשי\"ב\n\nברוקלין, נ.י.\n\nהוו\"ח אי\"א נו\"נ האחים מו\"ה משה ויוסף יחיו\n\nשלום וברכה!\n\nבהמשך צו אונזער טעלעפאנישן געשפרעך...", "content_en": "Letter Aleph-Tav-Tav-Kaf-Chet\n\nWith G-d's help, 7 Elul, 5712\nBrooklyn, N.Y.\n\nThe distinguished chassidim, the brothers R' Moshe and Yosef Holman, may they live,\n\nPeace and blessing!\n\nIn continuation of our telephone conversation, I wish hereby to express my satisfaction at the interest you have shown in the matter of undertaking, on your part, to donate the second half of the sum needed for the building in the Holy Land, upon which your distinguished father, may he live, had donated the first half.\n\nI consider it unnecessary to elaborate on the importance and necessity of the matter, which is surely self-evident to you.\n\nI wish only to underscore two points:\n\nOur sages, of blessed memory, say that the merit of a mitzvah is attributed to the name of those who complete it. That is — in that your father, may he live, carried out the first half of this matter and you will complete it with the second half, you thereby take a share also in the portion of your father, may he live.\n\nAt the same time, this also strengthens your father's participation, since the entire matter will bear the name of the Holman family.\n\nAnd since a building in the Land of Israel, may it be built and established, connected with education in holiness and purity, is among the eternal things — both materially and spiritually — I am certain that you will gladly contribute the second half, and thereby acquire for the entire Holman family, may they live, the great and eternal merit connected with it, particularly in these current days of the month of Elul — the month of Divine mercy and acceptance.\n\nI hope that you will bring me joy with the good news regarding your good decision.\n\nWith blessings for a good inscription and sealing to them and their household, may they live.", "summary_en": "The Rebbe writes to the Holman brothers in Yiddish encouraging them to complete the funding for a building in Israel by donating the second half, as their father had donated the first half, and explains the spiritual merit of completing a mitzvah.", "scraped": true, "topics_en": ["Requests"]}, {"letter": "א'תתל", "summary_he": "אפוטרופוס על עזבון: שישלח כסף לתו\"ת", "url": "http://chabadlibrary.org/books/admur/ig/6/1830.htm", "tags": ["בקשה"], "notes": "", "id": 34, "content_he": "א'תתל\n\nב\"ה, ז' אלול, ה'תשי\"ב\n\nברוקלין, נ.י.\n\nשלום וברכה!\n\nעס האט מיר געפרייט צו הערן, אז איר זייט דער אפוטרופוס אויף דער צוואה פון...", "content_en": "Letter Aleph-Tav-Tav-Lamed\n\nWith G-d's help, 7 Elul, 5712\nBrooklyn, N.Y.\n\nPeace and blessing!\n\nIt has pleased me to hear that you are the executor of the will of [the deceased]... and that you are making every effort to ensure that the inheritance designated for a yeshiva will go toward a building for Yeshivat Tomchei Temimim.\n\nBeyond the fact that Yeshivat Tomchei Temimim is a unique yeshiva where one studies both the revealed Torah and the inner Torah — Chassidus — and is the only one of its kind, it also provides the better ability to fulfill what our sages of blessed memory said: \"It is a mitzvah to fulfill the words of the deceased.\" For since the will cannot be fulfilled exactly as written, one must fulfill it as closely and fittingly as possible to the words of the departed, may he rest in peace. And as is known, Yeshivat Tomchei Temimim was founded in Russia and later moved to Poland and then here [to the United States].\n\nTherefore this is also fitting to the words of the deceased.\n\nIt is surely unnecessary to elaborate on the great merit of spreading Torah — the revealed and the inner — and since you have been appointed as the executor of the will, this is a sign that you are worthy of this merit and capable of carrying it through to reality. I wish only to emphasize two points:\n\nFirst, particularly in the mitzvah of Torah study, time is of the essence — for every day that passes cannot be made up with the next day, as each day has its own obligation of Torah study.\n\nSecond, although you are merely the intermediary and the money comes from another — nevertheless, since in your hands lies the ability to advance this matter in a positive direction or to delay it, the measure of action is yours, and the merit thereof is immeasurable. And the sooner you bring the matter to a good conclusion, the greater the merit...\n\nI will be pleased to hear the good news that the matter of the will is being carried out as soon as possible — for in this you have heavenly assistance, as the Talmud says: \"One who comes to purify himself is given assistance.\"\n\nWith blessings for a good new year. Awaiting good tidings.", "summary_en": "The Rebbe writes in Yiddish to an executor of a will, encouraging him to direct the estate's funds toward Yeshivat Tomchei Temimim, explaining why this is most fitting to the deceased's wishes and emphasizing the urgency and great merit of acting quickly.", "scraped": true, "topics_en": ["Requests"]}, {"letter": "א'תתפד", "summary_he": "רבי מכבד עשירים. עשר בשביל שתתעשר", "url": "http://chabadlibrary.org/books/admur/ig/7/1884.htm", "tags": ["בקשה"], "notes": "", "id": 35, "content_he": "א'תתפד\n\nב\"ה, ג' מ\"ח, תשי\"ג\n\nברוקלין.\n\nשלום וברכה!\n\nמיט פארגעניגן האב איך זיך דערוואוסט אז בא אייער זון מר... שי' איז געבארן געווארן א זון למזל טוב...", "content_en": "Letter Aleph-Tav-Tav-Peh-Dalet\n\nWith G-d's help, 3 Marcheshvan, 5713\nBrooklyn.\n\nPeace and blessing!\n\nWith pleasure I have learned that your son, Mr. [name], may he live, has been blessed with the birth of a son — mazal tov! I wish to express to you and your wife, may she live, my blessing of mazal tov, and ask you to also convey my mazal tov to your son and his wife, may she live. May G-d grant them to bring him into the covenant of our father Abraham at a good and auspicious time, and to raise him for Torah, the marriage canopy, and good deeds — with material abundance. And may the grandparents on both sides have from him true Jewish nachas, Chassidic nachas...\n\nThe Midrash tells that when the sages asked: if G-d wants circumcision among Jews, why did He not create man already circumcised? — the sages answered that many things in the world were created in a manner that needs to be repaired, and that is the purpose of the human being — that he should repair the creation. It is self-evident that G-d does not, heaven forbid, need to come to the human being — for from above, there exists the possibility to create an already-perfected thing. But G-d wanted to grant merit to Israel, so that everything of the \"children, life, and livelihood\" that He gives to Jews should not be merely a gift but also earned. Therefore He left a place and possibility for a Jew to perform G-d's mission — and thus all the good things he will afterward receive will not be \"bread of shame\" but earned through his service of G-d. And the more good that G-d gives a Jew, this itself is evidence and proof that the Jew must add in the service that is demanded of him.\n\nThis is also one of the reasons why \"Rebbe [Rabbi Yehudah HaNassi] honored the wealthy\" — because whatever a wealthy person gives from his money to charity — to private individuals or institutions — in truth G-d, who feeds the entire world with His goodness, could have provided the sustenance directly to those individuals or institutions. He merely makes the wealthy person His agent so that he should give them their portion that lies with him. And this is only from G-d's kindness — He gives a Jew another opportunity to demonstrate his service, to give charity with money that in truth belongs to others, though the evil inclination can convince him it is entirely his own. Therefore \"Rabbi [Yehudah HaNassi] honored the wealthy\" — because G-d tests the wealthy person with the difficult trial of wealth. And also because — \"one carries according to one's strength\" — since he has the ability to withstand this test, therefore when he does stand firm in the test, in addition to the reward for performing the mitzvah of charity, there is an additional reward: \"Tithe so that you will become wealthy\" — through giving charity, not only is there no loss of what he gave away, but it actually draws additional wealth beyond what he had previously.\n\n[Footnote: The Midrash — see Bereishit Rabbah 11:6 and references there.]", "summary_en": "The Rebbe congratulates a grandfather on the birth of a grandson and, using the occasion, delivers a profound Chassidic teaching in Yiddish about why G-d made humans in need of perfecting — so that their blessings should be earned rather than gifts — and elaborates on why G-d uses wealthy people as His agents to distribute His bounty.", "scraped": true, "topics_en": ["Requests"]}, {"letter": "א'תתקיח", "summary_he": "האחריות להמשיך העבודה במל\"ח גדולה, חסרון בממון נחשב כאין לגבה", "url": "http://chabadlibrary.org/books/admur/ig/7/1918.htm", "tags": ["שדרים"], "notes": "", "id": 36, "content_he": "א'תתקיח\n\nב\"ה, יום ראשון, כ\"ח מ\"ח, ה'תשי\"ג\n\nברוקלין, נ.י.\n\nאל האסיפה המיוחדה של ה\"מרכז לעניני חינוך\"\n\nשלום וברכה!\n\nלהאספכם היום יחד...", "content_en": "Letter Aleph-Tav-Tav-Kuf-Yud-Chet\n\nWith G-d's help, Sunday, 28 Marcheshvan, 5713\nBrooklyn, N.Y.\n\nTo the Special Assembly of the \"Merkaz L'Inyonei Chinuch\" [MLC],\nMay G-d be with them,\n\nPeace and blessing!\n\nAs you gather today together to hear a report on the activities and good work of the \"Merkaz L'Inyonei Chinuch\" and to discuss its material situation — I hereby express my blessing that you succeed in finding the advice and ways of how to strengthen this holy institution, to establish it upon a firm foundation, and to give it the ability to expand the scope of its influence.\n\nThe institution \"Merkaz L'Inyonei Chinuch\" was founded by my father-in-law the Rebbe, of righteous and holy memory, and was precious to him with a special love and affection. Every single man and woman of Anash, may they live — according to their capacity and circumstances — is obligated to participate in this work, both in open labor and in hidden labor — in the field of spreading kosher education, sustaining it, and preserving Judaism in its traditional purity in all corners of the world.\n\nThe supply of the necessary means to the \"Merkaz L'Inyonei Chinuch\" is greatly connected to the expansion and spread of the work and outreach in general, and in particular to the founding and maintenance of schools of kosher education in the places most in need, at the very least.\n\nThe responsibility that rests upon all of our shoulders is great, and filling the monetary deficit is as nothing compared to it.\n\nI trust that each and every one of those assembled today — and through them, certainly, the contents of this call of mine will be conveyed to our other friends, Anash, may they live, as it is obviously directed at them as well — will weigh the words stated here, and take to heart the magnitude of the responsibility that rests upon them, and endeavor with all their ability to help the work of the \"Merkaz L'Inyonei Chinuch\" in all its branches — and thereby give it the ability to fulfill its mission and function, which was imposed upon it by its founder, my father-in-law the Rebbe, to fulfill them in accordance with his will.\n\nMay G-d grant each one of us to actualize all his good resolutions fully, and with material and spiritual abundance.\n\nWith blessings for great success.", "summary_en": "The Rebbe addresses a special assembly of the Merkaz L'Inyonei Chinuch (MLC), calling on Chabad chassidim to fulfill their obligation to support this institution founded by the Previous Rebbe, and stressing that the spiritual responsibility to maintain kosher Jewish education far outweighs the financial challenge.", "scraped": true, "topics_en": ["Fundraisers & Emissaries"]}, {"letter": "א'תתקצד", "summary_he": "תודה על החלטתו לתרום. הוראה מייצור נפט", "url": "http://chabadlibrary.org/books/admur/ig/7/1994.htm", "tags": ["תודה"], "notes": "", "id": 37, "content_he": "א'תתקצד\n\nב\"ה, כ\"ו טבת, תשי\"ג\n\nברוקלין, נ.י.\n\nשלום וברכה!\n\nאיך בין געווען צופרידען צו באקומען א גרוס פון אייך פון דעם טעלעפאנישן געשפרעך מיט הרה\"ח אי\"א נו\"נ עוסק בצ\"צ רב פעלים מוהרחמ\"א שי' חדקוב...", "content_en": "Letter Aleph-Tav-Tav-Kuf-Tzadik-Dalet\n\nWith G-d's help, 26 Tevet, 5713\nBrooklyn, N.Y.\n\nPeace and blessing!\n\nI was pleased to receive your greeting through the telephone conversation with the esteemed chassid R' M.Ch.A. Chadakov, regarding the meeting you had with R' Eliyahu Simpson — and about the good and fortunate decision, made at a good and auspicious hour: that from the income which will come, with G-d's help, from the sources of the \"Be'er Sheva Company,\" a certain portion will be dedicated to the various charities which have been founded and are led by me in the spirit of my father-in-law, the Rebbe, leader of Israel.\n\nKnown is the saying which we heard from my father-in-law the Rebbe — that when a Jew down here below makes a good decision to give charity in a large amount, even if at that very moment he does not see the possibility of how he will be able to fulfill it in practice — above, immediately, a verdict is issued for him of livelihood in abundance, in such measure that he will indeed be able to fulfill his good resolution in actual practice. And I am certain that in your case as well — although until now this has not been the case — since you and your partner have accepted with full heart this good decision, certainly above a verdict has already been issued to grant you livelihood with abundance and success, so that you will be able to actualize your good intention with a joyful heart and with an open hand.\n\nIt is known that one explanation of how oil comes to be is that it forms from the dead bodies of animals that lay under tremendous pressure for a long period of time, and from this came oil, which is used to warm and to illuminate.\n\nAnd known is the saying of the holy Baal Shem Tov that from every thing a Jew hears and sees, one is shown from above that he should derive from it a lesson in his service and mission in this world — and particularly in something one encounters day after day, which must serve as a lesson for each of us in our mission in this world.\n\nOne must reflect on this: that material-physical things have no self-sustaining life — as one can see from oneself, that one's vitality comes from the soul — and G-d has bound the soul to the body, the meaning of which is that one should press upon (put pressure on) the material desires and inclinations, and when there is proper pressure from the soul upon the body, even the body — which by itself is a lifeless thing — becomes a thing that warms its surroundings and illuminates the entire environment. The moral application of this is clear and self-evident.\n\nI wish to repeat my wish and blessing: May G-d grant you success in livelihood as mentioned above, and may you be able to carry out your good decision in practice, and even in a much greater measure than you currently envision.\n\nWith blessing.", "summary_en": "The Rebbe congratulates businessmen on their decision to donate a portion of company profits to Chabad institutions, assuring them based on the Previous Rebbe's teaching that such a decision immediately triggers a heavenly decree of abundance, and offers a Chassidic teaching about transforming material things into spiritual light.", "scraped": true, "topics_en": ["Gratitude"]}, {"letter": "ב'לג", "summary_he": "גביר שמתחרט על נדבתו - ההסבר האמיתי", "url": "http://chabadlibrary.org/books/admur/ig/7/2033.htm", "tags": ["השפעה"], "notes": "", "id": 38, "content_he": "ב'לג\n\nב\"ה, ד' אדר, ה'תשי\"ג\n\nברוקלין, נ.י.\n\nשלום וברכה!\n\n...אף שאין מדרכי להתערב בענינים כאלו, אבל כנראה שהשאור שבעיסה התפשטה ביותר ובמילא יוצא אני מגדרי...", "content_en": "Letter Bet-Lamed-Gimmel\n\nWith G-d's help, 4 Adar, 5713\nBrooklyn, N.Y.\n\nPeace and blessing!\n\n...Although it is not my practice to intervene in matters such as these, but apparently the \"leaven in the dough\" [the evil inclination] has spread too much, and therefore I am going beyond my usual approach in the following lines, and I write in Yiddish so that they need not be translated from one language to another:\n\na) As is explained in books, and as is also the simple faith of every Jew: the Almighty, and only the Almighty, is the One \"who nourishes and sustains all\" — whether individuals, institutions, or organizations — as we say in Grace after Meals, in the first blessing which Moses our teacher enacted: \"Our G-d, King of the universe, who feeds the entire world with His goodness... for He is the G-d who nourishes and sustains all.\"\n\nJust as G-d wishes to grant Jews merit through mitzvot, it often happens that G-d tests a person and places in his hands the money that is actually another person's sustenance, or an institution's sustenance — and then watches from above to see whether the one entrusted with the funds is trustworthy and understands that this money belongs to G-d and that he has merely been privileged with the mission of conveying it to another. If it turns out that the person can be trusted, then aside from the reward for performing the mitzvah of charity — \"the fruits of which one enjoys in this world while the principal remains for the World to Come\" — he will continue to be kept \"in his post\" by G-d, so that G-d will continue to send him on this mission — meaning: success in his business and livelihood to sustain certain other individuals or institutions, so that he should be the \"channel\" through which livelihood flows to others.\n\nNaturally, the evil inclination cannot stand by and watch such a thing, and seeks all manner of ways to convince the person that the money he earns is not because G-d wills it so, but because he himself is a great sage and great merchant — and therefore he earns the money through his own power and intellect, and since it is so, he is the master over the money, and another person who is \"foolish\" and cannot earn as much money is therefore lower than he, and he will do him a favor and give him a few cents...\n\n[The letter continues at length with a Chassidic analysis of the spiritual responsibility of wealthy people and the consequences of failing to act as faithful stewards of G-d's resources — and then describes a specific situation involving a donor who had pledged funds for printing a book of ethical teachings, then reneged on his promise.]\n\nWith blessing for true physical health and true spiritual health, that G-d will give him the desire to carry out G-d's will, and thereby all the above will be resolved for the good as soon as possible.", "summary_en": "The Rebbe writes a lengthy letter in Yiddish addressing a conflict over a pledge to print a book of ethical teachings, using the occasion to deliver a profound teaching about the spiritual responsibility of those entrusted with wealth — that they are merely G-d's agents to distribute His bounty — and the serious consequences of betraying that trust.", "scraped": true, "topics_en": ["Influencing Donors"]}, {"letter": "ב'לד", "summary_he": "צדקה לארה\"ק - לכל לראש לעניני תומ\"צ שהם יסוד קיומנו בה", "url": "http://chabadlibrary.org/books/admur/ig/7/2034.htm", "tags": ["השפעה", "פיתוח"], "notes": "", "id": 39, "content_he": "ב'לד\n\nב\"ה, ה' אדר, תשי\"ג\n\nברוקלין.\n\nהוו\"ח אי\"א נו\"נ עוסק בצ\"צ מוה\"ר ברוך שי'\n\nשלום וברכה!\n\nאיך האב באקומען אייער בריף פון ג' יתרו...", "content_en": "Letter Bet-Lamed-Dalet\n\nWith G-d's help, 5 Adar, 5713\nBrooklyn.\n\nThe distinguished chassid, accomplished, G-d-fearing, occupied in public service etc., R' Baruch, may he live,\n\nPeace and blessing!\n\nI received your letter from [the Shabbat of parshat] Yitro [i.e., early February], a response to my letter to you, and I am interested to know whether you received a response to your telegram and letter to the Jewish Appeal, and what is the content of their reply.\n\nHowever, one must know: when one wishes to help our Holy Land, it must be done by strengthening there the matters of Torah and mitzvot. For the Almighty, blessed be He, cannot be outsmarted — and if He has, blessed be He, exiled us from our land, it is not because the Romans and Vespasian wanted it so, but because \"due to our sins we were exiled from our land.\" And the Land of Israel is a land — as written in our holy Torah (end of parshat Acharei) — that \"does not tolerate sins.\" Therefore, every person who truly wishes to help the Holy Land and desires the true good of our Holy Land and the Jews who dwell there — the first thing one must safeguard is this very point, and not allow oneself to be convinced that there are more important or even equivalent matters. In the maintenance of a building and its existence, the foundation must be sound — and if, heaven forbid, the foundation is unsound and ill-fitted, the larger the structure, the more it not only brings no benefit but in fact causes harm, heaven forbid.\n\nSince one should not speak of the Land of Israel except when it relates to an actual practical matter, I therefore find it difficult to elaborate on this. And particularly since I am certain that for you, even the brief will be sufficient.\n\nYou write in your letter about the electric saw for Kfar Chabad which you wish to send, but the freight must be paid. I would like to know approximately what sum the freight would cost, and also whether a permit (license) is needed to import the saw into the Holy Land, may it be built and established.\n\nI wish you a joyous Purim! And until Purim, may you also utilize the time to strengthen matters of Torah and mitzvot — which is never too much, and when one truly wishes [to do so], G-d grants success in fulfilling the mitzvot joyfully and in a joyous manner.\n\nWith blessings for Purim.", "summary_en": "The Rebbe writes to R' Baruch Litvin in Yiddish advising that any assistance to Israel must be rooted in strengthening Torah and mitzvot, as that is the true foundation of the land's welfare, and inquires about the logistics of shipping an electric saw to Kfar Chabad.", "scraped": true, "topics_en": ["Influencing Donors", "Donor Development"]}, {"letter": "ב'צ", "summary_he": "המוסד היחידי בליובאוויטש שמוציא פחות מההכנסה. צ\"ל בטחון והתרחבות הפעולות, ובמילא ירבה ההכנסה", "url": "http://chabadlibrary.org/books/admur/ig/7/2090.htm", "tags": ["שדרים"], "notes": "", "id": 40, "content_he": "ב'צ\n\nב\"ה, כ\"ז ניסן, תשי\"ג\n\nברוקלין.\n\nהנהלת חברת קופת בחורים דישיבת תומכי תמימים ליובאוויטש\n\nשלום וברכה!\n\nבנועם קבלתי מכתבם ובו תאור עבודתם ודו\"ח...", "content_en": "Letter Bet-Tzadik\n\nWith G-d's help, 27 Nissan, 5713\nBrooklyn.\n\nTo the Board of the Students' Loan Fund (Kuppat Bachurim) of the Lubavitch Yeshivat Tomchei Temimim,\nMay G-d be with them,\n\nPeace and blessing!\n\nWith pleasure I received their letter containing a description of their work and a report, and may G-d grant them success in their work — materially and spiritually alike.\n\nWhat is remarkable is that an institution connected with my father-in-law the Rebbe, of righteous and holy memory, should limit its expenditures so strictly that they never exceed its income. It seems to me that this is the only institution within the four cubits of Lubavitch that conducts itself this way. I would not have intervened in this, were it not for my concern that because of this policy of not allowing expenditures to exceed income, they are also restraining their work even in places where it is necessary — and it is surely unnecessary to elaborate on the concept of trust in G-d in general. I come here only with an observation and illumination: that it would be worthwhile to apply the virtue of trust in G-d in this particular matter as well, and to see that if they increase expenditures in proportion, certainly more sources of income will be found for them. And perhaps on the contrary this is the very way — as is explained in Chassidus regarding the distinction between \"limbs\" and \"vessels\": limbs not only receive vitality but also draw vitality; and from this it is understood that by expanding the \"limb channels,\" one draws greater vitality.\n\nAnd in accordance with all the above — to have the means to use in a case of deficit — enclosed herewith is a loan from one of the funds in my possession, in the amount of 200 shekels, and thereby they have in hand the ability to increase expenditures immediately by at least 200 shekels beyond their income.\n\nWith blessings to all those involved with this fund — the participants and those who assist them — may G-d grant the House of Chabad that their need to give a loan should be not because of material necessity, but only in order to thereby become a \"chariot\" for the attribute of Kindness [Chesed] of Atzilut, as related in the talk of my father-in-law the Rebbe (5701/1941).\n\nWith blessings for success and all good.", "summary_en": "The Rebbe commends the Kuppat Bachurim (Students' Loan Fund) of Tomchei Temimim but gently challenges their policy of never spending beyond income, suggesting they apply more trust in G-d and expand their activities, and encloses a 200-shekel loan to help them begin doing so.", "scraped": true, "topics_en": ["Fundraisers & Emissaries"]}, {"letter": "ב'צט", "summary_he": "אין להתפעל מדפיצית. להרבות בצנורות ההכנסה - תלמידים, ואח\"ז להשתדל גם בגשמיות", "url": "http://chabadlibrary.org/books/admur/ig/7/2099.htm", "tags": ["שדרים"], "notes": "", "id": 41, "content_he": "ב'צט\n\nב\"ה, ח' אייר, תשי\"ג\n\nברוקלין.\n\nשלום וברכה!\n\nמאשר הנני קבלת מכתביהם מב' וה' אייר עם המצורף להם.", "content_en": "Letter Bet-Tzadik-Tet\n\nWith G-d's help, 8 Iyar, 5713\nBrooklyn.\n\nPeace and blessing!\n\nb) I hereby acknowledge receipt of their letters of 2nd and 5th Iyar with the enclosed materials.\n\nb) Regarding what they wrote about the deficit this year being more than four thousand dollars — in general there is nothing to be alarmed about. It might be worthwhile to hold a special campaign for paying off debts, which would then not interfere with the annual campaign and regular income — or at most interfere only in a very minor way, in which case it would still be worthwhile. And I have long written to several of our institutions that the matter of income and expenditure of an institution of my father-in-law the Rebbe, of righteous and holy memory, is not as they think — that since there are large expenditures one should reduce the number of students etc. Rather, the solution is to multiply the channels of income. And since before something flows materially it first flows spiritually — and the spiritual channels of income are the students and their holy studies — the very first thing to do is to increase the influence at its source by increasing the quantity and quality of study and the quantity and quality of students, and afterward to work at drawing this down materially below. The practical conclusion is obvious and simple.\n\nc) What they wrote regarding the time that the assistant teachers (Ramiim) spend in commerce — this does not address the argument.\n\nThe argument was not that during the time they are supposed to be studying in the yeshiva they are walking the streets, but that in their minds they are wandering through the markets and streets — proof of which is that their business paraphernalia are already ready, etc. — so that the instant study time ends according to the schedule, the books are shut in the blink of an eye, and already standing ready with his case, etc., they are transformed in an instant from residents of the study hall into street idlers rushing to the place where they imagine their livelihood and their family's livelihood is to be found. In that case it is impossible that during study time as well their thoughts and manner of speech are not already being prepared for the commerce to which they rush immediately upon the lesson's end.\n\nd) The excess of time devoted to secular studies and physical exercise over the time of holy studies — is alarming. And [this despite the fact that] \"will you also conquer the queen in the house with me?!\"\n\nMay G-d help each one of us not to exchange the essential with the trivial — for such an exchange is inherently wrong, and furthermore it even ruins the secondary matters, as is obvious.\n\nWith blessings for success in their holy work.\n\nPostscript: Enclosed is the pamphlet published for Lag B'Omer, by which they will surely merit the public. And continuing the content of my letter — in this discourse as well the great importance of focused attention is explained, as it is specifically through this that something comes into actual practice; see there. And known is the story of my father-in-law the Rebbe in the name of the Chassid R' Binyamin Kletzkier — that when he wrote in one of his business ledgers the summation \"there is nothing besides Him [G-d],\" and was asked how it is possible that while engaged in business he occupies himself with Chassidic teachings, he replied: all the more so, by a fortiori reasoning — for if while standing before G-d [in prayer], thoughts of Kletsk [his business concerns] fall upon him, certainly all the more so while engaged in Kletsk, there is reason for pure and holy thoughts to fall upon him. And it would be worthwhile to explain this story to all Anash who are businessmen — and all the more so to those who, according to the wish of my father-in-law the Rebbe, were supposed to be \"dwellers of the tent [of Torah]\" and have recently done something new — they have become businessmen. The length of all the above is truly unnecessary.", "summary_en": "The Rebbe advises a yeshiva administration on handling their financial deficit, urging them to expand student enrollment rather than cut it, and critiques the teachers who spend too much mental energy on business matters and the excessive time devoted to secular studies over Torah studies.", "scraped": true, "topics_en": ["Fundraisers & Emissaries"]}, {"letter": "ב'קלא", "summary_he": "תרומתו כוללת ג' אהבות. לכשירחיב יתן עוד. צדקה עם גופו ונה\"ב - עניים אמיתיים", "url": "http://chabadlibrary.org/books/admur/ig/7/2131.htm", "tags": ["תודה", "השפעה"], "notes": "", "id": 42, "content_he": "ב'קלא\n\nב\"ה, ט\"ו סיון, תשי\"ג\n\nברוקלין.\n\nהוו\"ח אי\"א נו\"נ וכו' מוה\"ר מענדל שי'\n\nשלום וברכה!\n\nאין בין געווען צופרידען צו באקומען א גרוס פון אייך דורך הרה\"ג הרה\"ח...", "content_en": "Letter Bet-Kuf-Lamed-Aleph\n\nWith G-d's help, 15 Sivan, 5713\nBrooklyn.\n\nThe distinguished, accomplished, G-d-fearing chassid R' Mendel, may he live,\n\nPeace and blessing!\n\nI was pleased to receive a greeting from you through the rabbi, R' Shlomo Zalman Hecht, may he live — and a true Jewish Chassidic greeting — meaning not only one connected with love of Israel, since \"all Israel are sureties for one another,\" but also one connected with love of Torah and love of G-d, blessed be He. And in addition to what R' Hecht writes to me about you in general, he also writes to me that with your good will you have taken upon yourself a good resolution for a great matter, in which all three of the above-mentioned elements are present — love of Israel, love of Torah, and love of G-d — and that is: to contribute a fixed sum for the support of one of the educational institutions \"Oholei Yosef Yitzchak Lubavitch,\" which bear the name of my father-in-law the Rebbe, of righteous and holy memory.\n\nIn general, when one helps a Jew, in whatever way, this is a matter of love of Israel. When one helps in a matter of Torah study, this is a matter of love of Torah. And especially when the matter involves raising Jewish children in an education of G-d-consciousness, this is also a matter of love of G-d — since according to the teachings of the Baal Shem Tov, as we have heard many times from my father-in-law the Rebbe, the three loves — love of Israel, love of Torah, and love of G-d — are one single thing.\n\nR' Hecht also writes to me about the amount you have decided to give for the time being, given your limited circumstances, and I hope that through the good deed of giving this amount to charity, the promise of our sages, of blessed memory, will be fulfilled: \"Tithe so that you will become wealthy\" — and accordingly, in time you will also have the ability to add to this amount \"when G-d expands your borders,\" in accordance with the need of the matter, and in such a way that it will not constrict you — not only spiritually, but not materially either.\n\nAnd may G-d grant that for long and good years you should do charity with other Jews, and especially with Jewish children, by supporting an institution of education in G-d-consciousness — and also to do charity with yourself, especially with your body and animal soul, which are the truly destitute — by adding in Torah study in general and in the study of Chassidic teachings in particular. May G-d grant you success in this with good health, and may we hear from one another good tidings materially and spiritually.\n\nWith blessing.", "summary_en": "The Rebbe writes in Yiddish to R' Mendel, expressing pleasure at his commitment to support a Chabad educational institution, explaining that such support combines love of Israel, love of Torah, and love of G-d, and encourages him to increase his giving as his financial situation improves.", "scraped": true, "topics_en": ["Gratitude", "Influencing Donors"]}, {"letter": "ב'תשכב", "summary_he": "לקחת פנסי' ממשלתית בכדי להעבירו לצדקה", "url": "http://chabadlibrary.org/books/admur/ig/9/2722.htm", "tags": ["בקשה", "השפעה"], "notes": "", "id": 43, "content_he": "ב'תשכב\n\nב\"ה, ט' סיון, תשי\"ד\n\nברוקלין.\n\nברכה ושלום!\n\n... צווישען אנדערע זאכען האט מיר אייער מאן שי' אויך דערציילט וועגען דעם געזעץ פון אייער לאנד...", "content_en": "Letter Bet-Tav-Shin-Kaf-Bet\n\nWith G-d's help, 9 Sivan, 5714\nBrooklyn.\n\nBlessing and peace!\n\n...Among other things, your husband, may he live, also told me about the law of your country — that after the age of seventy, every citizen receives a certain pension from the government — and that you are considering whether you should take it or not.\n\nEvery thing that occurs in the world, and especially among Jews, is by Divine Providence and contains a special meaning and content. When a Jew has the possibility to increase his share in matters of Torah and mitzvot — and all the more so if this possibility comes without excessive strain on the person's part — it must be received as a hint from Above: that certainly it can be utilized in a good way, meaning according to the guidance of our holy Torah. And if the person's [financial] situation is such that he does not need the money for his own livelihood, it is certainly clear that through this money he can increase his portion in giving charity — or, more precisely, to give away all the money to charity, and particularly such charity as is connected with drawing Jewish hearts closer to our Father in Heaven.\n\nTherefore I consider that in your case as well — since the general law entitles you to a certain sum each month — it would be no more than right and also a privilege for you to utilize this right in health, and through it to increase, in a significant way, your and your husband's participation in the charity that deals with educating Jewish children to make them more Jewish and to be Jews as our holy Torah demands. And may G-d help you both, together with your husband, for long and good years, to give charity with an open and full hand, in health and with joy.\n\nWith blessing.", "summary_en": "The Rebbe writes in Yiddish to a woman, advising her to accept her government pension and donate the funds to Jewish education and charity, interpreting this financial opportunity as a Divine hint to increase her share in Torah and mitzvot.", "scraped": true, "topics_en": ["Requests", "Influencing Donors"]}, {"letter": "ב'תתקעט", "summary_he": "מגבית למורוקו - בסכומים מועטים פועלים הרבה. אפילו להלוואה יש הגבלות", "url": "http://chabadlibrary.org/books/admur/ig/10/2979.htm", "tags": ["השפעה"], "notes": "", "id": 44, "content_he": "ב'תתקעט\n\nב\"ה, כ\"ד תשרי, תשט\"ו\n\nברוקלין.\n\nשלום וברכה!\n\n...מה שכותב אודות המגבית שערך הרה\"ח אי\"א נו\"נ עוסק בצ\"צ וכו' מוה\"ר בן ציון שי' שם טוב שד\"ר לטובת המוסדות חינוך אהלי יוסף יצחק ליובאוויטש במאראקא...", "content_en": "Letter Bet-Tav-Tav-Kuf-Ayin-Tet\n\nWith G-d's help, 24 Tishrei, 5715\nBrooklyn.\n\nPeace and blessing!\n\n...Regarding what he writes about the fundraising campaign conducted by the distinguished chassid R' Ben Tzion Shem Tov, may he live, fundraiser (shaddar) for the benefit of the educational institutions Oholei Yosef Yitzchak Lubavitch in Morocco, which are under my leadership:\n\nThe matter is correct and true, and it is certainly unnecessary to elaborate on what is known and widely recognized — that the poverty and distress there is very great, and accordingly matters of Torah and mitzvot suffer greatly there as well, and particularly in the field of education in holiness and purity. On the other hand, since the standard of living there is low, with relatively small amounts — compared to other countries — one can accomplish great things. And although, thank G-d, already thousands upon thousands of Jewish boys and girls are studying in the Oholei Yosef Yitzchak Lubavitch institutions in Morocco — every additional amount added to the fund adds yet more Jewish children into the walls of the Talmud Torah and the yeshivas mentioned above. And although one does not take the [financial] situation into account and borrows [to maintain the institutions], nevertheless loans are limited, as is understood.\n\nPlease convey thanks and blessing to all those who participated in the above-mentioned campaign — both the donors and those who facilitated it — who will certainly have fulfilled by G-d the promise: \"Tithe so that you will become wealthy,\" and accordingly they will strengthen their resolve in this for the future, to give more and more.\n\nWith blessing and all good — awaiting good news in all the above.", "summary_en": "The Rebbe acknowledges a fundraising campaign for the Oholei Yosef Yitzchak Lubavitch educational institutions in Morocco, emphasizing the great need and effectiveness of donations there, and promises that contributors will merit G-d's blessing of increased prosperity.", "scraped": true, "topics_en": ["Influencing Donors"]}, {"letter": "ג'תיח", "summary_he": "כל התומכים חייבים להיזהר ממפלגתיות, וזהו יסוד הצלחת ליובאוויטש במקומות וזמנים שונים", "url": "http://chabadlibrary.org/books/admur/ig/11/3418.htm", "tags": ["השפעה"], "notes": "", "id": 45, "content_he": "ג'תיח\n\nב\"ה, כ\"ו ניסן, תשט\"ו\n\nברוקלין.\n\nהוו\"ח אי\"א נו\"נ עוסק בצ\"צ מוה\"ר מרדכי שי'\n\nשלום וברכה!\n\nנאכן ליינגערען איבעררייס בין איך געווען צופרידען צו לייענען אייער בריף...", "content_en": "Letter Gimmel-Tav-Yud-Chet\n\nWith G-d's help, 26 Nissan, 5715\nBrooklyn.\n\nThe distinguished chassid R' Mordechai (Ritsch, Melbourne), may he live,\n\nPeace and blessing!\n\nAfter the long interruption, I was pleased to read your letter with the enclosed clippings and photographs, and with joy I read about the success of the dedication ceremony of the yeshiva — from which one can be convinced again and again that the Jewish heart is always awake and alert to Torah and mitzvot, if only one approaches with the right words and in a fitting manner. And this will certainly add courage to all those who participated in the dedication and preparation to continue doing so further and in an even greater measure and with more strength — which will also certainly add and multiply the blessings of G-d and success in this, particularly since the yeshiva is a matter that touches upon the public, and \"the merit of the many depends upon them.\"\n\nAnd I hope it is unnecessary to call the attention of all the supporters and workers of the yeshiva, that one must be guarded from anything that could be interpreted as partisan (belonging to a political party) — even if the party in question would be found appropriate for some of the workers — in order not to give any diminishment whatsoever to the crossing of the yeshiva's threshold by all Jews who observe Torah and mitzvot, regardless of party affiliation. And this has always been the basis of the success of the work of Lubavi
