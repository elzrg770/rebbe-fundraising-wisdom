.\n\nבכלל איז גלייכער און בעסער צוטיילען, וואס דענסטמאל ווערט די גאנצע געלט פארנוצט בפועל, לויט די הוראות חז\"ל, אז הקב\"ה גיט א מעגליכקייט צו מקיים זיין א מצוה, דארפמען דאס ניט אפלייגען אויף שפעטער.\n\nא גרעסערן טייל פון די געלט - א טייל זאל געגעבן ווערן אויף דרוקן די ספרים פון רבותינו נשיאנו זצוקללה\"ה, וואס דאס איז א אייביקער זכות, וואס יעדער מאל וואס עס ווערט געלערנט אין דע ספרים, האבן דע וועלכע האבן ערמעגליכט אין דעם אפדרוקן א זכות.\n\nאון השם יתברך זאל פירן אין דאס אלץ אויבן געזאגט ווי גוט ס'איז באמת, טוב אמיתי, מתוך מנוחה שמחה וטוב לבב.", "content_en": "With G-d's help [Kislev 5721]\n\nIn reply to your letter of 13 Tevet, in which you ask: whether to distribute the money to charity [now] or establish a permanent endowment fund.\n\nIn general, it is more proper and better to distribute now, so that all the money is put to actual use — in keeping with the teaching of our Sages: when G-d gives an opportunity to fulfill a mitzvah, one should not defer it to later.\n\nIn line with the above, a larger portion of the money should be distributed by yourself now rather than through an agent (since performing a mitzvah oneself is preferable). Distributing it personally is also a segulah for long life and good years.\n\nI must also point out that from the money it would be very fitting to allocate a portion for printing the books of our Rebbes of blessed memory — for this is an eternal merit: every time those books are studied, those who enabled their printing have a share in that learning.\n\nMay G-d lead all the above to be truly good for long and good years — with peace of mind, joy and goodness of heart.", "summary_en": "The Rebbe advises that it is better to distribute charitable funds immediately rather than create an endowment, citing the principle of prompt mitzvah performance, and recommends allocating part toward printing the Rebbes' books — an eternal merit.", "scraped": true, "topics_en": []}, {"letter": "ז'תקעג", "summary_he": "", "url": "https://chabadlibrary.org/books/admur/ig/20/7573.htm", "tags": [], "notes": "", "id": 83, "content_he": "ז'תקעג\n\nב\"ה, כ' שבט, תשכ\"א\n\nברוקלין.\n\nמו\"ה אשר שי'\n\nשלום וברכה!\n\nבמענה למכתבו מר\"ה לאילנות.\n\nבעת רצון יזכירו את האברך...שי' על הציון הק' של כ\"ק מו\"ח אדמו\"ר.\n\nבשאלתו בשם מנדב - הרוצה לכתוב בצוואה שלו, שלאחרי מאה ועשרים שנה יותן רכושו למוסד באה\"ק ת\"ו, שיבנה שם בנין למקום תורה על שמו.\n\nפשוט ונוח הרבה יותר, באם ירשמו הרכוש על שם מוסד הנמצא בחו\"ל ויש לו מחלקות ושטח עבודה ופעילה באה\"ק ת\"ו (ובהוספה בצוואה שהרכוש ניתן במיוחד לבנות בו מקום תורה באה\"ק ת\"ו). ובאם תתקבל סברא האמורה - יורשם זה על שם המרכז לעניני חינוך.\n\nנ.ב. בהנוגע לנסיעת כת\"ר, כבר מלתי אמורה שאין דעתי נוחה כלל - לעבור קו התאריך באמצע ימי הספירה.\n\nבכבוד וברכה. מ. שניאורסאהן", "content_en": "With G-d's help, 20 Shevat, 5721 — Brooklyn\n\nR' Asher Abramson, may he live,\n\nGreetings and blessings!\n\nIn reply to his letter of Tu BiShvat.\n\nAt an auspicious time I will mention the young man at the holy gravesite of the Previous Rebbe.\n\nRegarding his question in the name of a donor who wishes to bequeath his estate in his will to an institution in the Holy Land to build a Torah center in his name:\n\nIt is much simpler and more convenient to register the estate under the name of an institution located in the diaspora that has branches and active work in the Holy Land (with an added clause in the will that the estate is given specifically to build a place of Torah in the Holy Land). If this approach is accepted, it should be registered under the name of Merkaz L'Inyonei Chinuch.\n\nAlternatively, it could be registered under the name of the Australian branch of Merkaz (if it has official standing there), or through the yeshiva or Beit Rivka — though those are more limited in scope. If one specifically wants to name a Holy Land institution, one may write: 'The Spiritual Council of Kfar Chabad' or 'The Administration of Beit Rivka of Kfar Chabad.'\n\nP.S. Regarding your honor's planned travel — I have already stated that I strongly disapprove of crossing the International Date Line during the Omer counting period.\n\nWith respect and blessing,\nM. Schneerson", "summary_en": "The Rebbe advises on structuring a will bequest for a Torah institution in Israel, recommending registration under Merkaz L'Inyonei Chinuch (which has diaspora status with Israeli branches), and adds a postscript discouraging travel that crosses the International Date Line during Sefirat HaOmer.", "scraped": true, "topics_en": []}, {"letter": "ז'תשצה", "summary_he": "חשיבות התמיכה בחינוך דור הצעיר", "url": "https://chabadlibrary.org/books/admur/ig/21/7795.htm", "tags": [], "notes": "", "id": 84, "content_he": "ז'תשצה\n\nב\"ה, ה' טבת, תש\"ה\n\nברוקלין, נ.י.\n\nשלום וברכה!\n\nמכתבו, בצירוף ההמחאות של מר פ. ראטענבערג נתקבלו. ות\"ח על טרחתו בזה.\n\nתקותי חזקה, אשר מכאן ולהבא יתענין כבו', וכן אחיו הנכבדים שי', בעבודת המרכז לעניני חינוך לכל פרטי' ויתנו לנו עזרתם בכל אפשריותם ויכלתם.\n\nבפרשת השבוע על הפסוק ואת יהודא שלח לפניו - פירש\"י לתקן לו בית תלמוד, כי קודם שבא יעקב למצרים - מקום חדש - כבר הכין לו שם בית מדרש, ודאג לחינוך בניו ובנותיו.\n\nוכמו שהוא במקום כך הוא בזמן, שכל הרוצה שגם בעתיד יהי' דור ישרים יבורך מבני ובנות ישראל עליו להשתדל לעשות בעוד מועד כל ההכנות הדרושות לזה, וזהו ענין החינוך.\n\nבתקוה לשמוע ממנו בענינים של פועל לעתים תכופות, ובברכה לאלתר לתשובה לאלתר לגאולה.", "content_en": "With G-d's help, 5 Tevet, 5705 — Brooklyn, N.Y.\n\nGreetings and blessings!\n\nHis letter, together with the checks of Mr. P. Rotenberg, were received. Many thanks for his efforts.\n\nI strongly hope that from now on your honor, and his distinguished brothers, will take interest in the work of Merkaz L'Inyonei Chinuch in all its details and give us their help to the full extent of their ability.\n\nIn this week's Torah portion, on the verse 'And Judah he sent before him' — Rashi explains: to prepare for him a house of study, for before Jacob arrived in Egypt (a new place), he already prepared a house of Torah study there and provided for the education of his sons and daughters.\n\nJust as this is true of place, so it is true of time: whoever wishes that the future yield 'a generation of the upright who will be blessed' from among Israel's sons and daughters must strive while there is still time to make all the necessary preparations — and this is the matter of education: guiding children from their youngest years in the good and upright path.\n\nHoping to hear from him frequently in practical matters, and with the blessing: Immediately to repentance, immediately to Redemption.", "summary_en": "The Rebbe thanks the recipient for donations to Merkaz L'Inyonei Chinuch and urges his active involvement, drawing on Rashi's teaching that Jacob sent Judah ahead to Egypt specifically to establish a house of Torah study — showing that Jewish education must be the first priority.", "scraped": true, "topics_en": []}, {"letter": "ז'תתלו", "summary_he": "על שד\"ר להוסיף בעבודתו כל יום", "url": "https://chabadlibrary.org/books/admur/ig/21/7836.htm", "tags": [], "notes": "", "id": 85, "content_he": "ז'תתלו\n\nב\"ה, ח\"י אלול, תש\"ח\n\nהרה\"ח הוו\"ח אי\"א נו\"מ וכו' מהורש\"ח שי'\n\nשלום וברכה!\n\nבמענה על מכתבו מוא\"ו אלול:\n\nא) שמחתי לשמוע אשר כבר ניגש בפו\"מ לעבודתו בקודש בתור שד\"ר. וידועה ההנהגה בזה שבכל יום ויום צ\"ל מוספת ועליונה יותר מיום שלפניו.\n\nב) בענין אופן קירוב בהכנ\"ס - נשתנה עתה מהות ואיכות קהל בנ\"י בפאריז. ועל אתר ימצאו הדרך המתאימה לכאו\"א. ובלבד שיניחו המ\"ש מן הצד ויחזיקו בפעולה ועשי' - גאר בפשטות.\n\nג) בענין שיתנו מעות נפנה במחנו לעניני המל\"ח שם - אין תנאים מתאימים בשביל המל\"ח עתה.\n\nד) מוסג\"פ הקונט' לח\"י אלול שזה עתה הו\"ל.\n\nאסיים בברכת כוח\"ט לו ולכב\"ב ולכל המושפעים ממנו ואיחול הצלחה בעבודתו בקודש.\n\nהמחכה לבשו\"ט מכת\"ר, מ.שניאורסאהן", "content_en": "With G-d's help, 18 Elul, 5708\n\nTo R' Shmuel Chaim Kaselman, may he live,\n\nGreetings and blessings!\n\nIn reply to his letter of 6 Elul:\n\n1) I was pleased to hear that he has already begun in actual practice his holy work as a fundraiser (shaddar). The known practice in this regard is that each day must be of a higher and greater level than the previous one.\n\n2) Regarding the manner of drawing close people in the synagogue — the nature and character of the Jewish community in Paris has changed from when I lived there. On the spot one will find the appropriate approach for each individual — as long as one sets aside depression and holds on to action and doing — in complete simplicity.\n\n3) Regarding having the Maamed members contribute to Merkaz L'Inyonei Chinuch there — conditions are not currently suitable.\n\n4) Enclosed is the Kuntres for Chai Elul, just published — without doubt he will use it to benefit the public.\n\nI conclude with a blessing of Ketiva VaChatima Tova for him, his household, and all those he influences — and with wishes for success in his holy work.\n\nAwaiting good news,\nM. Schneerson", "summary_en": "The Rebbe responds to a fundraiser (shaddar) in Paris on Chai Elul, encouraging him to grow daily in his holy work, advising on community outreach, and noting that current conditions are not suitable for Merkaz L'Inyonei Chinuch fundraising there.", "scraped": true, "topics_en": []}, {"letter": "ז'תתצו", "summary_he": "בקשת עזרה מקרן הצלה", "url": "https://chabadlibrary.org/books/admur/ig/21/7896.htm", "tags": [], "notes": "", "id": 86, "content_he": "ז'תתצו\n\nב\"ה, י\"א כסלו, תשי\"ב\n\nברוקלין, נ.י.\n\nמו\"ה שמואל שי' ברוידע יו\"ר \"קרן ההצלה\" - שיקגו\n\nשלום וברכה!\n\nהרבנים הנכבדים מוהר\"ר שמואל שי' לויטין ומוהר\"ר אלי' שי' סימפסון סיפרו לי מביקורם אצל מע\"כ שי' ודברו בשבחו בעד יחסו הטוב שהראה לעבודת ליובאוויטש במקצוע ההצלה והחינוך והבטחתו להיות לנו לעזר על ידי \"קרן ההצלה\".\n\nחושבני כי למותר הוא להרחיב הדיבור לדכוותי' על דבר ההכרח החיוני שבעבודתנו זו, לא רק להחזיק מעמד אלא גם להרחיבה ולהגדילה, כי בנפש כמה וכמה מבני ובנות ישראל הוא.\n\nוהנני כופל בקשתי לכ\"מ שי' ביחוד, אשר מכיר הוא בטיב עבודה זו, ובטוח אני אשר ישתדל בכל עוז אשר קרן ההצלה תקציב עזר הגון הן בעד עבודתנו באירופה ובארה\"ק ת\"ו והן בעד עבודתנו בצפון אפריקה.\n\nוזכות כ\"ק מו\"ח אדמו\"ר זצוקללה\"ה בטח תעמוד לו בהמשיך ולהשפיע לו שפעת ברכה והצלחה.\n\nבברכה.", "content_en": "With G-d's help, 11 Kislev, 5712 — Brooklyn, N.Y.\n\nR' Shmuel Broide, may he live, Chairman of 'Keren HaHatzalah' [Rescue Fund], Chicago,\n\nGreetings and blessings!\n\nRabbis Shmuel Laitin and Eliyahu Simpson told me of their visit with your honor and spoke highly of your good attitude toward Lubavitch's work in rescue and education, and of your promise to help us through Keren HaHatzalah.\n\nI believe it is unnecessary to elaborate to someone of your stature regarding the vital necessity of our work — not only to maintain its current scope, but to expand and increase it, for it involves the very souls of many sons and daughters of Israel.\n\nI therefore reiterate my request to your honor in particular, who knows the quality of this work — not merely by hearsay but from personal observation. I am confident that you will strive with all your strength to ensure that Keren HaHatzalah allocates a fitting grant for our work in Europe and the Holy Land, and for our work in North Africa.\n\nMay the merit of the Previous Rebbe of blessed memory stand for you to continue pouring upon you an abundance of blessing and success.\n\nWith blessing.", "summary_en": "The Rebbe urges Shmuel Broide, Chairman of Keren HaHatzalah in Chicago, to secure a substantial grant from the Rescue Fund for Lubavitch's vital work in Europe, Israel, and North Africa.", "scraped": true, "topics_en": []}, {"letter": "ז'תתקב", "summary_he": "עדיף לתמוך במוסדות חינוך מלכתוב ס\"ת", "url": "https://chabadlibrary.org/books/admur/ig/21/7902.htm", "tags": [], "notes": "", "id": 87, "content_he": "ז'תתקב\n\nב\"ה, ט\"ו שבט תשי\"ב\n\nברוקלין.\n\nברכה ושלום!\n\nאיך האב ערהאלטען אייער פדיון נפש דורך הרה\"ח מוה\"ר יעקב יהודא שי' העכט, אין וועלכן ער שרייבט מיר אויך דאס וואס איר האט עם דערציילט פון אייער פארגאנגענהייט, און אויך שרייבען א ספר תורה אין אייער נאמען, און שיקען די ספר תורה אין ארץ ישראל.\n\nזיכער איז איבעריג צו אונטערשטרייכן די הייליקייט פון א ספר תורה, אבער עס איז פראן דאס וואס איז נאך מער הייליקער ווי א ספר תורה, און דאס זיינען די אידען וועלכע לערנען די תורה.\n\nאיז מיין עצה דעריבער: וויבאלד קיין ספרי תורה פעלט ניט יעצט אין ארץ ישראל, דאגעגען גאר נויטיג גאלד אויף אויסצוהאלטן מלמדים, קויפן סידורים חומשים - זאלט איר זיך נאכפרעגן וויפיל וואלט קאסטן א ספר תורה צו שרייבן. און דעם סכום מיט א צוגאב אוועקגבן פאר גרינדן נאך א חדר אדער א תלמוד תורה אין ארץ ישראל און אין צפון אפריקה, און אויך שיקן צו זיי סידורים.\n\nדי גרויסקייט פון דעם זכות איז שווער איבערצוגבן אין ווערטר. השי\"ת זאל אייך העלפן איר זאלט פארריכטן אינגאנצן אייער פארגאנגנהייט.\n\nבברכה.", "content_en": "With G-d's help, 15 Shevat, 5712 — Brooklyn\n\nBlessing and peace!\n\nI received your pidyon nefesh through R' Yaakov Yehuda Hecht, may he live, in which he also writes what you told him about your past... and your wish to write a Sefer Torah in your name and send it to the Land of Israel.\n\nCertainly it is unnecessary to emphasize the holiness of a Sefer Torah. But there is something even holier than a Sefer Torah — and that is the Jewish people who learn the Torah.\n\nTherefore my advice: since there is no shortage of Sifrei Torah in the Land of Israel (they were brought from European countries), whereas money is very much needed to maintain teachers and purchase siddurim and chumashim — you should find out how much a Sefer Torah would cost, and give that amount plus an addition toward founding a cheder or Talmud Torah in Israel and North Africa, and also send siddurim to the children there.\n\nThe greatness of the merit you will receive is difficult to convey in words. May G-d help you that you should fully rectify your past.\n\nWith blessing.", "summary_en": "The Rebbe advises a woman who wished to write a Sefer Torah to instead redirect the funds toward establishing a cheder or Talmud Torah for children in Israel and North Africa, since the Jewish children who learn Torah are 'even holier than a Sefer Torah.'", "scraped": true, "topics_en": []}, {"letter": "ז'תתקנה", "summary_he": "כדי להצליח בגיוס כספים בארה\"ב - צריך ליכנס בחלון אחרי שזורקים אותך מהדלת..", "url": "https://chabadlibrary.org/books/admur/ig/21/7955.htm", "tags": [], "notes": "", "id": 88, "content_he": "ז'תתקנה\n\nב\"ה, ד' אדר תשי\"ג\n\nברוקלין.\n\nמוהרש\"י שי'\n\nשלום וברכה!\n\nמוסג\"פ מכתבי מענה באופן רשמי על החלטתם בהאסיפה. ולפלא קצת על החלטתם. כי בטח סיפר מוהר\"א שי' וואלף איך שנסע לעשות מגבית בהיותו כאן, וכן הר\"מ שי' גורארי'. כן בל\"ס ידוע להם הקישויים שפוגש הרב קיפניס שי' ועתה הרב הבלין שי', אשר בהנ\"ל יש גם מומחים למקצוע אוסף כספים, ובכ\"ז הוא כנ\"ל.\n\nוכפי הידיעות שיש לי ממהותו של הרב... שי', הרי לכאורה אינו מתאים כלל להיות שד\"ר לאסוף כספים ובפרט במדינה זו, שנמצאים בכל מקצוע ובכל ענין כו\"כ מהם, וכאלו שכבר נעשו מומחים למקצוע זה מכמה שנים, אז מען ווארפט זיי ארויס דורכן טיר קריכן זיי דורכן פענסטער ובבת שחוק וסבר פנים יפות.\n\nבכבוד ובברכה, מ. שניאורסאהן", "content_en": "With G-d's help, 4 Adar, 5713 — Brooklyn\n\nTo R' Shimon Yosef Zevin, may he live,\n\nGreetings and blessings!\n\nEnclosed is my formal reply regarding their decision at the assembly. I am somewhat puzzled by their decision. Surely R' A. Wolf, may he live, told them what happened when he came here to conduct a fundraising campaign, as did R' M. Gurary. And without doubt they know the difficulties being encountered by Rabbi Kipnis and now Rabbi Hablin — and these are experts in fundraising — and still the situation is as described.\n\nAccording to the information I have about the character of the Rabbi in question, he appears not at all suited to be a fundraiser (shaddar) to collect money — especially in this country, where in every field there are many experts who have become seasoned professionals over many years. And as they say: when you throw them out the door they crawl back through the window — with a smile and a cheerful countenance, etc.\n\nWith respect and blessing,\nM. Schneerson", "summary_en": "The Rebbe expresses puzzlement at a committee's decision to send a particular rabbi as a fundraiser to America, noting that even seasoned expert fundraisers struggle in the competitive American fundraising environment, and the proposed candidate seems ill-suited for the role.", "scraped": true, "topics_en": []}, {"letter": "ח'קכז", "summary_he": "הכתיבה אודות גיוס כספים למען הישיבה גורם נח\"ר", "url": "https://chabadlibrary.org/books/admur/ig/21/8127.htm", "tags": [], "notes": "", "id": 89, "content_he": "ח'קכז\n\nב\"ה, ה' אלול, תשי\"ז\n\nברוקלין.\n\nמר נתן נטע שי'\n\nשלום וברכה!\n\nאין ענטפער אויף אייער בריף, אין וועלכן איר שרייבט וועגן דער השתדלות לחיזוק הישיבה הק' תו\"ת בלוד, ולחיזוק כפר חב\"ד.\n\nהשי\"ת זאל העלפן, אז די השתדלות זאל זיין בהצלחה גדולה. זעלבסט פארשטענדליך, אז עס איז א גלייכע זאך צו מודיע זיין וועגן דאס אויבנגעזאגטע, ווארום אז מען פארשאפט פארגעניגן צו א אידן, אפילו אזא וועלכער געפינט זיך אויף דעם אנדער זייט ים, איז דאס דער קיום המצוה פון ואהבת לרעך, ובפרט אז מען זעט במוחש, אז דאס אליין וואס מען ווייסט אז מען וועט נאך וועמען שרייבען וועגן די פעולות טובות, פארשטארקט דאס די פעולות.\n\nגעוויס ווייסט איר פון די תקנה צו זאגן דעם שיעור תהלים חדשי, יעדער טאג נאך דעם דאוונען אין דער פרי.\n\nבברכת כתיבה וחתימה טובה. בשם כ\"ק אדמו\"ר שליט\"א - מזכיר", "content_en": "With G-d's help, 5 Elul, 5717 — Brooklyn\n\nMr. Natan Nota Holtzman, may he live,\n\nGreetings and blessings!\n\nIn reply to your letter in which you write about your efforts to strengthen the holy Tomchei Temimim yeshiva in Lod and Kfar Chabad.\n\nMay G-d help that the efforts succeed greatly. It is self-understood that it is fitting to report on this to others, for when one gives joy to a Jewish person — even someone on the other side of the ocean — this fulfills the commandment 'Love your neighbor as yourself.' And especially since one can see tangibly that the mere knowledge that someone will write about good deeds actually strengthens those deeds and causes one to add to them.\n\nCertainly you know about the practice of reciting the monthly Psalms schedule — each day after morning prayers. At any rate, you should begin doing so from now on.\n\nWith the blessing of a good inscription and sealing [for the New Year],\nOn behalf of the Rebbe, may he live — Secretary", "summary_en": "Written by the Rebbe's secretary on his behalf, this letter encourages Mr. Natan Nota Holtzman in his efforts to strengthen Tomchei Temimim in Lod and Kfar Chabad, explaining that sharing good news is itself a fulfillment of 'Love your neighbor,' and reminds him to recite the daily Psalms portion.", "scraped": true, "topics_en": []}, {"letter": "ח'קסה", "summary_he": "אין לעשות מגבית כסף באה\"ק ת\"ו בשביל מוסדות חב\"ד שבחו\"ל", "url": "https://chabadlibrary.org/books/admur/ig/21/8165.htm", "tags": [], "notes": "", "id": 90, "content_he": "ח'קסה\n\nב\"ה, כ\"ח מ\"ח, תשי\"ט\n\nברוקלין.\n\nשלום וברכה!\n\nבמענה למכתבו מי\"ב חשון:\n\nא) אין לעשות מגבית כסף באה\"ק ת\"ו בשביל מוסדות חב\"ד שבחו\"ל, בה בשעה שישנם כמה מעניני חב\"ד באה\"ק ת\"ו הזקוקים לכספים. שמהנ\"ל מובן שאין לערוך שום מגבית בשביל המל\"ח. ובאים בחשבון רק ישיבת תומכי תמימים וקרן הבנין, כמו עד עתה, או עניני הרשת וצעירי אגו\"ח.\n\nב) כל ענין מגבית כסף אי אפשר שמי שיהי' הגובה, הוא יהי' ג\"כ העומד בראש.\n\nבכלל - שהנסיון הראה במוחש, אז מען ווארפט זיך יעדער מאל צו א נייע ארבעט, אין זה תועלת לאיזה ענין, כי אם פזור הנפש. שעפי\"ז מובן: כיון שכבר מתעסק בקרן הבנין והפצת ספרי קה\"ת, אין לחפש דוקא ענינים חדשים.\n\nבברכה לבשו\"ט. בשם כ\"ק אדמו\"ר שליט\"א, א. קווינט מזכיר", "content_en": "With G-d's help, 28 Marcheshvan, 5719 — Brooklyn\n\nGreetings and blessings!\n\nIn reply to his letter of 12 Cheshvan:\n\n1) One may not conduct a fundraising campaign in the Holy Land for Chabad institutions abroad, while there are Chabad matters in the Holy Land itself that require funding. From the above it follows that no campaign should be held for Merkaz L'Inyonei Chinuch. Only Tomchei Temimim yeshiva and the Building Fund — as until now — or the Chabad network institutions and Tzeirei Agudat Chabad are eligible. Regarding this, he must come to an agreement with the institutions in the Holy Land.\n\n2) In any fundraising matter, it is impossible for the collector to simultaneously be the one who leads the campaign.\n\nIn general — experience has shown that when one constantly jumps to new work, this benefits nothing — only scatters the soul. Therefore, since he is already involved with the Building Fund and distributing Kehot books, there is no need to seek new projects.\n\nWith blessing for good news.\nOn behalf of the Rebbe, may he live — A. Kvindt, Secretary", "summary_en": "Written by the Rebbe's secretary, this letter rules that fundraising campaigns in Israel cannot be run for Chabad institutions abroad, and cautions against constantly starting new projects rather than deepening one's existing commitments.", "scraped": true, "topics_en": []}, {"letter": "ט'סה", "summary_he": "שלח צ'ק בלי סכום, מחזירים לו שימלא סך $3000 שמצוה בו יותר מבשלוחו", "url": "https://chabadlibrary.org/books/admur/ig/24/9065.htm", "tags": [], "notes": "", "id": 91, "content_he": "ט'סה\n\nב\"ה, ימי חנוכה, ה'תשכ\"ו\n\nברוקלין, נ.י.\n\nמו\"ה חיים שי'\n\nשלום וברכה!\n\nעל ידי הרב מוה\"ר מנחם שמואל דוד הלוי שי' רייטשיק שד\"ר נתקבל הפ\"נ שלו, שייקרא על ציון כ\"ק מו\"ח אדמו\"ר, ויחד עם זה נתקבלה ההמחאה שהסכום נשאר פנוי על מנת שאקבע גודל הסכום לפי דעתי.\n\nוהנה בהתאם לחודש זה הוא חודש הנסים, יש לקבוע הסכום בתור נתינתו ראשונה לצדקה השקולה כנגד כל המצות לשלשת אלפים שקל (3,000$).\n\nוכיון שאמרו חכמינו ז\"ל מצוה בו יותר מבשלוחו, ונתינת הצדקה צריכה להיות דוקא מתוך שמחה וטוב לבב, מצורף בזה הטשעק על מנת שכ' ימלא אותו בכתיבת יד עצמו, וכאמור, מתוך שמחה וטוב לבב ואז יחזירנה.\n\nויהי רצון שיקויים בו ובחנוני נא בזאת גו' עשר בשביל שתתעשר.\n\nבברכה לבריאות ולהצלחה.", "content_en": "With G-d's help, Days of Hanukkah, 5726 — Brooklyn, N.Y.\n\nR' Chaim Mushkowitz, may he live,\n\nGreetings and blessings!\n\nThrough Rabbi Menachem Shmuel David HaLevi Reitchik, a fundraiser (shaddar), his pidyon nefesh was received — which will be read at the gravesite of the Previous Rebbe — and together with this, a blank check was received with the amount to be determined by my opinion.\n\nIn keeping with this being the month of miracles (Hanukkah), the amount should be set — as his first donation to charity, which is equal in weight to all the commandments — at three thousand dollars ($3,000).\n\nSince our Sages taught that performing a mitzvah oneself is preferable to doing it through an agent, and charity must be given with joy and goodness of heart, the check is enclosed for your honor to fill in his own handwriting — with joy and goodness of heart — and then return.\n\nMay it be G-d's will that the conclusion of that talk be fulfilled for him: 'Test me please in this... tithe so that you will become wealthy.'\n\nWith blessing for health and success.", "summary_en": "During Hanukkah, the Rebbe sets $3,000 as R' Chaim Mushkowitz's first major charitable donation, returns the blank check for him to fill personally (since performing a mitzvah oneself is preferable), and invokes the promise: 'Tithe so that you will become wealthy.'", "scraped": true, "topics_en": []}, {"letter": "י'קפא", "summary_he": "לומר תודה על קיום מצות צדקה א\"א, אבל להביע קורת רוח כן", "url": "https://chabadlibrary.org/books/admur/ig/27/10181.htm", "tags": [], "notes": "", "id": 92, "content_he": "י'קפא\n\nב\"ה, ט\"ו תמוז, ה'תשל\"א\n\nברוקלין, נ.י.\n\nמו\"ה אהרן שי' וזוג' תחי'\n\nשלום וברכה!\n\nלקראת חגיגת קשו\"ת של בנם הרב אביגדור שי' עם ב\"ג שתחי' בשעה טובה ומוצלחת,\n\nיהי רצון מהשי\"ת שיהיו בשעה טובה ומוצלחת ולבנין עדי עד על יסודי התורה והמצוה.\n\nנ.ב. נוסף על עצם השמחה דענין השידוך, שמחתי להוודע על נדבתם הממשית בסך של 5000$ בקשר לפעולות. ובודאי יודעים אשר אף שבכלל אין לנסות את ה', יצאה מצוות הצדקה שנאמר עלי' ובחנוני נא בזאת. ולזאת שמחתי שההתנדבות הביאה תיכף בחינה טובה, ברכה הכי גדולה להורים לראות בנם הבכור מתחיל בהסתדרות בחיי משפחה כראוי.\n\nבעד מצוה כצדקה שהיא טוב לשמים טוב לבריות - אבל יש מקום להביע גודל הקורת רוח שגרמו לי וגם בעד ההקלה בעול התקציב של ליובאוויטש.", "content_en": "With G-d's help, 15 Tammuz, 5731 — Brooklyn, N.Y.\n\nR' Aharon Weingarten and his wife, may they live,\n\nGreetings and blessings!\n\nOn the occasion of the engagement celebration of their son, Rabbi Avigdor, may he live, to his intended, may she live — in a good and auspicious hour:\n\nMay it be G-d's will that they be in a good and auspicious hour and build an everlasting home on the foundations of Torah and mitzvos.\n\nP.S. In addition to the joy of the engagement, I was pleased to learn of their substantial $5,000 donation to Lubavitch activities. And certainly they know that while one generally should not 'test G-d,' the mitzvah of charity is an exception — about which it is said: 'Test me please in this...' Therefore I was pleased that the donation immediately brought the greatest blessing for parents — to see their eldest son beginning to build a family.\n\nFor a mitzvah like charity — which is good for Heaven and good for people — one need not say 'thank you.' But there is room to express the great satisfaction it caused me, and the significant relief of the burden of Lubavitch's budget through their timely donation.", "summary_en": "The Rebbe blesses R' Aharon Weingarten's son on his engagement, connecting their $5,000 donation to Lubavitch with the good news — an illustration of the principle that charity can be 'tested' for reward, with the joyful result being immediate.", "scraped": true, "topics_en": []}, {"letter": "י'רב", "summary_he": "ביאור בהא ד\"רבי מכבד עשירים\"", "url": "https://chabadlibrary.org/books/admur/ig/27/10202.htm", "tags": [], "notes": "", "id": 93, "content_he": "י'רב\n\nב\"ה, ט' אלול, ה'תשל\"א\n\nברוקלין, נ.י.\n\nמו\"ה משה שי'\n\nשלום וברכה!\n\nכיון שנוגע לפי' מחז\"ל (שהביא מר בשמי) יוצא הנני מגדרי - ואבאר יותר את הנלפענ\"ד במחז\"ל (עירובין פו, א) \"רבי מכבד עשירים\" שרבים עמלו בפירושו:\n\nמוכרח בסוגיא שם שכוונת מחז\"ל לעשירים כפשוטם. דוקא רבי בהיותו בעצמו עשיר מופלג ידע מנסיונו ריבוי הנסיונות המתעוררים ע\"י עשירות. ביחד עם זה האמין באמונה שלימה שהקב\"ה אין כוונתו כלל להכשיל את האדם ואינו מבקש אלא לפי כחו. ז.א. שאדם העשיר שפגע בו - יש לו כח נפשי עצום כ\"כ שביכולתו לעמוד בכל הנסיונות ואדרבא להשתמש בעשרו אך ורק כדי אשר ישב עולם לפני אלקים.\n\nועפ\"י הנ\"ל יש להוסיף ביאור בזה שדוקא שלמה ביקש ראש ועושר אל תתן לי, כי נתנסה בשניהם ובשניהם בהפלגה ואין חכם כבעל הנסיון.\n\nועפי\"ז מוכרח שנלמד לגבי עשיר באיזה שטח - בנוגע לכחו ובמילא גם בנוגע לאחריותו.", "content_en": "With G-d's help, 9 Elul, 5731 — Brooklyn, N.Y.\n\nR' Moshe Ishon, may he live,\n\nGreetings and blessings!\n\nSince this touches on the interpretation of a Talmudic saying (which you quoted in my name), I am departing from my usual practice and will elaborate on my understanding of (Eruvin 86a): 'Rabbi honored the wealthy' — which many have labored to explain:\n\nThe context of that passage makes it clear that the Sages mean literally wealthy people. Specifically Rabbi, being himself extraordinarily wealthy, knew from personal experience the many trials that come with wealth. Together with this, he believed with complete faith that G-d has absolutely no intention of causing a person to stumble, and 'demands only according to one's capacity.' Meaning: a person whom G-d has made wealthy has such enormous inner strength that he can withstand all these trials — and moreover, use his wealth solely for the purpose that 'the world abide before G-d.'\n\nBased on this one can explain why specifically Solomon prayed 'Neither poverty nor wealth' — for he had been tested in both and in both to the extreme. 'There is no one wiser than one who has experience.'\n\nFrom this we must learn that for a wealthy person — in whatever field — his 'strength' and consequently his responsibility are immense.", "summary_en": "The Rebbe explains the Talmudic teaching 'Rabbi honored the wealthy': since G-d tests people only according to their capacity, wealth implies immense inner strength — and the corresponding great responsibility to use that wealth for G-d's purposes.", "scraped": true, "topics_en": []}, {"letter": "י'תנה", "summary_he": "יותר מתמיכה כספית לשלוחים - להיות שותף לכל פרטיו", "url": "https://chabadlibrary.org/books/admur/ig/27/10455.htm", "tags": [], "notes": "", "id": 94, "content_he": "י'תנה\n\nב\"ה, י\"ג מנחם אב, ה'תשל\"ב\n\nברוקלין, נ.י.\n\nלכבוד מר אריאל שי' המכונה ד\"ר בר-סלע\n\nשלום וברכה!\n\nזה עתה הגיעני מכתבו מכ\"ג בתמוז, שהתאחר באופן בלתי רגיל.\n\nויהי רצון שיהא ביקורם בארצנו הק' תובב\"א בהצלחה.\n\nוכיון שכבר נכנסנו בימי הנחמה (שבעה דנחמתא) שלאחרי החורבן אשר מפני חטאינו גלינו מארצנו, יהי רצון שבקרוב ממש נזכה לקיום היעוד שייהפכו הימים לששון ולשמחה בגאולה האמיתית והשלימה על ידי משיח צדקנו.\n\nנעם לי במאד להוודע מהרב הר\"ש שי' לזרוב מפגישתו עם מר ומעזרתו בעבודת הרב האמור. ותקותי אשר תמורת \"עזרתו\" יוכל להאמר \"השתתפותו\", כוונתי שיהי' לא רק אחי עזר כי אם שותף לכל פרטיו, והרי די' ומספיקה העבודה לשנים ויותר. וזכות הרבים מסייעתם.\n\nבכבוד ובברכה.", "content_en": "With G-d's help, 13 Menachem Av, 5732 — Brooklyn, N.Y.\n\nTo the honored Dr. Ariel Bar-Sela, may he live,\n\nGreetings and blessings!\n\nJust now I received his letter of 23 Tammuz, which was unusually delayed.\n\nMay it be G-d's will that your visit to our Holy Land, may it be rebuilt speedily, be successful.\n\nNow that we have entered the days of consolation following the destruction — because of our sins we were exiled from our Land — may it be G-d's will that very soon we merit the fulfillment of the prophecy that these days will turn to joy and gladness in the true and complete Redemption through our Righteous Moshiach.\n\nI was very pleased to learn from Rabbi Lazarov about his meeting with you and your help in his work. My hope is that instead of 'his help,' one could say 'his participation' — meaning he will be not merely a helper but a full partner in every detail. There is certainly enough work for two and more. And the merit of the public assists them.\n\nWith respect and blessing.", "summary_en": "The Rebbe writes to Dr. Ariel Bar-Sela during the seven weeks of consolation after Tisha B'Av, blessing his upcoming visit to Israel and hoping he will become a full partner — not just a helper — in Rabbi Lazarov's Chabad outreach work.", "scraped": true, "topics_en": []}, {"letter": "י'תשמ", "summary_he": "השפעת התרומה על כ\"ק אדמו\"ר (!!!)", "url": "https://chabadlibrary.org/books/1200720184", "tags": ["שדרים"], "notes": "", "id": 95, "content_he": "י'תשמ\n\n[חורף ה'תשל\"ג]\n\nת\"ח על הבשו\"ט הנ\"ל.\n\nאזכיר עה\"צ להנ\"ל.\n\nנתינת-תרומת הנ\"ל נתקבלה.\n\nוהנה פאַר דעם עיקר - די מצוה שבדבר [ובפרט מצות צדקה ובפרט בסכום - שזוהי פעם הראשונה שנותן סכום כזה שלא על מנת לקבל פרס וכל התחלות קשות], דיינקט דער אויבערשטער, וכהל' נח\"ר לפני, תענוג הבורא.\n\nאבל מה שעלי להביע ת\"ח - על גודל הנח\"ר שגרם לי ובמילא - הרחבה בכו\"כ ענינים שאין שייכים לממון כלל (נוסף על ההרחבה בהפעולות הקשורות בהוצאות כספיות).\n\nוגודל הנח\"ר מזה שמתחיל בפועל לצאת אל המרחב האמיתי בענין של מצוה וממון (להבדיל) גם יחד.\n\nונתינתו עוררה אותי על הביאור בפירש\"י (ר\"פ כי תשא את ראש) אשר כאשר זה יתנו נראה הקב\"ה לבחי' משה שבנפש הנותן, ומראה לו שנתינתו היא מטבע של אש.", "content_en": "With G-d's help [Winter 5733]\n\nThank you for the good news above.\n\nI will mention [him] at the gravesite.\n\nThe said donation has been received.\n\nFor the main point — the mitzvah itself [and especially the mitzvah of charity, and especially this sum — being the first time he has given such a sum not for the purpose of receiving reward, and 'all beginnings are difficult'] — one thanks G-d, as the expression goes, 'a pleasing aroma before [G-d],' the delight of the Creator.\n\nBut what I must express gratitude for is the great satisfaction it has caused me — and consequently, expansiveness in many matters that have nothing to do with money at all (in addition to the expansion in activities connected to financial expenditures).\n\nThe great satisfaction comes from the fact that he is beginning in practice to step out into true expansiveness in a matter of both mitzvah and money together.\n\nAnd his giving aroused me to the explanation in Rashi (beginning of Parshat Ki Tisa): that when 'this shall they give' — G-d appeared to the aspect of Moses within the soul of the giver and showed him that his giving is a 'coin of fire.'", "summary_en": "The Rebbe thanks R' Yosef Weinberg for his first major donation given without expectation of reward, expressing profound satisfaction, and draws a mystical insight from Rashi — that when one gives charity, G-d reveals to the 'Moses-dimension' of the giver's soul that the donation is a 'coin of fire.'", "scraped": true, "topics_en": ["Fundraisers & Emissaries"]}, {"letter": "י'תתקכג", "summary_he": "עשיר שהביא מנחת עני", "url": "https://chabadlibrary.org/books/1200720367", "tags": ["שדרים"], "notes": "", "id": 96, "content_he": "י'תתקכג\n\n[שלהי אלול, ה'תשל\"ג]\n\nשייך להנהלת המוסד כמובן - אבל בכל אופן מובן שהסכום פעוט ביותר בערך הענין ובמילא זהו היפך הכבוד להנפטר ע\"ה - שכאילו עושים ערמומיות וכו' מפני דוחק מצבם ולז\"נ הנמצאת בעולם האמת ואין שם קונצן וכו'.\n\nתרומת עשרת אלפים דולר, שיהי' הבית ע\"ש אביהם ע\"ה.", "content_en": "With G-d's help [End of Elul, 5733]\n\nThis is relevant to the institution's administration, as is understood — but in any case it is clear that the sum is far too small in relation to the matter. Consequently this is contrary to the honor of the deceased, may he rest in peace — as if they are being evasive, etc., due to their financial straits. But the soul that resides in the World of Truth — in that realm there are no tricks, etc.\n\n[This concerns] a donation of ten thousand dollars, for the building to be named after their late father.", "summary_en": "A brief note from the Rebbe stating that a $10,000 donation proposed for naming a building after a donor's late father is far too small and disrespectful to the deceased, whose soul in the World of Truth sees through all pretense.", "scraped": true, "topics_en": ["Fundraisers & Emissaries"]}];

const TAG_MAP = {
  'שדרים': 'Fundraisers & Emissaries',
  'השפעה': 'Influencing Donors',
  'בקשה': 'Requests',
  'תודה': 'Gratitude',
  'פיתוח': 'Donor Development',
  'עידוד': 'Encouragement'
};

const TAG_COLORS = {
  'Fundraisers & Emissaries': { bg: '#dbeafe', text: '#1e40af', border: '#93c5fd' },
  'Influencing Donors': { bg: '#fee2e2', text: '#991b1b', border: '#fca5a5' },
  'Requests': { bg: '#ede9fe', text: '#5b21b6', border: '#c4b5fd' },
  'Gratitude': { bg: '#d1fae5', text: '#065f46', border: '#6ee7b7' },
  'Donor Development': { bg: '#fef3c7', text: '#92400e', border: '#fcd34d' },
  'Encouragement': { bg: '#cffafe', text: '#155e75', border: '#67e8f9' }
};
const DEFAULT_TAG = { bg: '#f3f4f6', text: '#374151', border: '#d1d5db' };

let activeTopic = null;
let searchQuery = '';

function getTopicEn(tag) { return TAG_MAP[tag] || tag; }

function getTopicCounts() {
  const counts = {};
  ENTRIES.forEach(e => {
    (e.tags || []).forEach(t => {
      const en = getTopicEn(t);
      counts[en] = (counts[en] || 0) + 1;
    });
  });
  return counts;
}

function renderTopics() {
  const counts = getTopicCounts();
  const bar = document.getElementById('topicBar');
  const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]);
  bar.innerHTML = sorted.map(([topic, count]) => {
    const c = TAG_COLORS[topic] || DEFAULT_TAG;
    const isActive = activeTopic === topic;
    return `<span class="topic-pill ${isActive ? 'active' : ''}" style="background:${c.bg};color:${c.text};border-color:${isActive ? c.text : c.border}" onclick="toggleTopic('${topic.replace(/'/g, "\\'")}')">${topic}<span class="count">${count}</span></span>`;
  }).join('');
}

function toggleTopic(topic) {
  activeTopic = activeTopic === topic ? null : topic;
  renderTopics();
  renderLetters();
}

function getFiltered() {
  return ENTRIES.filter(e => {
    if (activeTopic) {
      const topics = (e.tags || []).map(t => getTopicEn(t));
      if (!topics.includes(activeTopic)) return false;
    }
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const haystack = [
        e.summary_en || '',
        e.content_en || '',
        ...(e.tags || []).map(t => getTopicEn(t)),
        e.letter || ''
      ].join(' ').toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });
}

function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderLetters() {
  const filtered = getFiltered();
  const grid = document.getElementById('lettersGrid');
  document.getElementById('resultsInfo').textContent = 
    `Showing ${filtered.length} of ${ENTRIES.length} letters` + 
    (activeTopic ? ` — filtered by "${activeTopic}"` : '') +
    (searchQuery ? ` — matching "${searchQuery}"` : '');

  grid.innerHTML = filtered.map(e => {
    const tags = (e.tags || []).map(t => {
      const en = getTopicEn(t);
      const c = TAG_COLORS[en] || DEFAULT_TAG;
      return `<span class="mini-tag" style="background:${c.bg};color:${c.text};border-color:${c.border}">${en}</span>`;
    }).join('');

    return `
      <div class="letter-card" id="card-${e.id}" onclick="toggleCard(${e.id})">
        <div class="card-header">
          <span class="letter-num">Letter ${escapeHtml(e.letter)}</span>
          <div class="card-tags">${tags}</div>
        </div>
        <div class="summary">${escapeHtml(e.summary_en)}</div>
        <div class="letter-detail">
          <div class="section-label">Full Translation</div>
          <div class="full-text">${escapeHtml(e.content_en)}</div>
          <button class="toggle-hebrew" onclick="event.stopPropagation(); toggleHebrew(${e.id})">Show Hebrew Original ▾</button>
          <div class="hebrew-section" id="hebrew-${e.id}">
            <div class="section-label">Hebrew Original</div>
            <div class="hebrew-text">${escapeHtml(e.content_he)}</div>
          </div>
          ${e.url ? `<a class="source-link" href="${escapeHtml(e.url)}" target="_blank" onclick="event.stopPropagation()">View original on Chabad Library →</a>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function toggleCard(id) {
  const card = document.getElementById('card-' + id);
  card.classList.toggle('expanded');
}

function toggleHebrew(id) {
  const section = document.getElementById('hebrew-' + id);
  section.classList.toggle('visible');
  const btn = section.previousElementSibling;
  btn.textContent = section.classList.contains('visible') ? 'Hide Hebrew Original ▴' : 'Show Hebrew Original ▾';
}

document.getElementById('searchBox').addEventListener('input', function(e) {
  searchQuery = e.target.value.trim();
  renderLetters();
});

// Init
renderTopics();
renderLetters();
</script>
