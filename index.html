tch in various countries and at various times — to conduct the work strictly non-partisan. I hope that you too will agree with what I have stated, and this will also provide sufficient material to ensure that the character and work of the yeshiva is maintained, so that no one can say that it belongs to one party more than to others.\n\nAs you requested, I will remember you and all your household members about whom you write, at the holy resting place of my father-in-law the Rebbe, of righteous and holy memory. The merit of your work for the holy institution Oholei Yosef Yitzchak Lubavitch, which is named after him, will surely stand by all of you, so that my father-in-law the Rebbe may intercede for each of you for what each person needs — materially and spiritually.\n\nWith blessings for health and good tidings.", "summary_en": "The Rebbe congratulates R' Mordechai Ritsch in Melbourne on the successful dedication of a yeshiva, stresses the importance of maintaining a strictly non-partisan character to keep the yeshiva open to all observant Jews, and promises to remember him at the Previous Rebbe's gravesite.", "scraped": true, "topics_en": ["Influencing Donors"]}, {"letter": "ג'תרנט", "summary_he": "ההוצאות בקשר עם אסיפת מעמד חייבים להיות על חשבון ועד המעמד", "url": "http://chabadlibrary.org/books/admur/ig/11/3659.htm", "tags": ["שדרים"], "notes": "", "id": 46, "content_he": "ג'תרנט\n\nב\"ה, כ\"ב תמוז, תשט\"ו\n\nברוקלין.\n\nהוו\"ח אי\"א נו\"נ עוסק בצ\"צ מוה\"ר חיים שי' שו\"ב\n\nשלום וברכה!\n\nאין ענטפער אויף אייער בריף פון עש\"ק פנחס...", "content_en": "Letter Gimmel-Tav-Resh-Nun-Tet\n\nWith G-d's help, 22 Tammuz, 5715\nBrooklyn.\n\nThe distinguished chassid, accomplished, G-d-fearing, etc., R' Chaim (Plutkin), ritual slaughterer, may he live,\n\nPeace and blessing!\n\nIn reply to your letter from Erev Shabbat parshat Pinchas — and you have surely already received my reply to your previous letter.\n\nI was pleased to read in your letter that you are engaged in the matters of Maamed [the Chabad support organization], and this will certainly bring you an additional measure of success in your health and personal affairs.\n\nI hope that you are energetically seeking, in a fitting manner, to teach the public, and the like. This, in addition to its primary purpose — the benefit in spiritual matters — can be hoped, in time, to also be of material benefit.\n\nIt is self-evident that all expenses you have in connection with the Maamed matters must be charged to the account of the Vaad HaMaamed, as is known from the story of my father-in-law the Rebbe — that when his father, the Rebbe Maharash [R' Shmuel Schneersohn], sent the great benefactor R' Shmuel Gurary, of blessed memory, on a mission to Petersburg, he gave him from his own [i.e., the Rebbe's] treasury as much as was needed for expenses. And although it is self-evident how pleased the chassidic benefactor R' Shmuel, of blessed memory, was with the mission — the Rebbe nevertheless wanted the expenses to come specifically from his own [the Rebbe's] treasury. And as is explained elsewhere the reason for this.\n\nAs you request, I will remember you and your wife, may she live, at the holy resting place of my father-in-law the Rebbe, of righteous and holy memory — for good health and length of good days and years. May G-d grant you success in informing good tidings regarding yourself and your household and all your surroundings.\n\nWith blessing.", "summary_en": "The Rebbe writes in Yiddish to R' Chaim Plutkin, a ritual slaughterer active in the Maamed organization, expressing pleasure at his communal work and clarifying that all his expenses related to Maamed must be reimbursed by the Vaad HaMaamed, not borne personally.", "scraped": true, "topics_en": ["Fundraisers & Emissaries"]}, {"letter": "ג'תשו", "summary_he": "שלילת הטענות בקושי העבודה. שמחה ממשיך הברכה", "url": "http://chabadlibrary.org/books/admur/ig/11/3706.htm", "tags": ["שדרים"], "notes": "", "id": 47, "content_he": "ג'תשו\n\nב\"ה, י' מנ\"א, תשט\"ו\n\nברוקלין.\n\nשלום וברכה!\n\nבמענה על מכתבו מא' ואתחנן. הנה ת\"ח על הבשו\"ט שעלה בידו לפעול בעניני מצות מעשיות...", "content_en": "Letter Gimmel-Tav-Shin-Vav\n\nWith G-d's help, 10 Av, 5715\nBrooklyn.\n\nPeace and blessing!\n\nIn response to his letter from the first Shabbat of parshat Va'etchanan: Thank you for the good news that he succeeded in influencing [people] in matters of practical mitzvot. This will certainly arouse within him additional courage — all the more so by a fortiori reasoning: if with the efforts made until now, [so much] was accomplished, certainly all the more so when he will make every necessary effort [he will accomplish even more]. There is no need to elaborate on something self-evident.\n\nRegarding what he writes — that he derives no satisfaction from his work, that it is hard labor, etc.: It is contrary to reason that many people have settled it in their minds that they need not display a cheerful face and contentment with the way G-d leads the world in general and their affairs in particular — since after all, it could be interpreted as if they are satisfied with what they have, and however good things are, they could be even better, so one must keep up constant complaints about hardship and bitterness at every step and every matter.\n\nIt is clear that this is contrary to the teaching of our holy Torah — and all the more so by a fortiori reasoning from the rabbinic saying on the verse \"Every soul shall praise G-d\" — that for every single breath one must give praise. How much more so when there is success in the work of \"gathering the material and sowing the spiritual.\" Furthermore, the holy Zohar has ruled that when one presents a sad face, this arouses, heaven forbid, a similar [atmosphere] from above and in the influence from above. Whereas when a person stands in joy and contentment, however his situation may be, this in itself improves the situation and leads \"from good to even better\" (see Zohar II:184b). I do not wish to elaborate, for I doubt whether it will change the habit in the above-mentioned conduct (though I hope it has not yet become a second nature to him) — and particularly since these few lines are sufficient to clarify the situation as it is. May G-d grant him to see his good fortune that he has been placed in a beam of light, and he must give thanks and praise for what he has succeeded in \"gathering the material and sowing the spiritual\" in the efforts until now — and all the more so with the efforts in the manner described above...\n\nWith blessing.", "summary_en": "The Rebbe thanks a correspondent for good news about his successes in outreach work, and then gently but firmly rebukes him for his chronic negativity and complaints about his work, citing the Zohar's teaching that joyful service draws Divine blessing while gloominess creates negativity.", "scraped": true, "topics_en": ["Fundraisers & Emissaries"]}, {"letter": "ג'תשכ", "summary_he": "מי שלמד בליובאוויטש ודאי מוכן לעזור לישיבות בגשמיות", "url": "http://chabadlibrary.org/books/admur/ig/11/3720.htm", "tags": ["בקשה"], "notes": "", "id": 48, "content_he": "ג'תשכ\n\nב\"ה, ט\"ז מנ\"א, תשט\"ו\n\nברוקלין.\n\nהוו\"ח אי\"א נו\"נ עוסק בצ\"צ מו\"ה משה שי'\n\nשלום וברכה!\n\nנעם לי לקבל פ\"ש ממנו ע\"י הרה\"ח אי\"א נו\"נ עוסק בצ\"צ מוה\"ר מרדכי דוב שי' שד\"ר טלישבסקי...", "content_en": "Letter Gimmel-Tav-Shin-Kaf\n\nWith G-d's help, 16 Av, 5715\nBrooklyn.\n\nThe distinguished chassid, accomplished, G-d-fearing, occupied in public service, R' Moshe (Dultzin), may he live,\n\nPeace and blessing!\n\nI was pleased to receive greetings from him through the distinguished chassid R' Mordechai Dov Teleshevsky, may he live, the fundraiser (shaddar). Although he does not write details about himself, I wish to inform him of the principle that a Jewish person must be healthy so that the body should not disturb the service of the soul — and even more so, as required by Chassidic teachings, so that he can serve G-d with his entire body in completeness, for which the body must be whole, as is understood from Tanya, beginning of chapter 7, and see also Rambam, Laws of Character Traits, beginning of chapter 4.\n\nIt is surely unnecessary to urge him to assist R' Teleshevsky in his work for the support of the Tomchei Temimim yeshivas — for indeed our sages have said: \"Throw a stick into the air and it will land on its root\" — and certainly the days of light that he saw while studying in the Yeshivat Tomchei Temimim in Lubavitch of old are shining within him, and the saying of the Rebbe Maharash regarding students of Tomchei Temimim — \"candles to illuminate\" — meaning to also influence others and the surrounding environment. I have only come to add encouragement and emphasis — to help the above-mentioned [fundraiser] with an even greater measure and particularly since this is the demand of the hour. And if regarding ordinary charity they said that it not only does not reduce [one's means] but on the contrary even adds to the situation that preceded it — \"Tithe so that you will become wealthy\" — all the more so when what is spoken of is charity regarding the field of education that raises the young generation to be proper \"fruits and fruits of fruits\" according to the teaching of our Torah, Torah of life.\n\nEnclosed is the continuation of the memoir of my father-in-law the Rebbe, of righteous and holy memory, which he will surely share also with the many — and the merit of the many depends upon him.\n\nWith blessing.", "summary_en": "The Rebbe writes to R' Moshe Dultzin urging him to support the fundraiser for Tomchei Temimim yeshivas, evoking his fond memories of studying there and reminding him that donating to Jewish education yields even greater Divine reward than ordinary charity.", "scraped": true, "topics_en": ["Requests"]}, {"letter": "ג'תשלו", "summary_he": "בזמננו - דין קדימה לאמצעים שיתרכזו בפעולות עכשיו, ולא להשקיעם בקרן וכדומה", "url": "http://chabadlibrary.org/books/admur/ig/11/3737.htm", "tags": ["השפעה"], "notes": "", "id": 49, "content_he": "ג'תשלז\n\nב\"ה, א' אלול, תשט\"ו\n\nברוקלין.\n\nהרה\"ח אי\"א נו\"נ עוסק בצ\"צ מו\"ה ניסן שי'\n\nשלום וברכה!\n\nלאחרי הפסק נתקבל מכתבו מכ\"ג מנ\"א...", "content_en": "Letter Gimmel-Tav-Shin-Lamed-Zayin\n\nWith G-d's help, 1 Elul, 5715\nBrooklyn.\n\nThe distinguished chassid, accomplished, G-d-fearing, occupied in public service, R' Nissan (Pinson), may he live,\n\nPeace and blessing!\n\nAfter a pause, his letter from 23 Av was received. And may He who guards His people Israel — who neither slumbers nor sleeps — guard every single one of them within the general Jewish community with an open eye, both materially and spiritually, and may he succeed in his holy work beyond the natural order, from a place of mental tranquility and physical ease.\n\nEnclosed is the Elul anthology which he will surely share with the many, and the merit of the many depends upon him.\n\nWith blessings for a good inscription and sealing [Shana Tova].\n\nPostscript:\n\nRegarding what he writes about how to influence the Jews in Morocco — since they have not sufficiently absorbed [Torah guidance], etc.: It is already known that \"the righteous resemble their Creator\" — and just as G-d, in writing His Torah, wrote \"I have given Myself\" — as it were, \"I wrote Myself in and gave [Myself]\" — so it is regarding our leaders, the Rebbes of Chabad. Their own writings in the form of discourses and talks of holiness are themselves the source from which to draw. And as the saying of the Rebbe the Tzemach Tzedek: \"Work, work until the coming of the Mashiach.\" ", "summary_en": "The Rebbe writes a brief letter to R' Nissan Pinson, encloses an Elul anthology for distribution, and in a postscript advises that the best approach to influencing Moroccan Jews is through the Rebbes' own written teachings and discourses.", "scraped": true, "topics_en": ["Influencing Donors"]}, {"letter": "ד'גכא", "summary_he": "", "url": "http://chabadlibrary.org/books/admur/ig/13/4321.htm", "tags": [], "notes": "", "id": 50, "content_he": "ד'שכא\n\nב\"ה, י\"ב אייר, תשט\"ז\n\nברוקלין.\n\nשלום וברכה!\n\nקבלתי מכתבו המהיר (נוסף על השלוח באוירון), וצריך עיון על המהירות בזה...", "content_en": "Letter Dalet-Shin-Kaf-Aleph\n\nWith G-d's help, 12 Iyar, 5716\nBrooklyn.\n\nPeace and blessing!\n\nI received his express letter (in addition to the one sent by airmail), and the urgency requires examination.\n\nAnd as it appears, he is in his position and I am in mine — meaning I am writing once again my clear opinion: that one should not waste expenses and act contrary to the principle of building [consolidation] by relocating from [name of place]... for there is much work there in spreading the wellsprings [of Chassidus] (until they reach) outward. In plain words: his desire to relocate from there is the advice of the evil inclination, which is not pleased with any manner of spreading Chassidus — and since my opinion is clear that one must engage in spreading the wellsprings in [name of place], it follows that there is no purpose whatsoever in traveling [away from there]...\n\nAnd I have already told him when he was here, that I saw from my father-in-law the Rebbe that he did not hold with the approach of \"money is no problem\" — even in the conduct of the materially wealthy with their gold and silver. How much more so did he not approve of such conduct from a public figure — meaning a person upon whom seven eyes are watching — so that when he spends one shekel, people say he spent ten. And the same applies to him and his improper behavior, in my opinion, regarding the above (it was not necessary to use the telephone in connection with [name of place]... and more and more)...\n\nI found it necessary to use such strong words as the above, although I am not accustomed to them — since I see that despite the fact that I hinted and then spoke several times [about this] — namely, that it is essential to have an accounting with regard to the expenditure of all those involved in public service (by which I do not mean accounting to others, but rather to oneself, i.e., to know that \"I dwell among my people\" — and just as they are limited and take the ability into account, so am I similarly limited and within measure). And although the expansion and spread is necessary, it must be in spiritual matters. But his behavior in practice is exactly the opposite — he restricts in what pertains to spreading the wellsprings, because \"he is sitting on the suitcases and thinking about America.\" And in what pertains to material matters it is as described above.\n\nAnd although it is unnecessary, I repeat once more: it is emphatically not my intention, heaven forbid, that Anash should have to live in material deprivation, heaven forbid and heaven forbid — and one who looks even for a moment sees that my approach is exactly the opposite. But an organized life without excessive restriction does not mean a disorganized life of waste without any justification in common sense...\n\nWith blessings for absorbing all the above with joy and thereby inwardly.\n\nPostscript: I am not sending my letter by express, and may it be G-d's will that from now on Anash too will conduct themselves in this way, except in absolutely urgent cases.", "summary_en": "The Rebbe firmly rebukes an emissary who wants to relocate from his current post, declaring it is 'the advice of the evil inclination,' criticizes his wasteful use of funds and communication, and insists that a public figure must live within the means of the community he serves.", "scraped": true, "topics_en": []}, {"letter": "ד'תא", "summary_he": "", "url": "http://chabadlibrary.org/books/admur/ig/13/4401.htm", "tags": [], "notes": "", "id": 51, "content_he": "ד'תא\n\nב\"ה, כ\"ט אייר, תשט\"ז\n\nברוקלין.\n\nשלום וברכה!\n\nנאכן לאנגען שוייגען בין איך געווען צופרידען צו באקומען אייער בריף פון ל' בעומר, אין וועלכען איר שרייבט ראשי פרקים פון דעם וואס עס טוט זיך בא אייך, ותודה לא-ל פאר דער גוטע בשורה פון דעם געזונט פון פלונית שתחי', ויהי רצון עס זאל גיין פון גוט צו נאך בעסער.\n\nבנוגע אייער שרייבען, צו העלפען אחינו בני ישראל אשר בארצנו הק' - דארף יעדער איד חובבי תורה ומצות שטיצען מיט א גאר אנדער מאס די מוסדות הנ\"ל בארצנו הק' ת\"ו.\n\nבברכה.", "content_en": "With G-d's help, 29 Iyar, 5716 | Brooklyn\n\nGreetings and blessings!\n\nAfter the long silence, I was pleased to receive your letter from Lag BaOmer, and thank G-d for the good news about the health of the unnamed person, may she live — and may it go from good to even better.\n\nRegarding your writing about helping our brothers the Children of Israel in the Holy Land: the well-known words of King David (Psalms 127) are relevant — when G-d builds the house and G-d guards the city, then human effort also helps. This is achieved through Torah study and teaching it with fear of Heaven in the Holy Land, as stated by the Sages in the Introduction to Eichah Rabbah. Unfortunately there are few helpers in this, and those who do help do not do so sufficiently.\n\nTherefore, every Jew who loves Torah and mitzvos and is filled with true love of Israel must support Chabad institutions in the Holy Land with an entirely different measure of generosity.\n\nIf challenged why your donations are not visible in public campaigns — answer that you give proportionally more (and especially, since that money and its Torah also diminishes danger and expenses in material matters). Also, according to the Sages, the poor of your own take precedence — and I direct Anash to donate to Chabad institutions in the Holy Land, whose work grows ever greater.\n\nI hope that in Kfar Chabad — where the fire occurred — the attribute of Mercy will now be revealed as an unbounded heritage, as our Rebbes taught: 'For there G-d commanded the blessing, even life forevermore.'\n\nWith blessing.", "summary_en": "The Rebbe encourages extraordinary support for Torah institutions in the Holy Land, explaining that human effort becomes effective when it relies on G-d through Torah, and those who understand must support Chabad institutions in Israel with exceptional generosity.", "scraped": true, "topics_en": []}, {"letter": "ד'תל", "summary_he": "", "url": "http://chabadlibrary.org/books/admur/ig/13/4430.htm", "tags": [], "notes": "", "id": 52, "content_he": "", "content_en": "This letter has not been digitized online yet.", "summary_en": " [Full text not yet available online]", "scraped": true, "topics_en": []}, {"letter": "ד'תקסד", "summary_he": "", "url": "http://chabadlibrary.org/books/admur/ig/13/4564.htm", "tags": [], "notes": "", "id": 53, "content_he": "ד'תקסד\n\nב\"ה, כ\"ה תמוז, תשט\"ז\n\nברוקלין.\n\nמו\"ה מרדכי שי'\n\nשלום וברכה!\n\nבהנוגע אייער שרייבען אז אייער באטייליגונג אין דער פארשטארקונג פון ישיבה אהלי יוסף יצחק איז באגרעניצט - ותלמוד תורה כנגד כולם, ובפרט ווען עס האנדעלט זיך אין אזא חשובען מוסד.", "content_en": "With G-d's help, 25 Tammuz, 5716 | Brooklyn\n\nTo R' Mordechai, may he live:\n\nGreetings and blessings!\n\nRegarding your writing that your participation in strengthening the yeshiva Oheli Yosef Yitzchak is limited by other work:\n\nThe well-known instruction of our holy Torah is that 'Torah study is equivalent to all of them' — that strengthening Torah is equivalent to all other matters. This is especially true when dealing with an institution which — in our orphaned generation — not everyone understands the necessity of. Therefore, the responsibility and privilege of all those who understand this is many times greater, and simultaneously so are the blessings from G-d in this area, including blessings in private matters generally and in Jewish nachas from children particularly.\n\nI hope it is unnecessary to elaborate, and I thank you in advance for reporting good news in the above.\n\nSince you don't mention your own health, I assume it is fine.\n\nWith blessing for good news in all the above.", "summary_en": "The Rebbe writes to R' Mordechai Ritsch (Melbourne) that Torah study and supporting Torah education is 'equivalent to all other matters,' making his responsibility — and Divine reward — many times greater than other endeavors.", "scraped": true, "topics_en": []}, {"letter": "ד'תרב", "summary_he": "", "url": "http://chabadlibrary.org/books/admur/ig/13/4602.htm", "tags": [], "notes": "", "id": 54, "content_he": "ד'תרב\n\nב\"ה, ה' מנ\"א, תשט\"ז\n\nברוקלין.\n\nשלום וברכה!\n\nבמענה על מכתבו בו כותב אודות העסק שקנו אצלו סחורה ועתה קישוים בתשלומין.\n\nבעת רצון יזכירוהו על הציון הק' לפרנסה בכשרות ובמנוחה. ויקים ההודעה המפורסמת של רבנו הזקן - הקב\"ה גיט אידן גשמיות און זיי מאכען פון גשמיות רוחניות. ומהנכון להפריש מעשר מהריוח לצדקה. ובחנוני נא בזאת.\n\nבטח יודע משלשת השיעורים השוים לכל נפש: א) שיעור תהלים כל יום, ב) פרשה חומש עם רש\"י, ג) שיעור תניא.\n\nבברכה לבשו\"ט.", "content_en": "With G-d's help, 5 Menachem Av, 5716 | Brooklyn\n\nGreetings and blessings!\n\nIn response to your letter in which you write about the business deal where merchandise was purchased and there are now difficulties with payment, and uncertainty whether it will be finalized.\n\nAt an opportune time, you should be mentioned at the holy resting place of the Previous Rebbe for livelihood in a kosher and peaceful manner. May it be G-d's will that you fulfill the Alter Rebbe's teaching: G-d gives Jews material [blessings] and they transform the material into spiritual — using one's livelihood for Torah and mitzvos, and even personal household expenses according to the Shulchan Aruch (Orach Chaim 231) are themselves holiness, as it is written 'In all your ways know Him.'\n\nIt would be good to practice separating maaser (a tenth) from profits for tzedakah, and it was already said: 'Test Me in this and I will pour out for you a blessing...'\n\nYou surely know of the three daily study sessions instituted by the Previous Rebbe for every person: (a) the daily Tehillim portion after morning prayer; (b) the weekly Torah portion with Rashi; (c) the daily Tanya portion. At the very least, observe these from now onward.\n\nWith blessing for good news.", "summary_en": "The Rebbe responds to someone facing business difficulties, advising them to be mentioned at the Previous Rebbe's Ohel, practice the Alter Rebbe's teaching of transforming material into spiritual, separate maaser from profits, and observe the three daily study sessions.", "scraped": true, "topics_en": []}, {"letter": "ד'תתו", "summary_he": "הסכמה להחליף טשעק של רבנו לישיבה", "url": "http://chabadlibrary.org/books/admur/ig/14/4806.htm", "tags": ["שדרים"], "notes": "", "id": 55, "content_he": "ד'תתו\n\nב\"ה, ג' מ\"ח, תשי\"ז\n\nברוקלין.\n\nמו\"ה אברהם שי'\n\nשלום וברכה!\n\nשמחתי לקרות שבזמן שמחתנו נתאספו ודנו אודות הגדלת ישיבת אהלי יוסף יצחק ליובאוויטש במעלבורן. גודל זכות המשתתפים אין לשער ומדתו של הקב\"ה מדה כנגד מדה - כמה פעמים ככה, ובפרט בנחת אמיתי מבנים ובנות.\n\nמטובו לפרוש שלום לכל בני המשפחה שיחיו.\n\nהמחכה לבשו\"ט.", "content_en": "With G-d's help, 3 Marcheshvan, 5717 | Brooklyn\n\nTo R' Avraham, may he live:\n\nGreetings and blessings!\n\nI was glad to read that during the time of our joy [Sukkot], they gathered and discussed expanding the yeshiva Oheli Yosef Yitzchak Lubavitch in Melbourne — the building expansion, which will surely lead to an increase in students and learning. The merit of all who participate cannot be estimated, and G-d's measure is measure for measure — but many times over — especially in genuine nachas from sons and daughters and grandchildren.\n\nRegarding the exchange of the check sent from here: anything from which the yeshiva benefits, I agree to it; and may the exchange also serve as a positive sign for the matters he writes about.\n\nPlease convey my greetings to his father and brother and wife and all the family, may they live.\n\nAwaiting good news.", "summary_en": "The Rebbe congratulates R' Avraham Feiglin (Melbourne) on plans to expand the Oheli Yosef Yitzchak yeshiva building, noting that the merit of those involved cannot be estimated and G-d repays measure for measure, many times over.", "scraped": true, "topics_en": ["Fundraisers & Emissaries"]}, {"letter": "ד'תתז", "summary_he": "הוספה בכסף = הוספה בתלמידים \"איך בין מסכים און צופרידן פון דעם\"", "url": "http://chabadlibrary.org/books/admur/ig/14/4807.htm", "tags": ["שדרים"], "notes": "", "id": 56, "content_he": "ד'תתז\n\nב\"ה, ג' מ\"ח, תשי\"ז\n\nברוקלין.\n\nמו\"ה משה זלמן שי'\n\nשלום וברכה!\n\nצופרידען צו באקומען אייער בריף. כל זאך וואס בריינגט ריוח פאר ישיבת אהלי יוסף יצחק - בין איך מסכים. א ריוח פאר ישיבה איז סוף כל סוף א ריוח רוחני - אז עס קומט צו געלט קומען צו תלמידים.\n\nבפ\"ש לכל בני המשפחה ובהצלחה בכל האמור.", "content_en": "With G-d's help, 3 Marcheshvan, 5717 | Brooklyn\n\nTo R' Moshe Zalman, may he live:\n\nGreetings and blessings!\n\nI was pleased to receive your letter of 28 Tishrei, and also your son Avraham's letter. As I have already written, anything that brings benefit to the yeshiva Oheli Yosef Yitzchak Lubavitch — I agree to it and am pleased with it. Any benefit to yeshiva matters is ultimately a spiritual benefit — for when money comes, students come, more hours of learning come, and the like. May G-d help your son that this should bring him everything good he hopes for.\n\nYou do not mention the development of Beis Rivkah and Chabad matters — but I am certain you and your children are doing all that is needed, and we have the promise of our holy Rebbes that there will be success.\n\nAnd especially as we come from the days of Sukkot — 'the time of our joy' — which Chassidus explains means G-d rejoices with Israel and Israel rejoices with G-d — and we are instructed to carry this energy throughout the entire year.\n\nWith regards to all family members and success in all the above and good news.", "summary_en": "The Rebbe writes to R' Moshe Zalman Feiglin (Melbourne) expressing agreement with anything that benefits the Oheli Yosef Yitzchak yeshiva, noting that material benefit to the yeshiva is ultimately spiritual benefit, and encourages carrying the joy of Sukkot throughout the year.", "scraped": true, "topics_en": ["Fundraisers & Emissaries"]}, {"letter": "ד'תתסד", "summary_he": "לאורח כבוד - מצוה לפרסם עושי מצוה", "url": "http://chabadlibrary.org/books/admur/ig/14/4864.htm", "tags": ["השפעה"], "notes": "", "id": 57, "content_he": "ד'תתסד\n\nב\"ה, כ\"ד מ\"ח, תשי\"ז\n\nברוקלין.\n\nמו\"ה יהודא ליב שי'\n\nשלום וברכה!\n\nנתקבלה הידיעה אז עס ווערט צוגעגרייט א דינער לטובת ישיבה אחי תמימים ליובאוויטש בפיטסבורג, וועלכעס ווערט געגעבען אין אייער כבוד.\n\nבאוואוסט די הוראה - מצוה צו מפרסם זיין עושי מצוה, ובפרט בחינוך על טהרת הקדש. ואשרי חלקם. איך האף אז אחינו בני ישראל אין פיטסבורג וועלען זיך באטייליגען אין דעם.\n\nבברכה להצלחה.", "content_en": "With G-d's help, 24 Marcheshvan, 5717 | Brooklyn\n\nTo R' Yehuda Leib, may he live:\n\nGreetings and blessings!\n\nI was pleased to receive the news that a dinner is being prepared for the benefit of the Achei Temimim Lubavitch yeshiva in Pittsburgh, which is being given in your honor.\n\nThe teaching of our Torah is well-known — it is a mitzvah to publicize those who perform mitzvos — especially those who work for Torah education in purity, which is one of the pillars upon which the House of Israel stands. In our doubly-darkened exile, it is vital that Jewish children receive a complete Torah education with pure fear of Heaven and Chassidic warmth. Blessed is the lot of all who work in this.\n\nI hope that our Jewish brethren in Pittsburgh, who have known you for many years, will appreciate the importance of the above and will participate in the dinner and influence their friends to join — and you will have a share in their share as well.\n\nSince you don't write about personal matters, I hope this is a sign all is well. May G-d grant you the merit to report good news.\n\nWith blessing for success in all the above.", "summary_en": "The Rebbe congratulates R' Yehuda Leib Ungar (Pittsburgh) on the benefit dinner in his honor for the Achei Temimim yeshiva, stressing that publicizing those who support Torah education is itself a mitzvah and the merit is immeasurable.", "scraped": true, "topics_en": ["Influencing Donors"]}, {"letter": "ד'תתעה", "summary_he": "סכסוך בין מוסד למאסף", "url": "http://chabadlibrary.org/books/admur/ig/14/4875.htm", "tags": ["שדרים"], "notes": "", "id": 58, "content_he": "", "content_en": "This letter has not been digitized online yet.", "summary_en": "סכסוך בין מוסד למאסף [Full text not yet available online]", "scraped": true, "topics_en": ["Fundraisers & Emissaries"]}, {"letter": "ד'תתפה", "summary_he": "כוונה אמיתית במעמד - התקרבות לכל ענייני החסידות", "url": "http://chabadlibrary.org/books/admur/ig/14/4885.htm", "tags": ["שדרים"], "notes": "", "id": 59, "content_he": "ד'תתפה\n\nב\"ה, אדר\"ח כסלו, תשי\"ז\n\nברוקלין.\n\nמו\"ה נחמן דוב שי'\n\nשלום וברכה!\n\nמאשר קבלת מכתבו. ויהי רצון שיצליח להרבות אנשי המעמד מתאים לכוונה האמיתית, שיתקרבו לכל עניני תורת החסידות הדרכותי' והנהגותי'. עיין תניא פרק ל\"ז. והעיקר שמנקודת החיות יתפשט בכל רמ\"ח אברים ושס\"ה גידים הרוחנים.\n\nבברכה לבשו\"ט, ובפרט בחדש הגאולה והנסים.", "content_en": "With G-d's help, Rosh Chodesh Kislev, 5717 | Brooklyn\n\nTo R' Nachman Dov, may he live:\n\nGreetings and blessings!\n\nI hereby confirm receipt of your letter with its enclosure. May it be G-d's will that His desire through your hands will succeed in increasing Maamed membership in accordance with its true intent — that members draw close to all matters of Chassidic teachings, its guidance and conduct [see also Tanya chapter 37: 'With this money he could have purchased the vital life-force of his animal soul — thus he is giving his very life-force to G-d']. Of course, one needs to explain and clarify this to them.\n\nThe essential point is that this vitality should spread from the spiritual core through all 248 spiritual limbs and 365 spiritual sinews, and thereby through the 248 physical limbs and 365 physical sinews. [The one who works on this takes a principal share.] This is in the spirit of 'You shall be wholehearted with the L-rd your G-d' — see Likkutei Torah, 'Ki HaMitzvah HaZot,' chapter 2.\n\nWith blessing for good news in all the above, and especially since we have entered Kislev, the month of redemption and miracles.", "summary_en": "The Rebbe writes to R' Nachman Dov Vikhnin (Montreal) about increasing Maamed membership with the true intent — that members genuinely draw close to Chassidic teachings — so that the vitality of this commitment spreads from the spiritual core through all aspects of one's being.", "scraped": true, "topics_en": ["Fundraisers & Emissaries"]}, {"letter": "ה'קכח", "summary_he": "מה לעשות בדמי מעשר? להכניסם לקופת הרשת", "url": "http://chabadlibrary.org/books/admur/ig/14/5128.htm", "tags": ["השפעה"], "notes": "", "id": 60, "content_he": "", "content_en": "This letter has not been digitized online yet.", "summary_en": "מה לעשות בדמי מעשר? להכניסם לקופת הרשת [Full text not yet available online]", "scraped": true, "topics_en": ["Influencing Donors"]}, {"letter": "ה'קמז", "summary_he": "לא לדחות חילוק מעות לצדקה עד לאחר ק\"כ שנה, אלא לתת בעודנו בחיים", "url": "http://chabadlibrary.org/books/admur/ig/14/5147.htm", "tags": ["השפעה"], "notes": "", "id": 61, "content_he": "ה'קמז\n\nב\"ה כ' שבט תשי\"ז\n\nברוקלין.\n\nשלום וברכה!\n\nמאשר קבלת מכתבו ממחרת יום ההילולא. ובמה שכותב אודות חילוק מעות לאחר מאה ועשרים שנה.\n\nכבר ידוע דברי כ\"ק מו\"ח אדמו\"ר שאין דעת השכל נוחה מסדרים כאלו, כי כל ענין טוב מפני מה ידחו. בה בשעה שאפשר לעשות הענין הטוב בעצמו ובחיים חיותו, ועי\"ז יתוסף עוד באריכות ימים ושנים וכידוע סגולת הצדקה.\n\nבברכה.", "content_en": "With G-d's help, 20 Shvat, 5717 | Brooklyn\n\nGreetings and blessings!\n\nI hereby confirm receipt of your letter from the day after the Yahrzeit of the Previous Rebbe. At an opportune time I will mention him and all his household at the holy resting place.\n\nRegarding what he writes about distributing money after one hundred and twenty years:\n\nAlready well-known are the Previous Rebbe's words in several talks that reason is not at ease with such arrangements — for why should any good matter be deferred for several decades? Meanwhile, it is possible to perform the good deed oneself and in one's own lifetime, and through this even more years and days will be added — as is the well-known virtue of tzedakah in prolonging life.\n\nAlthough the ruling is known that one who overspends on tzedakah should not give more than a fifth — beyond the fact that the fifth itself may be given according to all opinions, there are circumstances where it is permitted and even obligatory to give more than a fifth, as cited in the later authorities and in the Alter Rebbe's Igeret HaKodesh (end of Iggeret HaTeshuvah ch. 3 and end of section 10). Elaborating further to one such as yourself is surely superfluous.\n\nEnclosed is something recently published, and surely he will also merit to spread its contents to others.\n\nWith blessing.", "summary_en": "The Rebbe argues against plans to only distribute charitable funds after one's passing — citing the Previous Rebbe's teaching that good deeds should not be deferred — and notes that giving tzedakah now in one's lifetime actually prolongs life; under certain circumstances, giving more than a fifth is not just permitted but required.", "scraped": true, "topics_en": ["Influencing Donors"]}, {"letter": "ה'קצה", "summary_he": "מעשר לקופת רבנו בנוסף לשאר נתינותיו. אין לדקדק במעשר", "url": "http://chabadlibrary.org/books/admur/ig/14/5195.htm", "tags": ["השפעה"], "notes": "", "id": 62, "content_he": "ה'קצה\n\nב\"ה, י\"א אד\"ר, תשי\"ז\n\nברוקלין.\n\nמו\"ה יעקב יוסף שי' שו\"ב\n\nשלום וברכה!\n\nבמענה על מכתבו. דברי בהנוגע להפרשת מעשר לא באו אלא להוסיף ולא לתת מגרעות בקדש. הנתינות שהתרימו עד עתה למוסדות שונים - אין לגרוע מהם. ומי שביכולתו יפריש מעשר נוסף לקופת רבנו.\n\nואין לדקדק בצדקה, ויש מקום לומר שאם מוסיפים איזה סכום חל לא חל גדר נדר.\n\nבברכת מזל טוב ולבשו\"ט.", "content_en": "With G-d's help, 11 Adar Rishon, 5717 | Brooklyn\n\nTo R' Yaakov Yosef, shochet u'bodek, may he live:\n\nGreetings and blessings!\n\nIn response to his letter of 4 Adar:\n\nMy words regarding the separation of maaser were intended only to add, not — Heaven forbid — to diminish from sanctity. Therefore, donations previously given to various institutions should not be reduced going forward; on the contrary — and Chabad institutions are included in this, since the Rebbe's fund is used for many matters. One who has the ability may separate additional maaser to the Rebbe's fund; one who lacks the ability may count existing contributions toward the maaser and donate the remainder to the Rebbe's fund.\n\nOne should not be overly precise about tzedakah and maaser; in fact, it is proper to add some amount — and there is reason to say that by doing so, the vow-prohibition does not apply, since the percentage is not always exactly the same.\n\nRegarding studying Chassidic discourses: not all people are the same, though in general, the more one studies the more praiseworthy. Moreover, comprehension comes more easily with time. The common principle for everyone is that there should be both superficial study (for fluency) and analytical study, with the analytical study wherever one's heart desires.\n\nWith blessing for Mazal Tov and good news.", "summary_en": "The Rebbe clarifies that his advice about separating maaser was meant to add to existing charitable giving, not reduce it; one should not be overly precise about exact percentages — it is better to give slightly more than the exact tenth, and this also avoids potential vow complications.", "scraped": true, "topics_en": ["Influencing Donors"]}, {"letter": "ה'ערב", "summary_he": "קשיים בפרנסה - להרבות בצדקה", "url": "http://chabadlibrary.org/books/admur/ig/14/5272.htm", "tags": ["השפעה"], "notes": "", "id": 63, "content_he": "ה'רעב\n\nב\"ה, י\"ב אד\"ש, תשי\"ז\n\nברוקלין.\n\nשלום וברכה!\n\nווען מען האט שוועריקייטען אין פרנסה, אז עס איז גוט צו מרבה זיין בצדקה. אויב מען קען ניט פארגרעסערן דעם סכום - זאל מען פארטיילען צו געבען אפטער, ספעציעל בווכן-טעג אין דער פריה פארן דאוונען.\n\nאין דער פראגע פון בייטען דעם געגענט - דאס איז א גלייכע זאך ווען אידען זיינען אוועקגעגאנגען.\n\nבייגעלייגט א טשעק פון קופות כ\"ק מו\"ח אדמו\"ר זי\"ע - לאכניסן אין עניני פרנסה.\n\nבברכה לבשו\"ט ולפורים שמח.", "content_en": "With G-d's help, 12 Adar Sheni, 5717 | Brooklyn\n\nGreetings and blessings!\n\nWhen one has difficulties in livelihood, our Sages tell us it is good to increase tzedakah. And even if one cannot increase the amount, one should divide it to give more frequently — especially effective on weekday mornings before morning prayer and before Mincha, by giving a few cents to charity.\n\nRegarding the question of moving to a different neighborhood: since the Jews have left there, this is a straightforward matter — and all the more so when it concerns children. May G-d help that it comes about more easily than you imagine.\n\nEnclosed is a check from one of the Previous Rebbe's funds — place it into one of your business ventures, and may it bring you an additional measure of success in livelihood.\n\nWith blessing for good news and a joyous Purim.", "summary_en": "The Rebbe advises someone experiencing financial difficulties to give tzedakah more frequently (even small amounts before prayers), approves of moving to a different neighborhood, and encloses a check from the Previous Rebbe's fund as a spiritual segulah for business success.", "scraped": true, "topics_en": ["Influencing Donors"]}, {"letter": "ה'שצט", "summary_he": "זכות נתינת צדקה, בפרט לחינוך הכשר, יעזור שבחור לא יתחתן עם א\"י", "url": "http://chabadlibrary.org/books/admur/ig/15/5399.htm", "tags": ["השפעה"], "notes": "", "id": 64, "content_he": "ה'שצט\n\nב\"ה, כ\"ז ניסן, תשי\"ז\n\nברוקלין.\n\nשלום וברכה!\n\nבאשטעטיג קבלת בריף פון כ\"ג ניסן. וועגן מר... וועגן דעם \"שידוך\" - פאר מיר א איבעררעשונג.\n\nוויסענדיק דעם זכות פון צדקה הקשורה עם חינוך הכשר, בין איך זיכער בבטחוני אז דער \"שידוך\" וועט ניט אנהאלטן. השי\"ת זאל העלפען אז עס זאל זיין בחסד וברחמים, און סוף סוף וועט ער אנערקענען אז ער באלאנגט צו אידען.", "content_en": "With G-d's help, 27 Nissan, 5717 | Brooklyn\n\nGreetings and blessings!\n\nI confirm receipt of your letter of 23 Nissan, and your writing regarding Mr. ...\n\nMore precisely — regarding the 'match' [likely a departure from Jewish observance]: it is a shock to me, and it is understandable what an impression this has made.\n\nBut knowing the merit of tzedakah, and especially tzedakah connected with proper education — in which he had the privilege of giving significant sums in previous years — I am certain in my trust that the 'match' will not last long. May G-d help that the dissolution should come with kindness and mercy, and ultimately he will come to recognize that he belongs with Jews — and he will find nothing else wherever else he goes, even if they flatter him at first. It is surely unnecessary to point out that whatever you can do in that direction, you will do.", "summary_en": "The Rebbe expresses concern and confidence about a family member's departure from Jewish life, trusting — based on the person's past merit of tzedakah for Jewish education — that the separation will not last and the person will ultimately return to the Jewish people.", "scraped": true, "topics_en": ["Influencing Donors"]}, {"letter": "ה'תטו", "summary_he": "כשיש קשיים בפרנסה צריך להרבות בצדקה בשמחה ובבטחון", "url": "http://chabadlibrary.org/books/admur/ig/15/5415.htm", "tags": ["שדרים"], "notes": "", "id": 65, "content_he": "ה'תטו\n\nב\"ה, א' אייר, תשי\"ז\n\nברוקלין.\n\nמו\"ה מנחם זאב שי' הלוי\n\nשלום וברכה!\n\nבמענה על מכתבו אודות מר... שמצב הפרנסה שלו אינו כדבעי וגם קרה לו גניבה.\n\nיסביר לו - עשר בשביל שתתעשר. להוסיף על הצדקה בשמחה ובטוב לבב ובטוח בבורא. ובמאורע דגניבה - ידוע אגה\"ק שלאחרי היזק מתגלה מדת הרחמים. צריכים לעשות כלים - עניני תורה ומצות בהידור ובשמחה.\n\nיקבע לימוד בתורת חסידות חב\"ד ביום הש\"ק וב' וה'. ואמירת שיעור תהלים חדשי לאחרי תפלת השחר. זוגתו תנהג להפריש צדקה קודם הדלקת נרות.\n\nבברכה לבשו\"ט.", "content_en": "With G-d's help, 1 Iyar, 5717 | Brooklyn\n\nTo R' Menachem Zeev HaLevi, may he live:\n\nGreetings and blessings!\n\nIn response to his letter about Mr. ... whose livelihood situation is not as it should be, and who also suffered a theft.\n\nAt an opportune time I will mention him and his household at the holy resting place in accordance with the above.\n\nHe should explain to him the well-known Talmudic saying: 'Tithe so that you will become wealthy' — when there is dissatisfaction with livelihood, one should increase tzedakah, even if it was already at the required level. And do this specifically with joy and good heart, trusting in the Creator to keep His promise: 'Test Me in this... and I will pour out for you a blessing...'\n\nRegarding the theft: the Alter Rebbe's well-known letter to his son and grandson teaches that after a loss, the attribute of Mercy — greater even than the preceding attribute of Kindness — is revealed as an unbounded heritage. But to receive every influence from Above, one must create appropriate vessels — matters of Torah and mitzvos with beauty and joy.\n\nHe should establish regular study sessions in Chabad Chassidic teachings on Shabbat and Mondays and Thursdays, and observe the Previous Rebbe's institution of reciting the monthly Tehillim portion daily after morning prayer. All without a formal vow.\n\nSurely his wife observes the custom of giving tzedakah before lighting Shabbat candles; if not, she should begin doing so.\n\nWith blessing for good news in all the above.", "summary_en": "The Rebbe writes to R' Menachem Zeev Gringlas (Montreal) about someone facing financial difficulties and theft: increase tzedakah with joy ('tithe so that you shall become wealthy'), establish Chassidic study sessions, recite daily Tehillim, and have the wife give tzedakah before Shabbat candle-lighting — creating spiritual vessels for Divine blessing.", "scraped": true, "topics_en": ["Fundraisers & Emissaries"]}, {"letter": "ה'תלח", "summary_he": "אין להתנות תנאים בצדקה - אלא נותנים וגם מתפללים ומבקשים", "url": "http://chabadlibrary.org/books/admur/ig/15/5438.htm", "tags": ["שדרים"], "notes": "", "id": 66, "content_he": "ה'תלח\n\nב\"ה, ט' אייר, תשי\"ז\n\nברוקלין.\n\nברכה ושלום!\n\nאיר דארפט ערקלערין דער מוטער תחי', אז מיט הקב\"ה דארפמען זיך ניט פירן מיט שטעלן עם תנאים. א איד פירט זיך אין א פארקערטן סדר - פריער גיט מען צדקה, דענסטמאל בעט מען בא השי\"ת ניט אלס באדינג נאר אלס בקשה.\n\nבברכה צו גוטע בשורות,\n\nמזכיר", "content_en": "With G-d's help, 9 Iyar, 5717 | Brooklyn\n\nBlessing and peace!\n\nYou must explain to the mother, may she live, that one should not conduct oneself with G-d in the manner of placing conditions — that if such-and-such comes to pass, only then will one give tzedakah.\n\nA Jew conducts himself in the reverse order: first one gives tzedakah, and then one prays to G-d — not as a condition but as a request — for He, blessed be He, is the very essence of good, asking Him to fulfill the desire of the good heart. Having strong trust in this, one then sees it fulfilled also with physical eyes, and soon.\n\nHopefully you will find the appropriate words to explain this.\n\nWith blessing for good news,\n\n(Signed by the secretary on behalf of the Rebbe)", "summary_en": "Written on behalf of the Rebbe, this letter instructs that one should not put conditions on G-d before giving tzedakah; a Jew gives first and then prays as a request — trusting that G-d, Who is the essence of good, will fulfill the desire of the generous heart.", "scraped": true, "topics_en": ["Fundraisers & Emissaries"]}, {"letter": "ה'תקמ", "summary_he": "חצי המעשר שולחים לכאן, וחצי מחלקים בעצמם", "url": "http://chabadlibrary.org/books/admur/ig/15/5540.htm", "tags": ["השפעה"], "notes": "", "id": 67, "content_he": "", "content_en": "This letter has not been digitized online yet.", "summary_en": "חצי המעשר שולחים לכאן, וחצי מחלקים בעצמם [Full text not yet available online]", "scraped": true, "topics_en": ["Influencing Donors"]}, {"letter": "ה'תשצא", "summary_he": "מקור דהא דבע\"ת פטור מ\"אל יבזבז יותר מחומש\" - סברא פשוטה", "url": "http://chabadlibrary.org/books/admur/ig/16/5791.htm", "tags": [], "notes": "", "id": 68, "content_he": "ה'תשצא\n\nב\"ה, ח' תשרי, תשי\"ח\n\nברוקלין.\n\nאברהם אביש מרדכי שי'\n\nשלום וברכה!\n\nבשאלתו מקור דברי רבנו הזקן דבעל תשובה הפודה עצמו מתעניות וסיגופים לא על זה נאמר אל יבזבז יותר מחומש.\n\nמבואר על אתר בדברי רבנו הזקן, דלא גרע רפואת הנפש מרפואת הגוף, דכל אשר לאיש יתן בעד נפשו כתיב. וסברא פשוטה ה\"ז מקור היותר נכון.\n\nמ\"ש אודות סדרי לימוד בתורת החסידות - יתייעץ עם זקני אנ\"ש.\n\nבברכת חתימה וגמח\"ט\n\nמ. שניאורסאהן", "content_en": "With G-d's help, 8 Tishrei, 5718 | Brooklyn\n\nTo Avraham Avrech Mordechai, may he live:\n\nGreetings and blessings!\n\nRegarding his question about the source for the Alter Rebbe's words (in Iggeret HaTeshuvah and Igeret HaKodesh) that a baal teshuvah who gives money to redeem himself from fasts and afflictions — to this does not apply the rule that one should not give more than a fifth:\n\nThe matter is explained in the very same place in the Alter Rebbe's words: it is self-evident that healing the soul is no less important than healing the body — and about the body it is written 'A man will give all he has for his life' (Job 2:4). This simple logical argument is itself the most fitting source (see Ketubot 22a, and others).\n\nRegarding the order of study in Chassidic teachings: he should consult with the elder Chassidim in his surroundings and they will guide him, as the matter depends on many details.\n\nWith blessing for a good inscription and sealing [in the Book of Life].\n\nM. Schneerson", "summary_en": "The Rebbe answers a halachic question: a baal teshuvah who donates money in place of fasts and afflictions is not limited by the 'one-fifth' rule, because healing the soul is no less important than healing the body — 'a man will give all he has for his life' applies to spiritual redemption as well.", "scraped": true, "topics_en": []}, {"letter": "ה'תתט", "summary_he": "הקב\"ה מבקש - בחנוני נא בזאת", "url": "http://chabadlibrary.org/books/admur/ig/16/5809.htm", "tags": ["השפעה"], "notes": "", "id": 69, "content_he": "ה'תתט\n\nב\"ה, כ\"ט תשרי, תשי\"ח\n\nברוקלין.\n\nשלום וברכה!\n\nמיט צופרידענהייט האב איך געלייענט אייער בריף וועגן אייער גוטע החלטה מיט די שותפים בהנוגע לצדקה. ובחנוני נא בזאת - אויך א לשון של בקשה. אף שס'איז א פסק הלכה לא תנסון, איז אבער צדקה א אויסנאם - מ'קען שטארק זיין אין בטחון.\n\nהמחכה לבשו\"ט.", "content_en": "With G-d's help, 29 Tishrei, 5718 | Brooklyn\n\nGreetings and blessings!\n\nWith great satisfaction I read your letter of 27 Tishrei, in which you write about the good resolution you and your partners have made regarding tzedakah. And since G-d says 'Test Me in this' — which is also in the language of a request, that one should test Him — as He says earlier in the verse: 'Bring all the tithes... and I will pour out for you a blessing without limit.' Although the general ruling is 'You shall not test the L-rd your G-d,' tzedakah is the unique exception — one can be strong in trust that G-d will fulfill what was promised regarding it.\n\nYou will be able to bring good news regarding the sale of the houses, and also that you and your partners fulfill your resolution with joy and good heart.\n\nAwaiting good news.", "summary_en": "The Rebbe praises the recipient and business partners for their tzedakah resolution, noting that while one may not normally test G-d, tzedakah is the unique exception where G-d Himself invites the test — 'Bring all the tithes and I will pour out for you a blessing' — so one can trust with certainty in Divine fulfillment.", "scraped": true, "topics_en": ["Influencing Donors"]}, {"letter": "ה'תתמט", "summary_he": "במקום לנסוע בשד\"רות (לטובת פרנסתו הפרטית) לארה\"ב, אם הי' מתמסר באותה תקיפות בארה\"ק הי' מצליח", "url": "http://chabadlibrary.org/books/admur/ig/16/5849.htm", "tags": ["שדרים"], "notes": "", "id": 70, "content_he": "ה'תתמט\n\nב\"ה, ט\"ז מ\"ח, תשי\"ח\n\nברוקלין.\n\nשלום וברכה!\n\nבמענה למכתבו בו כותב אודות מצב הפרנסה הדחוק, ולכן בדעתו לנסוע לארצוה\"ב כשד\"ר וכיו\"ב.\n\nראיתי בכמה מאלו שנכוו בכגון דא - נסעו מבלי לחקור התנאים, ובבואם ראו שכמה פרטים הם רק באופן שנפש היפה סובלתם. מסופקני אם הרויחו אפילו הוצאות הנסיעה.\n\nאין כל האפשריות שוות. צריך חקירה ודרישה מפורטות קודם שעושים צעד כהנ\"ל. ואותה התקיפות שהיו מוכנים לנסוע - אם ישתמשו בה על אתר, יוכלו למצוא פרנסה באה\"ק בכבוד יותר.\n\nבברכה.", "content_en": "With G-d's help, 16 Marcheshvan, 5718 | Brooklyn\n\nGreetings and blessings!\n\nIn response to his letter in which he writes about the difficult livelihood situation, and therefore plans to travel to the USA, apparently as a fundraiser (shaddar) or similar.\n\nI have seen many who came here for this purpose and were burned by it — they traveled without thoroughly investigating the conditions. Upon arriving they found that many particulars were only feasible for those of a refined nature willing to demean themselves, and they neither wanted — and some could not, even if they wanted — to do so. I doubt whether they even recouped their travel expenses.\n\nNot all people and circumstances are the same, and especially since he does not specify his prospects and connections here. I write only to alert him that very detailed investigation and much deliberation is required before taking such a step.\n\nRegarding his sense of not knowing how to emerge from the current distress: if those same people had applied equal determination to expanding their situation in the Holy Land itself, they would not only have saved their travel expenses, but would certainly have found livelihood opportunities there with more dignity than the endeavors they engage in here.\n\nSurely they are preparing in good time for the upcoming days of Kislev. May it be with success in material and spiritual matters.", "summary_en": "The Rebbe cautions someone considering traveling to the USA as a fundraiser: many who came found the conditions demeaning and barely covered travel expenses; the same determination applied locally in the Holy Land would likely yield better results with more dignity.", "scraped": true, "topics_en": ["Fundraisers & Emissaries"]}, {"letter": "ו'לז", "summary_he": "לנשים זכות וחובה מיוחדת בהכנה למ\"ת - וכן עכשיו בהכנה לגאולה, ע\"י תמיכת הישיבה", "url": "http://chabadlibrary.org/books/admur/ig/16/6037", "tags": ["עידוד"], "notes": "", "id": 71, "content_he": "ו'לז\n\nב\"ה, ו' שבט, תשי\"ח\n\nברוקלין.\n\nצו די בראנזוויל-איסט-ניו-יארק ליידיס אקזילערי פאר די ישיבות תומכי תמימים ליובאוויטש.\n\nברכה ושלום!\n\nמיט פארגעניגען האב איך באקומען אייער מיטטיילונג וועגן דעם יערלעכן באנקעט. דאס איז די וואך פון שבת-שירה.\n\nדער סיום פון דער שירה איז די שירה פון מרים הנביאה. אן דער שירה פון מרים וואלט די שירה פון משה ניט געווען פאלקאם. מרים שירה בשמחה וכל הנשים - פארפאלקאמט דעם ישיר משה ובני ישראל.\n\nאויך היינט שטייען מיר צו משיח צדקנו. דער צוגרייטונג דערצו - תורה, מצוות, פנימיות התורה דורך תורת החסידות. דאפאר איז ישיבת תומכי תמימים ליובאוויטש - איבערגעפלאנצט אין אמעריקע דורך כ\"ק מו\"ח אדמו\"ר, וועמענס יום הילולא קומט אויס די וואך.\n\nבברכה לבשורות טובות.", "content_en": "With G-d's help, 6 Shvat, 5718 | Brooklyn\n\nTo the Brownsville–East New York Ladies Auxiliary for the Tomchei Temimim Lubavitch Yeshivos,\nMay G-d give them life:\n\nBlessing and peace!\n\nWith pleasure I received your notification about the annual banquet, taking place this week, Wednesday, Parshas Beshalach — the week of Shabbat Shirah.\n\nThe conclusion of the Song — and everything follows its conclusion — is the song of Miriam the Prophetess. Without the song of Miriam, the Song of Moses would not have been complete. The song of Miriam — 'with joy and with all the women' — completes the fact that 'Moses and the Children of Israel sang.'\n\nWith this, the Torah gives instruction to Jewish women of all generations: the Jewish woman has a great responsibility and merit in the holiest moments of our people's history. The Splitting of the Sea was a preparation for receiving the Torah at Sinai, and Jewish women had an important part in that preparation.\n\nToday too we stand on the path toward Divine revelation through our Righteous Mashiach. The preparation is through Torah, mitzvos, and the inner dimension of Torah through Chassidic teachings. For this purpose, the Tomchei Temimim yeshiva was founded and transplanted in America by the Previous Rebbe, whose Yahrzeit also falls this week.\n\nI hope this will give each of you the encouragement to increase your work for the yeshiva with self-sacrifice and joy, strengthening all matters of Torah and mitzvos with Chassidic warmth and light — each in her own home and surroundings — bringing down Divine blessings for success in personal matters as well.\n\nWith blessing for good news in all the above.", "summary_en": "The Rebbe addresses the Brownsville Ladies Auxiliary during the week of Shabbat Shirah, connecting Miriam's song completing Moses's song to the vital role of Jewish women today — supporting Tomchei Temimim is their part in preparing for the coming of Mashiach, just as the women of the Exodus prepared for the revelation at Sinai.", "scraped": true, "topics_en": ["Encouragement"]}, {"letter": "ו'פז", "summary_he": "נכון לשלוח שד\"ר לארה\"ב, בתנאי שלא יבלבל למוסדות אחרים", "url": "http://chabadlibrary.org/books/admur/ig/16/6087", "tags": ["שדרים"], "notes": "", "id": 72, "content_he": "ו'פז\n\nב\"ה, ג' אדר, תשי\"ח\n\nברוקלין.\n\nהנהלת ישיבת תומכי תמימים אשר בלוד.\n\nשלום וברכה!\n\nא) שילוח שד\"ר לחו\"ל - נכון במאד. מופת חותך - רובם ככולם ממוסדות אה\"ק עושים זה. רק צ\"ל באופן שלא יבלבל מוסד אחד לחבירו.\n\nב) בהנוגע מי יהי' השד\"ר ולאיזה מדינה - עליהם לדון בהתאם להאישים ולמדינה המתאימה.\n\nג) זמן הנחת אבן הפנה - עליהם להחליט בהתאם לסיכוי הקרוב, עם הכנות מספיקות.\n\nד) יודיעוני כשיחליטו. ובל\"נ אכתוב מכתב כללי.\n\nה) לתמהוני מזניחים לגמרי ענין המשכת תיירים לביקור במוסדות. צריך לתקן זאת.\n\nבברכת הצלחה.\n\nמ. שניאורסאהן", "content_en": "With G-d's help, 3 Adar, 5718 | Brooklyn\n\nTo the administration of Tomchei Temimim Yeshiva in Lod:\n\nGreetings and blessings!\n\nIn response to their letters and questions:\n\n(a) Sending a shaddar (fundraiser) abroad: as I believe I've already written several times, this is highly recommended — the decisive proof being that the vast majority of Holy Land institutions do this, for several years already. However, it must be done in coordination so one institution doesn't interfere with another — through cooperation all matters can be arranged well.\n\n(b) Who should be the shaddar and to which country: they must deliberate according to the available individuals and the most suitable country. In every country there are Anash, especially in those where there are the best prospects for success.\n\n(c) The timing for the cornerstone laying: they must decide according to which near-future date is most propitious, leaving sufficient time for necessary preparations — this is the main point.\n\n(d) When they decide definitively on a date, they should inform me. With G-d's help I will write a general letter. The matter has been delayed because several times they decided on a date and then cancelled.\n\n(e) To my astonishment, they completely neglect the matter of attracting tourists to visit the institutions in a way that would lead to substantive support. This is unfortunately common to all Chabad institutions in the Holy Land — only in very rare cases have tourists visited, and even then very few were moved to actual action — despite it being nearly ten years since the founding of their institution there.\n\nI do not know the details of their Nissan schedule, but surely they will prepare a detailed plan well in advance.\n\nWith blessing for success in their holy work.\n\nM. Schneerson", "summary_en": "The Rebbe provides detailed operational guidance to the Tomchei Temimim administration in Lod: sending a fundraiser abroad is recommended (as all Holy Land institutions do) in a coordinated way; they must carefully plan their cornerstone-laying date; and they must urgently begin attracting and engaging tourists as supporters — something all Chabad institutions in the Holy Land are neglecting.", "scraped": true, "topics_en": ["Fundraisers & Emissaries"]}, {"letter": "ו'צא", "summary_he": "הבטיח לסלק הבטחתו לחדרים, אף שקשה לו - יקויים בו מאמר כ\"ק מו\"ח אדמו\"ר שצנור הפרנסה ייפתח לו", "url": "http://chabadlibrary.org/books/admur/ig/16/6091", "tags": ["השפעה"], "notes": "", "id": 73, "content_he": "ו'צא\n\nב\"ה, ה' אדר, תשי\"ח\n\nברוקלין.\n\nמוה' יוסף שי'\n\nשלום וברכה!\n\nלאחרי הפסק הכי ארוך נתקבלו שני מכתביו.\n\nנעם לי לקרות שלמרות שקשה לו הענין הבטיח לסלק בקרוב הבטחתו בהנוגע לקנין החדרים. ידוע פתגם כ\"ק מו\"ח אדמו\"ר שכשאיש ישראלי מבטיח לצדקה ביד נדיבה - למעלה מיכולתו - פותחים צנור הפרנסה כדי שיוכל למלאות הבטחתו. ויש להוסיף שנותן התורה מצוה עבדו את ה' בשמחה - פותחים צנורות פרנסה באופן של שמחה. ומגלגלין זכות ליומין זכאין - ימי אדר.\n\nבברכה לפורים שמח.", "content_en": "With G-d's help, 5 Adar, 5718 | Brooklyn\n\nTo R' Yosef, may he live:\n\nGreetings and blessings!\n\nAfter the very long break, your two letters of 3 Adar were received. At an opportune time I will mention him and all those he writes about at the holy resting place.\n\nIt was particularly pleasant to read in his letter that, despite the difficulty, he promised to fulfill his commitment soon regarding the acquisition of the rooms. Well-known is the Previous Rebbe's saying: when a Jew promises a generous tzedakah donation — seemingly beyond his means — at that very moment channels of livelihood are opened from Above so he can fulfill this promise. I would add to the Rebbe's words: since the Torah commands 'Serve G-d with joy,' and especially in mitzvos, not only are channels opened — they are opened in a manner of joy, increasing the livelihood joyfully. And 'merit is brought through meritorious days' — these being the days of Adar, concerning which we are commanded to increase in joy.\n\nWith blessing for good news in all the above, and also that he is using his talents in the field of Torah education in purity — may 'there is nothing that stands in the way of will' be fulfilled in this too.\n\nWith blessing for a joyous Purim.\n\n[Postscript: I received a photograph of a letter from the Previous Rebbe, dated 24 Tevet 5703, from Rabbi Groner — thank you. It would be highly advisable for him to share this letter in his community and ask each person to make a reckoning of what was done over the fifteen years since — in the spirit the letter calls for, versus the opposite.]", "summary_en": "The Rebbe praises R' Yosef Fleyer (Chicago) for his generous charitable pledge beyond his means, teaching that at the moment of such a pledge G-d opens channels of livelihood to fulfill it — and since the mitzvah is to 'serve G-d with joy,' those channels open joyfully; he also urges sharing the Previous Rebbe's letter with the community for self-reckoning.", "scraped": true, "topics_en": ["Influencing Donors"]}, {"letter": "ו'קסג", "summary_he": "התעסקות לטובת מוסדות צ\"ל בקבלת שכר", "url": "http://chabadlibrary.org/books/admur/ig/17/6163", "tags": ["שדרים"], "notes": "", "id": 74, "content_he": "ו'קסג\n\nב\"ה, ז' ניסן תשי\"ח\n\nברוקלין\n\nשלום וברכה!\n\nנתקבל מכתבו מב' ניסן, יום ההילולא של כ\"ק אדמו\"ר (מוהרש\"ב).\n\nכותב שמכר את העסק שלו ואין לו הצעות ממשיות.\n\nלדכוותי' למותר לאריך אשר אסורה נפילת רוח ועצבות. אדרבה - על ידי תוספת חיזוק הבטחון מוסיפים מרץ להסתדרות בפרנסה חדש מורחב.\n\nכ\"ק מו\"ח אדמו\"ר אמר שמי שמתעסק בשליחות מוסדות צריך לקבל שכר. הנקודה הפנימית אינה משתלמת בכסף - אבל שכר הבטלה ומנוחת הנפש מוכרח. ידועים סיפורים בזה מהרש\"ב.\n\nבברכת החג.", "content_en": "With G-d's help, 7 Nissan, 5718 | Brooklyn\n\nGreetings and blessings!\n\nYour letter of 2 Nissan was received — the Yahrzeit of the Rebbe Rashab.\n\nYou write that you have sold your business and currently have no concrete proposals for what to pursue.\n\nSurely one such as yourself does not need elaboration that depression and despondency are absolutely forbidden — as explained in our Torah and Chassidic works. On the contrary: through strengthening one's trust in G-d, one adds energy to reorganize in a manner of new, expanded, and good livelihood — good in the way that is seen and revealed.\n\nI was pleased to read in his letter about his assistance for the Previous Rebbe's institutions, and surely he will continue this with addition.\n\nHowever, as the Previous Rebbe himself said several times: in this kind of work, it is necessary to receive appropriate compensation — because although the inner vitality of communal dedication cannot be paid for with money, one must receive payment for lost time and to maintain peace of mind, without which the proper temperament for the work is lacking. Stories are known about this also from the Rebbe Rashab. In my opinion he should now dedicate time to institutional work, after coming to agreement on manner and compensation. Part of each day should also be free for business — 'from this and from that, do not withdraw your hand.' May G-d guide him on the good path.\n\nFor the approaching Passover, the time of our freedom: I bless him for a kosher and joyous holiday and true freedom — from material and spiritual worries, from anything that hinders serving G-d with joy. And may this freedom be drawn forward throughout the entire year.\n\nWith the blessing of the holiday.", "summary_en": "After selling his business, the Rebbe encourages the recipient not to be despondent — trust in G-d energizes one for new livelihood — and advises him to continue his Chabad institutional work with appropriate compensation, as the Previous Rebbe taught that communal workers must be paid to maintain their effectiveness and peace of mind.", "scraped": true, "topics_en": ["Fundraisers & Emissaries"]}, {"letter": "ו'תקכט", "summary_he": "ביאור בהא ד\"רבי מכבד עשירים\"", "url": "http://chabadlibrary.org/books/admur/ig/18/6529", "tags": [], "notes": "", "id": 75, "content_he": "ו'תקכט\n\nב\"ה, כ\"ה תשרי, ה'תשי\"ט\n\nברוקלין, נ.י.\n\nמו\"ה אליעזר ארי' הלוי שי' - ד\"ר פינקלשטיין\n\nשלום וברכה!\n\nמאשר קבלת מכתבו מי\"ז אלול וגם הספרים.\n\nבנוגע לתמיהה על \"רבי מכבד עשירים\" - מובן ומבואר ע\"פ עקרון הבעל שם טוב, שכל ענין בעולם הוא בהשגחה פרטית, ובפרט עניינים כוללים. עשירים שניתנו להם אמצעים לפעול טובות - בוודאי כוחות נפשם מתאימים לתפקיד זה. ורבינו הקדוש בתקופת מעבר - היה צריך לגייס כל הכחות.\n\nאלא שהבחירה החפשית נתונה לכל אחד. ולא מספיק שלא ישתמש בעושר לרעה - גם העדר הניצול מפריע סדר הבריאה.\n\nבכבוד ובברכה.", "content_en": "With G-d's help, 25 Tishrei, 5719 | Brooklyn, N.Y.\n\nTo R' Eliezer Arye HaLevi, known as Dr. Finkelstein, may he live:\n\nGreetings and blessings!\n\nI gratefully confirm receipt of his letter of 17 Elul and also the books he kindly sent for my library — I hope he will continue to send books published from time to time. Please forgive the delayed reply due to the busy High Holiday season.\n\nThere are those puzzled by the Talmudic statement 'Rabbi honored wealthy people.'\n\nTo me this is understood and explained based on one of the fundamental principles of the Baal Shem Tov: that every matter in the world — even the smallest — is under Divine Providence, and especially general matters affecting the public.\n\nWealthy people — those to whom Divine Providence has given the means to do great good in G-d's world — certainly also have the spiritual powers suited to fulfilling this role, a role exceeding many times the role of the average person. Rabbeinu HaKadosh, whose era was a transition to decrees and persecutions, needed to mobilize all forces for the Jewish people to stand firm — so he expressed respect toward those given extra capacity, who surely used it to protect all that is holy in Israel.\n\nHowever, free choice is given to each person. Whether to use this wealth for good or — Heaven forbid — the opposite is each person's choice.\n\nIt is obvious that if this applies to those wealthy in gold and silver, it applies all the more to those wealthy in influence over their surroundings.\n\nAnd it is understood that since there is a Director of this world and nothing in it is in vain, there must be active and positive use of wealth — it is not sufficient merely to refrain from using it wrongly. Even the absence of proper utilization disrupts the order of Creation, since all parts must actively contribute to the general unified purpose.\n\nI need not emphasize that I mean life according to the Torah of life, a complete Torah without compromise — whose greatness is that great is Torah study that leads to action, fulfilling mitzvos in daily life, about which it is said 'and you shall live by them.'\n\nI elaborate slightly on these points in an enclosed copy of my general New Year's letter — I hope he will find it of interest.\n\nWith respect and blessing.", "summary_en": "The Rebbe writes to Dr. Finkelstein, a man of influence, explaining the Talmudic statement 'Rabbi honored wealthy people': by the Baal Shem Tov's principle of Divine Providence, those given wealth — material or in influence — have been equipped for a role of great responsibility; not using this capacity actively (not merely refraining from harm) actually disrupts the Divine order of Creation.", "scraped": true, "topics_en": []}, {"letter": "ו'תרסז", "summary_he": "תרומת קרקע לבנין ביסל\"מ", "url": "http://chabadlibrary.org/books/admur/ig/18/6667", "tags": [], "notes": "", "id": 76, "content_he": "ו'תרסז\n\nב\"ה, כ\"ט טבת, תשי\"ט\n\nברוקלין.\n\nמר מרדכי שי'\n\nשלום וברכה!\n\nבנועם קבלתי מכתב כתוב עבורו ע\"י הוו\"ח נו\"נ רב פעלים בעל מדות ובעל מרץ כו' מר א. שי' בן נון.\n\nדרצונו הטוב למסור קרקעות לרשות חב\"ד, לתכלית הקמת בתי ספר למלאכה ושיכונים לעובדים חניכים-ות.\n\nמשנה מקום משנה מזל - לטובה ולברכה פארן געשעפט, ויהי רצון אז עס זאל זיין ולאורך ימים ושנים טובות.\n\nבברכת הצלחה גדולה ולבשו\"ט.\n\nמ. שניאורסאהן", "content_en": "With G-d's help, 29 Tevet, 5719 — Brooklyn\n\nMr. Mordechai, may he live,\n\nGreetings and blessings!\n\nI was pleased to receive the letter written on his behalf by Mr. A. Ben Nun. Its contents:\n\nHis kind desire to transfer land to Chabad's authority for establishing trade schools and housing for workers and students. This good will proves there is no need to elaborate on the importance of proper education for the younger generation in the Holy Land.\n\nCertainly additional details will be written regarding the plot and the suitability of the surroundings for establishing a special-type trade school. My intention is that several trade schools require additional surrounding land in order to fulfill their role fully.\n\nEspecially in light of clause 3 in his letter — that they are willing to transfer a portion of the land for establishing the institutions now — this makes detailed information all the more necessary.\n\nMay it be G-d's will that the merit of this exalted matter stand for him for all his needs — in particular for long life and good years, in the language of the Previous Rebbe: 'good in all interpretations.'\n\nI have heard from the Previous Rebbe many times that from a meeting between two Jewish people, benefit comes to more Jewish people — in addition to their own benefit. Based on this I permit myself to encourage him to add in Torah and mitzvos in his private life as well. In matters of goodness and holiness, which are infinite, one can always add more.\n\nWith respect and blessing for great success,\nM. Schneerson", "summary_en": "The Rebbe responds warmly to Mr. Mordechai Katz's offer to donate land for Chabad trade schools and housing in the Holy Land, requesting more details, and encourages him to strengthen his personal Torah observance.", "scraped": true, "topics_en": []}, {"letter": "ו'תשח", "summary_he": "בקשת תמיכתו \"כדי אשר המס\"נ של העובדים תביא התועלת הכי גדולה\"", "url": "http://chabadlibrary.org/books/admur/ig/18/6708", "tags": [], "notes": "", "id": 77, "content_he": "ו'תשח\n\nב\"ה, ד' אדר א', ה'תשי\"ט\n\nברוקלין, נ.י.\n\nהרב שלמה שי' המכונה ד\"ר עהרמאן\n\nשלום וברכה!\n\nהנני מאשר קבלת מכתבו עם המוסגר בו.\n\nשמחתי לפגישת הרה\"ג והרה\"ח מוהר\"ר בנימין אלי' שי' גורודצקי עם כת\"ר שי' ובטח סיפר לכת\"ר ע\"ד העבודה המסתעפת הנעשית במסירת נפש על ידי אנ\"ש שי' בפינות רחוקות בהפצת התורה ויראת שמים, כמו בכפרים ועיירות במרוקו, וכן באה\"ק ת\"ו באויסטראלי' ובכמה מדינות הקרובות והרחוקות. והרי עבודה זו מחייבת הסיוע הכי גדול, על כל פנים באמצעי כסף, כדי אשר המסירות נפש של העובדים תביא התועלת הכי גדולה בלי הגבלות מצד חוסר אמצעים כספיים.\n\nוכיון ששמעתי מכ\"ק מו\"ח אדמו\"ר כמה פעמים ע\"ד הסיוע של כת\"ר שי' גם בענינים כספיים, ובידעי השפעתו לא רק בקרן חאווקין אלא גם במקורות כסף אחרים, תקותי שינצל השפעתו וישתתף בעבודתנו במדה הכי גדולה ואפשרית.\n\nבכבוד ובהוקרה ובברכה.", "content_en": "With G-d's help, 4 Adar I, 5719 — Brooklyn, N.Y.\n\nRabbi Shlomo, known as Dr. Ehrman, may he live,\n\nGreetings and blessings!\n\nI confirm receipt of his letter with its enclosure.\n\nI was pleased about the meeting between Rabbi Binyamin Eliyahu Gorodetzky, may he live, and your honor. He surely told you about the extensive work being done with self-sacrifice by our Chassidim in distant places — in villages and towns in Morocco, in the Holy Land, in Australia, and in several nearby and distant countries. This work requires the greatest possible support — at least financial — so that the self-sacrifice of the workers may bring the greatest benefit without limitations due to lack of funds.\n\nSince I have heard from the Previous Rebbe many times about your support even in financial matters, and knowing your influence not only with the Haavkin Fund but also with other financial sources — I hope you will use your influence and participate in our work to the fullest possible extent.\n\nWith respect, esteem, and blessing.", "summary_en": "The Rebbe writes to Dr. Ehrman urging him to use his financial connections and influence to support Lubavitch's self-sacrificing outreach work in Morocco, Israel, Australia, and beyond.", "scraped": true, "topics_en": []}, {"letter": "ו'תתפג", "summary_he": "פרטים בענין תרומה לבנין", "url": "http://chabadlibrary.org/books/admur/ig/18/6883", "tags": [], "notes": "", "id": 78, "content_he": "ו'תתפג\n\nב\"ה, ה' סיון, תשי\"ט\n\nברוקלין.\n\nשלום וברכה!\n\nבמענה למכתבו מז\"ך אייר:\n\nא) כיון שנדבה זו מיוחדת היא, מובן שאין לכלול בזה נדבות שהורגלו בהן, וכן פשיטא שעל ידי נדבה המיוחדת לא יגרע להפרשתם לצדקה הרגילות.\n\nב) יכול למסור הסכום באופן שיגיע באיזה זמן שירצה בישיבת תומכי תמימים במאנטרעאל, אבל בצדקה בכלל אין ענין לעכב הכסף, כי אם אדרבה להוציא הכסף מרשותו בהקדם ובזריזות. ובלשון רבנו הזקן באגה\"ק סי' כ\"א \"מלבד הידוע לכל גודל מעלת הזריזות בכל המצות...זריזותי' דאברהם אבינו ע\"ה היא העומדת לעד...עשה זאת בזריזות נפלאה להראות שמחתו וחפצו למלאות רצון קונו...ובפרט מעשה הצדקה\".\n\nג) מסכים אני שיהיו בפקדון אצלי עד שיבוא הזמן להכניס הסכום לקופת תומכי תמימים דמאנטרעאל.\n\nיהי רצון בנוסח כ\"ק מו\"ח אדמו\"ר שיקבלו הוא וב\"ב שי' את התורה בשמחה ובפנימיות.\n\nבברכה לבשו\"ט בכל האמור.", "content_en": "With G-d's help, 5 Sivan, 5719 — Brooklyn\n\nGreetings and blessings!\n\nIn reply to his letter of 27 Iyar:\n\n1) Since this donation is a special one, it is understood that one's regular yearly donations should not be counted within it, and the special donation should certainly not reduce regular charitable giving.\n\n2) He may deliver the sum to arrive at any time he wishes at the Tomchei Temimim yeshiva in Montreal. However, in charity in general there is no reason to delay the money — on the contrary, one should transfer the money out of one's possession as quickly and promptly as possible. In the language of the Alter Rebbe in Igeret HaKodesh ch. 21: 'Apart from the well-known great virtue of alacrity in all commandments... the alacrity of Abraham our forefather stands forever... he did this with wondrous alacrity to show his joy in fulfilling G-d's will... and especially the act of charity.'\n\n3) I agree that the funds may be held in trust with me until the time comes to transfer the sum to the Montreal Tomchei Temimim fund.\n\nMay it be G-d's will — in the style of the Previous Rebbe — that he and his household receive the Torah with joy and inwardness.\n\nWith blessing for good news in all the above.", "summary_en": "The Rebbe answers three questions about a special charitable donation: it should not replace regular giving, money for Tomchei Temimim Montreal should be given promptly (citing the Alter Rebbe on alacrity in charity), and the Rebbe agrees to hold the funds temporarily.", "scraped": true, "topics_en": []}, {"letter": "ו'תתקכב", "summary_he": "קניית נדל\"ן כמקור הכנסה לבית ליובאוויטש", "url": "http://chabadlibrary.org/books/admur/ig/18/6922", "tags": [], "notes": "", "id": 79, "content_he": "ו'תתקכב\n\nב\"ה, ז' תמוז, ה'תשי\"ט\n\nברוקלין.\n\nמו\"ה שלמה שי'\n\nשלום וברכה!\n\nאיך האב באקומען אייער בריוו פון כ\"ז סיון.\n\nאין דער פראגע, אויב ס'איז כדאי צו קויפן הייזער אלס א מקור הכנסה פאר דער ליובאוויטש הויז - ווענדט זיך אין דעם מצב פון ריעל עסטייט אין ענגלאנד אין דעם מאמענט. אויב ביידע זאכן זיינען גינסטיק, זאל דער אויבערשטער געבן אז עס זאל זיין מיט הצלחה גדולה.\n\nבנוגע דער שאלה וועגן די שערס - וויבאלד איר האט עס שוין געהאלטן אזא לאנגע צייט, איז ניט כדאי איצט צו פארקויפן אויף האלב פרייז, און בעסער האלטן זיי ביז מען וועט קענען זיי פארקויפן מיט ריווח.\n\nאין דער פראגע וועגן אריבערקלייבן די ביזנעס אין אן אנדער ארט - איז דאך באקאנט מיין שיטה אז עס דארף זיין מיט \"ואתהלכה ברחבה\" - מיט א ברייטקייט.\n\nבפרט, אז דער אויבערשטער האט אייך מזכה געווען מיט דעם גוטן גאדנק צו נעמען אויף זיך די פאראנטווארטלעכקייט פאר די הוצאה פון בית ליובאוויטש - דארף מען אויסברייטערן די צנורות. ויהי רצון, אז עס זאל זיין משנה מקום משנה מזל לטובה ולברכה.\n\nבברכת הצלחה גדולה ולבשו\"ט.", "content_en": "With G-d's help, 7 Tammuz, 5719 — Brooklyn\n\nR' Shlomo Perin, may he live,\n\nGreetings and blessings!\n\nI received your letter of 27 Sivan.\n\nRegarding whether it is worthwhile to purchase houses as a source of income for Lubavitch House — this depends on the current state of real estate in England and the conditions of purchase. If both are favorable, may G-d grant that it succeed greatly.\n\nRegarding the question about the shares: since you have held them for such a long time, it is not worthwhile to sell them now at half price — better to hold them until they can be sold at a profit.\n\nRegarding relocating the business — you know my approach that it should be 'and I will walk in a broad space' — with expansiveness.\n\nEspecially since G-d has privileged you with the good thought of taking responsibility for the expenses of Beit Lubavitch — one must broaden the channels to receive ever greater blessing and success from Above, since a portion of the income goes toward that holy purpose. And though the promise of 'tithe so that you will become wealthy' is always valid, one must also act naturally to broaden the channels and vessels. May it be G-d's will that a change of place bring a change of fortune — for good and for blessing.\n\nWith blessing for great success and good news.", "summary_en": "The Rebbe advises R' Shlomo Perin of London on real estate, stocks, and business relocation, encouraging expansiveness — especially since part of his income supports Beit Lubavitch — and invokes the principle of tithing for wealth.", "scraped": true, "topics_en": []}, {"letter": "ז'נח", "summary_he": "מעלת תמכין דאורייתא על לומדי'", "url": "https://chabadlibrary.org/books/admur/ig/19/7058.htm", "tags": [], "notes": "", "id": 80, "content_he": "ז'נח\n\nב\"ה, כ\"ח תשרי, תש\"כ\n\nברוקלין.\n\nמו\"ה יוסף אלי' שי'\n\nשלום וברכה!\n\nמאשר הנני קבלת מכתבו ז\"ע.\n\nוכבקשתו אזכירו ואת כל אלה שכותב אודותם, על הציון הק' של כ\"ק מו\"ח אדמו\"ר זצוקללה\"ה נבג\"מ זי\"ע, מתאים לתוכן כתבו, ויהי רצון שכשם שהביא הבקשה כן יבשר טוב בזה.\n\nוזכות פעולותיו באופן דתמכין דאורייתא, עוד יותר מאשר לימודו לעצמו, בודאי שתעמוד לו ולב\"ב שי' בהנ\"ל.\n\nוכמודגש במאמר רבנו הזקן ד\"ה עץ חיים היא למחזיקים בה (שמח\"ת תק\"מ): אלו בעלי השגה הלומדים תורה, ותומכי' מאושר - אלו בעלי עבודה העוסקים בתורה, מאושר, גליקלעך, כדאיתא בזהר א\"ת מאושר אלא מראשו, דע\"י עבודתם ממשיכים מראשו, היינו מפנימית הא\"ס ב\"ה.\n\nבכבוד ובברכה לבשו\"ט בכל האמור.", "content_en": "With G-d's help, 28 Tishrei, 5720 — Brooklyn\n\nR' Yosef Eliyahu Henkin, may he live,\n\nGreetings and blessings!\n\nI confirm receipt of his letter.\n\nAs he requested, I will mention him and all those he writes about at the holy gravesite of the Previous Rebbe of blessed memory, in accordance with the content of his letter. May it be G-d's will that just as he brought the request, so may he report good news in this regard.\n\nThe merit of his deeds in the capacity of one who supports Torah (tamchin d'orayta) — even more than one who studies Torah himself — will certainly stand for him and his household in the above.\n\nAs is emphasized in the discourse of the Alter Rebbe beginning 'It is a tree of life to those who hold it' (Simchat Torah 5540): 'These are those of intellect who study Torah — and those who support it are praised (me'ushar).' These are the masters of divine service who are occupied in Torah — praised (me'ushar), meaning 'from the head' (me'rosho) as stated in the Zohar: through their service they draw from its 'head,' that is, from the innermost dimension of the Infinite Divine.\n\nWith respect and blessing for good news in all the above.", "summary_en": "The Rebbe confirms he will pray for R' Yosef Eliyahu Henkin at the Previous Rebbe's gravesite, and praises his role as a supporter of Torah, citing the Alter Rebbe's teaching that Torah supporters draw from the deepest divine source.", "scraped": true, "topics_en": []}, {"letter": "ז'עח", "summary_he": "הוספה בהפצת היהדות יוסיף בענינים גשמיים", "url": "http://chabadlibrary.org/books/admur/ig/19/7078.htm", "tags": [], "notes": "", "id": 81, "content_he": "ז'עח\n\nב\"ה, ח\"י מ\"ח, תש\"כ\n\nברוקלין.\n\nמו\"ה אברהם מרדכי שמואל שי'\n\nשלום וברכה!\n\nמאשר הנני קבלת מכתבו מט\"ו מ\"ח, בו כותב ר\"פ מעניני הפצת המעינות, ויהי רצון שיתוסף בהפעולות האמורות כהנה וכהנה בתוככי שאר פעולות להפצת היהדות המסורתית, שבד\"מ יתוסף כהנה וכהנה בענינים הגשמים, כידוע הדוגמא אשר בהקרבת עוף אחד ע\"ג המזבח נעשית עליית עולמות עליונים ונמשכת ברכה רבה בעניני האדם.\n\nובפרט אשר השנה היא שנת המאתים להסתלקות הילולא של הבעש\"ט עת וזמן מסוגל להפצת המעינות ועד שיגיעו גם חוצה.\n\nבברכה לבשו\"ט.", "content_en": "With G-d's help, 18 Marcheshvan, 5720 — Brooklyn\n\nR' Avraham Mordechai Shmuel Lider, may he live,\n\nGreetings and blessings!\n\nI confirm receipt of his letter of 15 Marcheshvan, in which he writes at length about spreading the wellsprings [of Chassidic teaching]. May it be G-d's will that these activities increase many times over alongside other activities for spreading traditional Judaism — and correspondingly physical blessings will similarly multiply, as the known example: the offering of a single bird upon the altar causes an ascent of the higher worlds and draws great blessing in human affairs.\n\nEspecially since this year is the 200th anniversary of the passing of the Baal Shem Tov — a time especially auspicious for spreading the wellsprings until they reach even 'outside.'\n\nWith blessing for good news.", "summary_en": "The Rebbe acknowledges R' Avraham Mordechai Lider's report on spreading Chassidic teachings, encouraging great expansion of this activity, particularly in the 200th yahrzeit year of the Baal Shem Tov.", "scraped": true, "topics_en": []}, {"letter": "ז'תקמח", "summary_he": "עדיף לחלק מעות לצדקה מיד מאשר לייסד בהם קרן", "url": "https://chabadlibrary.org/books/admur/ig/20/7548.htm", "tags": [], "notes": "", "id": 82, "content_he": "ז'תקמח\n\n[כ' ובת תשכ\"א]\n\nאין ענטפער אויף אייער בריף פון י\"ג טבת, אין וועלכן איר פרעגט מיין מיינונג, אויב צוטיילן די געלט אויף צדקה, אדער מאכן א שטענדיקן קרן
